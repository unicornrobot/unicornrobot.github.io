<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery — Unicorn Robot</title>
    <script src="idb.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: #080808;
            color: #bbb;
            font-family: 'Inter', 'Helvetica Neue', sans-serif;
            font-size: 13px;
            overflow: hidden;
        }

        /* ── Top bar ── */
        #topBar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            height: 44px;
            background: rgba(8,8,8,0.92);
            border-bottom: 1px solid #1e1e1e;
            display: flex; align-items: center; gap: 10px;
            padding: 0 16px;
        }
        #topBar h1 { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; color: #666; text-transform: uppercase; flex-shrink: 0; }
        .mode-btn {
            padding: 4px 12px; border-radius: 4px; border: 1px solid #2a2a2a;
            background: #111; color: #777; font-size: 11px; letter-spacing: 0.06em;
            cursor: pointer; transition: background 0.2s, color 0.2s, border-color 0.2s;
            text-transform: uppercase;
        }
        .mode-btn.active { background: #1a1a2e; color: #90caf9; border-color: #1a3a6e; }
        .mode-btn:hover:not(.active) { background: #1a1a1a; color: #aaa; }
        #readingCount { margin-left: auto; font-size: 11px; color: #444; flex-shrink: 0; }

        /* ── Shared panel area ── */
        #panel {
            position: fixed; top: 44px; left: 0; right: 0; bottom: 0;
        }

        /* ════════════════════════════════
           MODE A — CAROUSEL
        ════════════════════════════════ */
        #carousel {
            width: 100%; height: 100%;
            position: relative; display: none;
        }
        .car-slide {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 1.2s ease;
            pointer-events: none;
        }
        .car-slide.active { opacity: 1; pointer-events: auto; }
        .car-slide img { max-width: 100%; max-height: 100%; object-fit: contain; }
        #carMeta {
            position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
            text-align: center; pointer-events: none;
        }
        #carLabel { font-size: 11px; letter-spacing: 0.14em; color: rgba(255,255,255,0.45); text-transform: uppercase; }
        #carTime  { font-size: 10px; color: rgba(255,255,255,0.22); margin-top: 3px; }
        #carDots  {
            position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px;
        }
        .car-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: rgba(255,255,255,0.18); transition: background 0.4s;
        }
        .car-dot.active { background: rgba(255,255,255,0.6); }

        /* ════════════════════════════════
           MODE C — SPLIT (live + strip)
        ════════════════════════════════ */
        #split {
            width: 100%; height: 100%;
            display: none; flex-direction: column;
        }
        #splitMain {
            flex: 1; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: #050505;
        }
        #splitMain img {
            max-width: 100%; max-height: 100%; object-fit: contain;
            transition: opacity 0.5s ease;
        }
        #splitMainMeta {
            position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
            text-align: center;
        }
        #splitMainMeta .slabel { font-size: 11px; letter-spacing: 0.12em; color: rgba(255,255,255,0.4); text-transform: uppercase; }
        #splitMainMeta .stime  { font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 2px; }
        #splitStrip {
            height: 140px; flex-shrink: 0;
            border-top: 1px solid #161616;
            background: #060606;
            display: flex; align-items: center;
            overflow-x: auto; overflow-y: hidden;
            gap: 6px; padding: 8px 10px;
            scroll-behavior: smooth;
        }
        #splitStrip::-webkit-scrollbar { height: 3px; }
        #splitStrip::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
        .strip-thumb {
            flex-shrink: 0; height: 110px; border-radius: 4px;
            overflow: hidden; cursor: pointer; opacity: 0.55;
            border: 1px solid transparent;
            transition: opacity 0.25s, border-color 0.25s;
        }
        .strip-thumb:hover { opacity: 0.85; }
        .strip-thumb.active { opacity: 1; border-color: #90caf9; }
        .strip-thumb img { height: 100%; width: auto; display: block; }

        /* ════════════════════════════════
           MODE D — GROUPED BY VIZ
        ════════════════════════════════ */
        #grouped {
            width: 100%; height: 100%;
            display: none; overflow-y: auto; overflow-x: hidden;
            padding: 16px 0 32px;
        }
        #grouped::-webkit-scrollbar { width: 4px; }
        #grouped::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
        .viz-group { margin-bottom: 24px; }
        .viz-group-label {
            font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
            color: #444; padding: 0 16px 8px;
        }
        .viz-group-row {
            display: flex; gap: 8px;
            overflow-x: auto; overflow-y: hidden;
            padding: 0 16px 8px;
            scroll-behavior: smooth;
        }
        .viz-group-row::-webkit-scrollbar { height: 3px; }
        .viz-group-row::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
        .group-thumb {
            flex-shrink: 0; height: 160px; border-radius: 5px;
            overflow: hidden; cursor: pointer; opacity: 0.7;
            border: 1px solid #1a1a1a;
            transition: opacity 0.2s, border-color 0.2s;
            position: relative;
        }
        .group-thumb:hover { opacity: 1; border-color: #333; }
        .group-thumb img { height: 100%; width: auto; display: block; }
        .group-thumb .gt-time {
            position: absolute; bottom: 4px; right: 5px;
            font-size: 9px; color: rgba(255,255,255,0.35);
        }

        /* ── Lightbox ── */
        #lightbox {
            display: none; position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.92);
            align-items: center; justify-content: center;
            cursor: zoom-out;
        }
        #lightbox.open { display: flex; }
        #lightbox img { max-width: 96vw; max-height: 96vh; object-fit: contain; border-radius: 4px; }

        /* ── Empty state ── */
        #emptyState {
            display: none; position: absolute; inset: 0;
            align-items: center; justify-content: center;
            flex-direction: column; gap: 10px; color: #333;
            font-size: 13px; letter-spacing: 0.06em;
        }
    </style>
</head>
<body>

<!-- Top bar -->
<div id="topBar">
    <h1>Readings</h1>
    <button class="mode-btn active" data-mode="carousel">Carousel</button>
    <button class="mode-btn"        data-mode="split">Live / Archive</button>
    <button class="mode-btn"        data-mode="grouped">By Viz</button>
    <span id="readingCount"></span>
</div>

<div id="panel">

    <!-- MODE A: Carousel -->
    <div id="carousel">
        <!-- slides injected by JS -->
        <div id="carMeta">
            <div id="carLabel"></div>
            <div id="carTime"></div>
        </div>
        <div id="carDots"></div>
    </div>

    <!-- MODE C: Split -->
    <div id="split">
        <div id="splitMain">
            <img id="splitMainImg" src="" alt="">
            <div id="splitMainMeta">
                <div class="slabel" id="splitMainLabel"></div>
                <div class="stime"  id="splitMainTime"></div>
            </div>
        </div>
        <div id="splitStrip"></div>
    </div>

    <!-- MODE D: Grouped -->
    <div id="grouped" id="grouped"></div>

    <!-- Empty state -->
    <div id="emptyState" style="display:flex;">
        No readings saved yet.<br>
        <span style="font-size:11px; color:#252525;">Complete a reading session to populate this gallery.</span>
    </div>

</div>

<!-- Lightbox -->
<div id="lightbox">
    <img id="lightboxImg" src="" alt="">
</div>

<script>
// ── State ──
let allReadings   = [];
let currentMode   = 'carousel';
let carIndex      = 0;
let carTimer      = null;
const CAR_INTERVAL = 6000; // ms per slide
const REFRESH_MS   = 8000; // poll for new readings

// ── Utilities ──
function fmtTime(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString() + '  ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ── Load & render ──
async function loadAndRender() {
    const fresh = await ReadingsDB.getAll();
    // Only re-render if count changed (avoids flash on every poll)
    if (fresh.length === allReadings.length) return;
    allReadings = fresh;
    document.getElementById('readingCount').textContent =
        allReadings.length ? `${allReadings.length} reading${allReadings.length !== 1 ? 's' : ''}` : '';

    const empty = document.getElementById('emptyState');
    if (allReadings.length === 0) {
        empty.style.display = 'flex';
        clearCarousel(); clearSplit(); clearGrouped();
        return;
    }
    empty.style.display = 'none';
    renderAll();
}

function renderAll() {
    buildCarousel();
    buildSplit();
    buildGrouped();
}

// ════ CAROUSEL ════
function buildCarousel() {
    const el = document.getElementById('carousel');
    // Remove old slides
    el.querySelectorAll('.car-slide').forEach(s => s.remove());

    const dots = document.getElementById('carDots');
    dots.innerHTML = '';

    allReadings.forEach((r, i) => {
        const slide = document.createElement('div');
        slide.className = 'car-slide' + (i === carIndex ? ' active' : '');
        slide.dataset.idx = i;
        const img = document.createElement('img');
        img.src = r.imageDataUrl;
        slide.appendChild(img);
        el.insertBefore(slide, document.getElementById('carMeta'));

        const dot = document.createElement('div');
        dot.className = 'car-dot' + (i === carIndex ? ' active' : '');
        dots.appendChild(dot);
    });

    updateCarMeta();
    restartCarTimer();
}

function clearCarousel() {
    document.getElementById('carousel').querySelectorAll('.car-slide').forEach(s => s.remove());
    document.getElementById('carDots').innerHTML = '';
    clearTimeout(carTimer);
}

function goToSlide(idx) {
    const slides = document.querySelectorAll('.car-slide');
    const dots   = document.querySelectorAll('.car-dot');
    if (!slides.length) return;
    slides[carIndex]?.classList.remove('active');
    dots[carIndex]?.classList.remove('active');
    carIndex = (idx + allReadings.length) % allReadings.length;
    slides[carIndex]?.classList.add('active');
    dots[carIndex]?.classList.add('active');
    updateCarMeta();
}

function updateCarMeta() {
    const r = allReadings[carIndex];
    if (!r) return;
    document.getElementById('carLabel').textContent = r.vizLabel || r.vizKey;
    document.getElementById('carTime').textContent  = fmtTime(r.timestamp);
}

function restartCarTimer() {
    clearTimeout(carTimer);
    carTimer = setInterval(() => goToSlide(carIndex + 1), CAR_INTERVAL);
}

// ════ SPLIT ════
function buildSplit() {
    const strip = document.getElementById('splitStrip');
    strip.innerHTML = '';
    if (!allReadings.length) return;

    allReadings.slice().reverse().forEach((r, i) => {
        const thumb = document.createElement('div');
        thumb.className = 'strip-thumb' + (i === 0 ? ' active' : '');
        thumb.dataset.idx = allReadings.length - 1 - i;
        const img = document.createElement('img');
        img.src = r.imageDataUrl;
        thumb.appendChild(img);
        thumb.addEventListener('click', () => setSplitMain(parseInt(thumb.dataset.idx)));
        strip.appendChild(thumb);
    });

    // Show most recent by default
    setSplitMain(allReadings.length - 1);
}

function setSplitMain(idx) {
    const r = allReadings[idx];
    if (!r) return;
    const mainImg = document.getElementById('splitMainImg');
    mainImg.style.opacity = 0;
    setTimeout(() => { mainImg.src = r.imageDataUrl; mainImg.style.opacity = 1; }, 200);
    document.getElementById('splitMainLabel').textContent = r.vizLabel || r.vizKey;
    document.getElementById('splitMainTime').textContent  = fmtTime(r.timestamp);
    document.querySelectorAll('.strip-thumb').forEach(t => {
        t.classList.toggle('active', parseInt(t.dataset.idx) === idx);
    });
    // Scroll active thumb into view
    const activeThumb = document.querySelector(`.strip-thumb[data-idx="${idx}"]`);
    activeThumb?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function clearSplit() {
    document.getElementById('splitStrip').innerHTML = '';
    document.getElementById('splitMainImg').src = '';
}

// ════ GROUPED ════
function buildGrouped() {
    const el = document.getElementById('grouped');
    el.innerHTML = '';
    if (!allReadings.length) return;

    // Group by vizKey preserving insertion order
    const groups = {};
    allReadings.forEach(r => {
        if (!groups[r.vizKey]) groups[r.vizKey] = { label: r.vizLabel || r.vizKey, items: [] };
        groups[r.vizKey].items.push(r);
    });

    Object.entries(groups).forEach(([vizKey, { label, items }]) => {
        const group = document.createElement('div');
        group.className = 'viz-group';

        const heading = document.createElement('div');
        heading.className = 'viz-group-label';
        heading.textContent = `${label}  ·  ${items.length}`;
        group.appendChild(heading);

        const row = document.createElement('div');
        row.className = 'viz-group-row';

        items.slice().reverse().forEach(r => {
            const thumb = document.createElement('div');
            thumb.className = 'group-thumb';
            const img = document.createElement('img');
            img.src = r.imageDataUrl;
            const time = document.createElement('div');
            time.className = 'gt-time';
            time.textContent = fmtTime(r.timestamp);
            thumb.appendChild(img);
            thumb.appendChild(time);
            thumb.addEventListener('click', () => openLightbox(r.imageDataUrl));
            row.appendChild(thumb);
        });

        group.appendChild(row);
        el.appendChild(group);
    });
}

function clearGrouped() {
    document.getElementById('grouped').innerHTML = '';
}

// ════ LIGHTBOX ════
function openLightbox(src) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightboxImg').src = src;
    lb.classList.add('open');
}
document.getElementById('lightbox').addEventListener('click', () => {
    document.getElementById('lightbox').classList.remove('open');
});

// ════ MODE SWITCHING ════
function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.mode === mode)
    );
    document.getElementById('carousel').style.display = mode === 'carousel' ? 'block' : 'none';
    document.getElementById('split').style.display    = mode === 'split'    ? 'flex'  : 'none';
    document.getElementById('grouped').style.display  = mode === 'grouped'  ? 'block' : 'none';

    if (mode === 'carousel') restartCarTimer();
    else clearTimeout(carTimer);
}

document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => setMode(btn.dataset.mode));
});

// ════ INIT & AUTO-REFRESH ════
setMode('carousel');
loadAndRender();
setInterval(loadAndRender, REFRESH_MS);
</script>
</body>
</html>
