                }, // End dashboard

                auraDashboard: (data) => {
                    if (data.length === 0 || data[0].length === 0) return;

                    const NUM_SENSORS = data[0].length;
                    const W = p.width;
                    const H = p.height;
                    const m = 10; // margin

                    // ── Layout ──────────────────────────────────────────────
                    // Left column  : 4 small line sparklines  (sensors 0–3)
                    // Right column : 4 small line sparklines  (sensors 4–7)
                    // Centre       : central aura sigil
                    // Bottom strip : full-width combined line graph
                    const colW    = W * 0.20;
                    const centreX = W * 0.5;
                    const centreY = H * 0.46;
                    const centreR = Math.min(W * 0.22, H * 0.36);
                    const sparkH  = (H * 0.72 - m * 5) / 4;
                    const sparkW  = colW - m * 2;
                    const bottomH = H * 0.22 - m;

                    // ── Dark background ──────────────────────────────────────
                    p.background(0, 0, 8);

                    // ── Helper: draw one sparkline in a local box ─────────────
                    const drawSparkline = (bx, by, bw, bh, sensorIdx, hue) => {
                        // Panel bg
                        p.noStroke();
                        p.fill(0, 0, 13);
                        p.rect(bx, by, bw, bh, 3);

                        // Sensor label + last value
                        const lastVal = data[data.length - 1][sensorIdx] || 0;
                        p.fill(hue, 60, 70, 0.55);
                        p.noStroke();
                        p.textAlign(p.LEFT, p.TOP);
                        p.textSize(8);
                        p.text(`S${sensorIdx + 1}`, bx + 4, by + 3);
                        p.textAlign(p.RIGHT, p.TOP);
                        p.textSize(8);
                        p.text(Math.round(lastVal), bx + bw - 4, by + 3);

                        // Filled area under curve
                        if (data.length < 2) return;
                        const pad = 12;
                        const xStep = bw / (data.length - 1);
                        p.noStroke();
                        p.fill(hue, 70, 75, 0.18);
                        p.beginShape();
                        p.vertex(bx, by + bh);
                        for (let i = 0; i < data.length; i++) {
                            const v = data[i][sensorIdx] || 0;
                            const sx = bx + i * xStep;
                            const sy = p.map(v, 0, 360, by + bh - pad, by + pad);
                            p.vertex(sx, sy);
                        }
                        p.vertex(bx + bw, by + bh);
                        p.endShape(p.CLOSE);

                        // Line
                        p.noFill();
                        p.stroke(hue, 80, 88, 0.8);
                        p.strokeWeight(1);
                        p.beginShape();
                        for (let i = 0; i < data.length; i++) {
                            const v = data[i][sensorIdx] || 0;
                            const sx = bx + i * xStep;
                            const sy = p.map(v, 0, 360, by + bh - pad, by + pad);
                            p.vertex(sx, sy);
                        }
                        p.endShape();

                        // Current-value bar at bottom
                        const barH = 3;
                        const barW = p.map(lastVal, 0, 360, 0, bw);
                        p.noStroke();
                        p.fill(hue, 85, 90, 0.7);
                        p.rect(bx, by + bh - barH, barW, barH, 0, 0, 1, 1);
                    };

                    // ── Left sparklines (sensors 0–3) ────────────────────────
                    for (let j = 0; j < 4 && j < NUM_SENSORS; j++) {
                        const bx = m;
                        const by = m + j * (sparkH + m);
                        const hue = (j / NUM_SENSORS) * 300;
                        drawSparkline(bx, by, sparkW, sparkH, j, hue);
                    }

                    // ── Right sparklines (sensors 4–7) ───────────────────────
                    for (let j = 4; j < 8 && j < NUM_SENSORS; j++) {
                        const bx = W - colW + m;
                        const by = m + (j - 4) * (sparkH + m);
                        const hue = (j / NUM_SENSORS) * 300;
                        drawSparkline(bx, by, sparkW, sparkH, j, hue);
                    }

                    // ── Central aura sigil ───────────────────────────────────
                    // Compute per-sensor averages across the whole session
                    const avgs = [];
                    for (let j = 0; j < NUM_SENSORS; j++) {
                        let sum = 0;
                        for (let i = 0; i < data.length; i++) sum += data[i][j] || 0;
                        avgs.push(sum / data.length);
                    }
                    const totalAvg = avgs.reduce((s, v) => s + v, 0);
                    const energyRatio = p.constrain(totalAvg / (NUM_SENSORS * 360), 0, 1);

                    // Outer orbit ring
                    p.noFill();
                    p.stroke(0, 0, 22, 0.5);
                    p.strokeWeight(0.5);
                    p.ellipse(centreX, centreY, centreR * 2.1, centreR * 2.1);

                    // One lobe per sensor — drawn as layered semi-transparent ellipses
                    p.noStroke();
                    for (let j = 0; j < NUM_SENSORS; j++) {
                        const angle = (j / NUM_SENSORS) * p.TWO_PI - p.HALF_PI;
                        const avg = avgs[j];
                        const lobeLen = p.map(avg, 0, 360, 0, centreR * 0.95);
                        const lobeW   = lobeLen * 0.38;
                        const hue     = p.map(avg, 0, 360, 260, 45);
                        const sat     = p.map(avg, 0, 360, 40, 90);
                        const bri     = p.map(avg, 0, 360, 40, 95);

                        // Three alpha passes for soft glow layering
                        for (let pass = 0; pass < 3; pass++) {
                            const scale = 1 + pass * 0.35;
                            const a = [0.35, 0.18, 0.07][pass];
                            p.fill(hue, sat * (1 - pass * 0.2), bri, a);
                            p.push();
                            p.translate(centreX, centreY);
                            p.rotate(angle);
                            p.ellipse(lobeLen * 0.5, 0, lobeLen * scale, lobeW * scale);
                            p.pop();
                        }
                    }

                    // 8-point sigil arms over the top
                    for (let j = 0; j < NUM_SENSORS; j++) {
                        const angle  = (j / NUM_SENSORS) * p.TWO_PI - p.HALF_PI;
                        const avg    = avgs[j];
                        const tipLen = p.map(avg, 0, 360, 4, centreR * 0.45);
                        const hue    = p.map(avg, 0, 360, 260, 45);

                        const tx = centreX + p.cos(angle) * tipLen;
                        const ty = centreY + p.sin(angle) * tipLen;
                        const sa = p.HALF_PI;
                        const sw = 4;
                        const sx1 = centreX + p.cos(angle + sa) * sw;
                        const sy1 = centreY + p.sin(angle + sa) * sw;
                        const sx2 = centreX + p.cos(angle - sa) * sw;
                        const sy2 = centreY + p.sin(angle - sa) * sw;

                        p.fill(hue, 80, 90, 0.55);
                        p.noStroke();
                        p.beginShape();
                        p.vertex(tx, ty);
                        p.vertex(sx1, sy1);
                        p.vertex(sx2, sy2);
                        p.endShape(p.CLOSE);
                    }

                    // Concentric arc rings — one ring per sensor, time as arc angle
                    const ringPad   = 4;
                    const ringCount = NUM_SENSORS;
                    const ringSpacing = (centreR * 0.95) / ringCount;
                    const angleStep = p.TWO_PI / data.length;
                    p.noFill();
                    for (let j = 0; j < ringCount; j++) {
                        const r   = (j + 0.5) * ringSpacing;
                        const hue = (j / ringCount) * 300;
                        p.strokeWeight(p.max(0.8, ringSpacing * 0.35));
                        for (let i = 0; i < data.length; i++) {
                            const val = data[i][j] || 0;
                            if (val <= 0) continue;
                            const startA = i * angleStep - p.HALF_PI;
                            const endA   = (i + 1) * angleStep - p.HALF_PI - p.radians(0.4);
                            if (endA <= startA) continue;
                            const arcAlpha = p.map(val, 0, 360, 0.08, 0.55);
                            p.stroke(hue, 75, 88, arcAlpha);
                            p.arc(centreX, centreY, r * 2, r * 2, startA, endA);
                        }
                    }

                    // Centre glow dot
                    p.noStroke();
                    const glowHue = p.lerp(200, 45, energyRatio);
                    p.fill(glowHue, 50, 100, 0.12);
                    p.ellipse(centreX, centreY, 40, 40);
                    p.fill(glowHue, 60, 100, 0.5);
                    p.ellipse(centreX, centreY, 10, 10);

                    // ── Bottom combined line graph ────────────────────────────
                    const bgy = H - bottomH - m;
                    p.noStroke();
                    p.fill(0, 0, 12);
                    p.rect(m, bgy, W - m * 2, bottomH, 3);

                    if (data.length >= 2) {
                        const xStep = (W - m * 2) / (data.length - 1);
                        const padV  = 8;
                        for (let j = 0; j < NUM_SENSORS; j++) {
                            const hue = (j / NUM_SENSORS) * 300;
                            p.noFill();
                            p.stroke(hue, 75, 85, 0.65);
                            p.strokeWeight(0.8);
                            p.beginShape();
                            for (let i = 0; i < data.length; i++) {
                                const v  = data[i][j] || 0;
                                const sx = m + i * xStep;
                                const sy = p.map(v, 0, 360, bgy + bottomH - padV, bgy + padV);
                                p.vertex(sx, sy);
                            }
                            p.endShape();
                        }
                    }

                    // ── "reading complete" text ──────────────────────────────
                    p.noStroke();
                    p.fill(0, 0, 72, 0.7);
                    p.textAlign(p.CENTER, p.BOTTOM);
                    p.textSize(11);
                    p.textFont('sans-serif');
                    p.text('reading complete', centreX, bgy - 6);

                    // ── Panel border lines ───────────────────────────────────
                    p.noFill();
                    p.stroke(0, 0, 28, 0.4);
                    p.strokeWeight(0.5);
                    p.rect(m, bgy, W - m * 2, bottomH, 3);
                }, // End auraDashboard

            }; // End visualizations object

            p.setup = () => {
                const area = document.getElementById('canvasArea');
                canvasWidth  = area.offsetWidth  || window.innerWidth;
                canvasHeight = area.offsetHeight || window.innerHeight;
                originalCanvasHeight = canvasHeight;

                let cnv = p.createCanvas(canvasWidth, canvasHeight);
                cnv.parent('canvasContainer'); // Attach canvas to the div
                p.colorMode(p.HSB, 360, 100, 100, 1.0); // Use HSB for easier color manipulation
                p.noLoop(); // Start paused
                p.background(0, 0, 10); // Dark background initially
                p.textAlign(p.CENTER, p.CENTER);
                p.fill(0, 0, 80);
                p.text('Connect device and collect data to visualize.', p.width / 2, p.height / 2);

                // Initialize overlay Y based on loaded settings AFTER canvas exists
                if (currentLiveVisualization === 'wovenTapestryOverlay') {
                     overlayCurrentY = p.height;
                     console.log(`Setup: Initialized overlayCurrentY to ${overlayCurrentY} based on loaded setting.`);
                } else {
                    overlayCurrentY = -1; // Ensure it's reset if not starting in overlay mode
                }

                // --- Add Fullscreen Toggle on Click ---
                cnv.mouseClicked(async () => {
                    // Check if already in fullscreen *on this element* or any element
                    if (!document.fullscreenElement) {
                        try {
                            // Request fullscreen on the canvas element
                            await p.canvas.requestFullscreen();
                        } catch (err) {
                            console.error(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
                            // Optionally show a message to the user
                            // showError(`Fullscreen request failed: ${err.message}`);
                        }
                    } else {
                        // Exit fullscreen if currently active
                        if (document.exitFullscreen) {
                            await document.exitFullscreen();
                        }
                    }
                });
                 // --- End Fullscreen Toggle ---
            };

            p.draw = () => {
                 particles = p.sketchInstanceVariables.particles; // Ensure local reference is up-to-date

                // --- Installation Mode: Watching/Waiting State ---
                if ((isWatching || sigilDissolving) && !isCollecting) {
                    const cx = p.width / 2;
                    const cy = p.height / 2;
                    const t = p.frameCount;
                    const NUM_NODES = 8;
                    const nodeRadius = Math.min(p.width, p.height) * 0.32;

                    // Gather live sensor values (fall back to zeros if no data yet)
                    const sensorVals = [];
                    for (let j = 0; j < NUM_NODES; j++) {
                        sensorVals.push((absoluteLatestData && absoluteLatestData[j] != null)
                            ? absoluteLatestData[j] : 0);
                    }

                    // How many nodes are above the trigger threshold
                    const activeCount = triggerSensorIndices.filter(i => (sensorVals[i] || 0) > TRIGGER_THRESHOLD).length;
                    const alignRatio = p.constrain(activeCount / TRIGGER_MIN_COUNT, 0, 1); // 0→1 as we approach trigger

                    // --- Background: slow hue shift toward amber as sensors activate ---
                    // Idle: near-black blue-grey. Active: deep amber-brown.
                    const bgHue  = p.lerp(220, 35, alignRatio);
                    const bgSat  = p.lerp(20, 55, alignRatio);
                    const bgBri  = p.lerp(7, 14, alignRatio);
                    p.background(bgHue, bgSat, bgBri);

                    // Slow global rotation for the whole sigil
                    const globalRotation = t * 0.003;

                    // --- Outer ghost ring ---
                    const ghostPulse = p.sin(t * 0.025) * 0.5 + 0.5;
                    p.noFill();
                    p.stroke(bgHue, 15, 40, 0.12 + ghostPulse * 0.08);
                    p.strokeWeight(1);
                    p.ellipse(cx, cy, nodeRadius * 2.35, nodeRadius * 2.35);

                    // --- Node loop ---
                    for (let j = 0; j < NUM_NODES; j++) {
                        const baseAngle = (j / NUM_NODES) * p.TWO_PI - p.HALF_PI + globalRotation;
                        const nx = cx + p.cos(baseAngle) * nodeRadius;
                        const ny = cy + p.sin(baseAngle) * nodeRadius;

                        const val = sensorVals[j] || 0;
                        const isTriggered = triggerSensorIndices.includes(j) && val > TRIGGER_THRESHOLD;
                        const fillRatio = p.constrain(val / TRIGGER_THRESHOLD, 0, 1); // 0→1 as value approaches threshold

                        // Per-node hue: idle cool blue, activated warm gold
                        const nodeHue = p.lerp(200, 45, fillRatio);
                        const nodeSat = p.lerp(40, 90, fillRatio);
                        const nodeBri = p.lerp(35, 95, fillRatio);
                        const nodeAlpha = p.lerp(0.25, 1.0, fillRatio);

                        // --- Line from centre to node ---
                        const lineAlpha = isTriggered
                            ? p.lerp(0.35, 0.75, p.sin(t * 0.08 + j) * 0.5 + 0.5)
                            : fillRatio * 0.2;
                        p.stroke(nodeHue, nodeSat, nodeBri, lineAlpha);
                        p.strokeWeight(isTriggered ? 1.2 : 0.6);
                        p.line(cx, cy, nx, ny);

                        // --- Orrery arc: sweeps from 0 to fillRatio around the node ---
                        const arcR = 14;
                        p.noFill();
                        // Dim track ring
                        p.stroke(nodeHue, 20, 30, 0.3);
                        p.strokeWeight(2);
                        p.arc(nx, ny, arcR * 2, arcR * 2, -p.HALF_PI, -p.HALF_PI + p.TWO_PI * 0.999);
                        // Fill arc
                        if (fillRatio > 0) {
                            p.stroke(nodeHue, nodeSat, nodeBri, nodeAlpha);
                            p.strokeWeight(2.5);
                            p.arc(nx, ny, arcR * 2, arcR * 2,
                                -p.HALF_PI,
                                -p.HALF_PI + p.TWO_PI * fillRatio);
                        }

                        // --- Node dot ---
                        p.noStroke();
                        if (isTriggered) {
                            // Outer glow
                            const glowR = 10 + p.sin(t * 0.12 + j * 1.3) * 3;
                            p.fill(nodeHue, nodeSat * 0.6, nodeBri, 0.15);
                            p.ellipse(nx, ny, glowR * 2.8, glowR * 2.8);
                            p.fill(nodeHue, nodeSat, nodeBri, 0.5);
                            p.ellipse(nx, ny, glowR * 1.6, glowR * 1.6);
                        }
                        // Core dot
                        p.fill(nodeHue, nodeSat, nodeBri, nodeAlpha);
                        p.ellipse(nx, ny, isTriggered ? 8 : 5, isTriggered ? 8 : 5);
                    }

                    // --- Central 8-pointed sigil star ---
                    // Each arm assembles when its corresponding node activates
                    const starInner = 8;
                    const starOuter = 28;
                    p.noStroke();
                    for (let j = 0; j < NUM_NODES; j++) {
                        const val = sensorVals[j] || 0;
                        const isTriggered = triggerSensorIndices.includes(j) && val > TRIGGER_THRESHOLD;
                        const fillRatio = p.constrain(val / TRIGGER_THRESHOLD, 0, 1);
                        const nodeHue = p.lerp(200, 45, fillRatio);
                        const armAlpha = isTriggered
                            ? p.lerp(0.5, 0.9, p.sin(t * 0.06 + j) * 0.5 + 0.5)
                            : fillRatio * 0.25;
                        if (armAlpha < 0.02) continue;

                        const armAngle = (j / NUM_NODES) * p.TWO_PI - p.HALF_PI + globalRotation;
                        const tipLen = p.lerp(starInner, starOuter, fillRatio);

                        // Arm tip
                        const tx = cx + p.cos(armAngle) * tipLen;
                        const ty = cy + p.sin(armAngle) * tipLen;
                        // Side shoulders (perpendicular, narrow)
                        const sideAngle = armAngle + p.HALF_PI;
                        const sw = 3;
                        const sx1 = cx + p.cos(sideAngle) * sw;
                        const sy1 = cy + p.sin(sideAngle) * sw;
                        const sx2 = cx - p.cos(sideAngle) * sw;
                        const sy2 = cy - p.sin(sideAngle) * sw;

                        p.fill(nodeHue, 80, 90, armAlpha);
                        p.beginShape();
                        p.vertex(tx, ty);
                        p.vertex(sx1, sy1);
                        p.vertex(sx2, sy2);
                        p.endShape(p.CLOSE);
                    }

                    // Central dot — glows brighter as all nodes align
                    const centralGlow = p.lerp(0.3, 1.0, alignRatio);
                    const centralHue  = p.lerp(200, 45, alignRatio);
                    p.noStroke();
                    p.fill(centralHue, 60, 90, centralGlow * 0.2);
                    p.ellipse(cx, cy, 28, 28);
                    p.fill(centralHue, 70, 95, centralGlow * 0.7);
                    p.ellipse(cx, cy, 10, 10);

                    // --- "waiting..." text --- fades gently
                    const textAlpha = p.map(p.sin(t * 0.018), -1, 1, 0.25, 0.65);
                    p.noStroke();
                    p.fill(0, 0, 88, textAlpha);
                    p.textAlign(p.CENTER, p.CENTER);
                    p.textSize(13);
                    p.textFont('sans-serif');
                    p.text('waiting...', cx, cy + nodeRadius + 36);

                    // --- Sensor bars at bottom (commented out for now) ---
                    // if (absoluteLatestData && absoluteLatestData.length > 0) {
                    //     const barCount = absoluteLatestData.length;
                    //     const barW = p.width / barCount;
                    //     p.noStroke();
                    //     for (let j = 0; j < barCount; j++) {
                    //         const val = absoluteLatestData[j] || 0;
                    //         const barH = p.map(val, 0, 360, 0, p.height * 0.12);
                    //         const hue = p.map(val, 0, 360, 200, 0);
                    //         p.fill(hue, 60, 70, 0.4);
                    //         p.rect(j * barW, p.height - barH, barW - 1, barH);
                    //     }
                    // }

                    // --- Dissolve overlay: smooth white fade into collection ---
                    if (sigilDissolving) {
                        sigilDissolveAlpha += 0.035; // ~28 frames to full white
                        p.noStroke();
                        p.fill(0, 0, 100, p.constrain(sigilDissolveAlpha, 0, 1));
                        p.rect(0, 0, p.width, p.height);
                        if (sigilDissolveAlpha >= 1) {
                            sigilDissolving = false;
                            sigilDissolveAlpha = 0;
                        }
                    }

                    return; // Skip remaining draw logic
                }
                // -------------------------------------------------

                if (isCollecting) {
                    // --- Check for Debug Mode FIRST ---
                    if (isDebugMode) {
                        p.background(0, 0, 10); // Clear with dark background
                        p.fill(0, 0, 90); // White-ish text
                        p.noStroke();
                        p.textAlign(p.LEFT, p.TOP);
                        p.textSize(12);
                        p.textFont('monospace'); // Use monospace for better alignment
                        let debugText = "DEBUG MODE: Raw Values Received\n-----------------------------\n";
                        if (absoluteLatestData && absoluteLatestData.length > 0) {
                            // Format the array nicely
                            debugText += `[${absoluteLatestData.join(', ')}]`;
                        } else {
                            debugText += "[Waiting for data...]";
                        }
                        p.text(debugText, 10, 10);
                        return; // Exit draw early, skipping normal live viz
                    }
                    // --- END Debug Mode Check ---


                    // --- Live Visualization Logic (only runs if not in debug mode) ---
                     let latestValidData = null;
                     if (collectedData.length > 0) {
                         latestValidData = collectedData[collectedData.length - 1];
                     }
                     // We also need expectedDataLength to know how many streams to expect
                     const numStreams = (expectedDataLength > 0) ? expectedDataLength : 1; // Default to 1 if not set

                    // --- Select live visualization based on dropdown ---
                    switch (currentLiveVisualization) {
                        case 'centeredStrips':
                            p.background(30, 30, 40); // Dark background each frame
                             // --- Centered Strips Logic ---
                             // Must have valid data to draw strips
                             if (!latestValidData || collectedData.length === 0) return;

                             // **NO p.background() call here**
                             const stripBoxHeight = 2;
                             const stripTopEdgeY = p.height - (collectedData.length * stripBoxHeight);

                             let stripTotalActualWidth = 0;
                             let stripActualBoxWidths = [];
                             const stripMaxBoxWidthPerStream = p.width / numStreams;
                            for (let j = 0; j < numStreams; j++) {
                                 const value = latestValidData[j] || 0;
                                 const boxWidth = p.map(value, 0, 360, 0, stripMaxBoxWidthPerStream);
                                 stripActualBoxWidths.push(boxWidth);
                                 stripTotalActualWidth += boxWidth;
                             }
                             let stripStartX = (p.width - stripTotalActualWidth) / 2;
                             let stripCurrentX = stripStartX;
                            p.noStroke();
                            for (let j = 0; j < numStreams; j++) {
                                 const value = latestValidData[j] || 0;
                                 const boxWidth = stripActualBoxWidths[j];
                                const hue = p.map(value, 0, 360, 240, 0);
                                p.fill(hue, 90, 90);
                                if (boxWidth > 0) {
                                     p.rect(stripCurrentX, stripTopEdgeY, boxWidth, stripBoxHeight);
                                 }
                                 stripCurrentX += boxWidth;
                             }
                             break; // End of centeredStrips case

                        case 'wovenTapestry':
                            // --- Woven Tapestry Logic (Full Width, Wrap-Around) ---
                            p.background(30, 30, 40); // Dark background each frame

                            const warpSpacing = 8;
                            const warpColor = p.color(0, 0, 40);
                            const weftHeight = 4; // Fixed height for stable wrapping calculation

                            // 1. Draw Warp Threads
                            p.stroke(warpColor);
                            p.strokeWeight(1);
                            for (let wx = warpSpacing / 2; wx < p.width; wx += warpSpacing) {
                                p.line(wx, 0, wx, p.height);
                            }

                            // 2. Draw Weft Rows (wrap around, draw only visible)
                            p.noStroke();
                            if (collectedData.length > 0 && weftHeight > 0) {
                                const maxVisibleRows = Math.floor(p.height / weftHeight);
                                // Calculate the starting index in collectedData to draw
                                const startIndex = Math.max(0, collectedData.length - maxVisibleRows);

                                // Loop only through the data points that should be visible
                                for (let k = startIndex; k < collectedData.length; k++) {
                                    const dataPoint = collectedData[k];
                                    if (!dataPoint || dataPoint.length !== numStreams) continue;

                                    // Calculate the index relative to the visible window
                                    const relativeIndex = k - startIndex;
                                    // Calculate Y position based on relative index
                                    const rowY = p.height - (relativeIndex + 1) * weftHeight;

                                    // --- Calculate Proportional Widths ---
                                    let totalValueForRow = 0;
                                    for (let j = 0; j < numStreams; j++) {
                                        totalValueForRow += dataPoint[j] || 0;
                                    }

                                    let rowCurrentX = 0; // Start from left edge

                                    // Draw segments proportionally across the full width
                                    for (let j = 0; j < numStreams; j++) {
                                        const value = dataPoint[j] || 0;
                                        let proportionalWidth = 0;

                                        if (totalValueForRow > 0) {
                                            proportionalWidth = (value / totalValueForRow) * p.width;
                                        } else if (numStreams > 0) {
                                            proportionalWidth = p.width / numStreams;
                                        }

                                        // Map value to color and alpha
                                        const hue = p.map(value, 0, 360, 0, 360);
                                        const saturation = p.map(value, 0, 360, 40, 90);
                                        const brightness = p.map(value, 0, 360, 50, 95);
                                        const alpha = p.map(value, 0, 360, 0.5, 1.0);

                                        if (totalValueForRow === 0) {
                                            p.fill(0, 0, 50, 0.7);
                                        } else {
                                            p.fill(hue, saturation, brightness, alpha);
                                        }

                                        if (proportionalWidth > 0) {
                                            // Ensure drawing doesn't go below 0 due to float errors
                                            if (rowY >= 0) {
                                                 p.rect(rowCurrentX, rowY, proportionalWidth, weftHeight);
                                            }
                                        }
                                        rowCurrentX += proportionalWidth;
                                    }
                                }
                             } // End if collectedData.length > 0
                            break; // End of wovenTapestry case

                        case 'particleEmitters':
                              // --- Particle Emitter Logic ---
                              // This logic still runs every frame based on the *absolute latest* data
                              // received (via parseAndStoreData triggering redraw indirectly),
                              // regardless of the threshold, as it doesn't rely on collectedData history.
                              // Fetch the absolute latest data point processed (careful if parsing is slow)
                              // We need a way to get the *very* last parsed line, not just the last *stored* one.
                              // Let's modify parseAndStoreData slightly to store the absolute latest line.

                              // *** Need to adjust parseAndStoreData and add a new global variable ***
                              // *** See adjustment below ***

                              p.background(0, 0, 10, 0.1); // Trail effect

                              if (!absoluteLatestData || (expectedDataLength > 0 && absoluteLatestData.length !== expectedDataLength)) {
                                  break; // Check length against expected if known
                              }

                              const numEmitterStreams = absoluteLatestData.length;

                              for (let j = 0; j < numEmitterStreams; j++) {
                                  const value = absoluteLatestData[j] || 0; // Use absolute latest
                                  // ... (rest of emitter calculations: emitterX, Y, rate, hue, etc.) ...
                                   const emitterX = p.map(j, 0, numEmitterStreams - 1 || 1, p.width * 0.1, p.width * 0.9);
                                   const emitterY = p.height / 2;
                                   const emissionRate = p.map(value, 0, 360, 0, 3);
                                   const hue = p.map(value, 0, 360, 240, 0);
                                   const col = p.color(hue, 90, 90);
                                   const initialSpeed = 2;
                                   const lifespan = 80;

                                for (let i = 0; i < emissionRate; i++) {
                                       // ... (create particles) ...
                                        let angle = p.random(p.TWO_PI);
                                    let vx = p.cos(angle) * initialSpeed;
                                    let vy = p.sin(angle) * initialSpeed;
                                        p.sketchInstanceVariables.particles.push(new Particle(emitterX, emitterY, vx, vy, lifespan, col));
                                   }
                              }

                              // Update and display all particles
                              for (let i = p.sketchInstanceVariables.particles.length - 1; i >= 0; i--) {
                                  // ... (update, display, remove particles) ...
                                   p.sketchInstanceVariables.particles[i].update();
                                   p.sketchInstanceVariables.particles[i].display();
                                   if (p.sketchInstanceVariables.particles[i].isDead()) {
                                       p.sketchInstanceVariables.particles.splice(i, 1);
                                   }
                              }
                              break; // End of particleEmitters case

                        case 'wovenTapestryOverlay':
                            // --- Woven Tapestry (Overlay/Wrap) Logic ---
                            // **NO p.background() call here**
                            if (!latestValidData || collectedData.length === 0) return;
                            if (numStreams <= 0) break;

                            // Use the GLOBAL overlayWeftHeight variable set by parseAndStoreData
                            if (overlayWeftHeight <= 0) break; // Check the global variable
                            
                            // Calculation now uses the global variable
                            const maxVisibleRows = Math.floor(p.height / overlayWeftHeight); 
                            if (maxVisibleRows <= 0) break;

                            // --- Update and Wrap Y Position ---
                            // Uses global overlayDrawSpeed
                            if (overlayCurrentY === -1) overlayCurrentY = p.height;
                            overlayCurrentY -= overlayDrawSpeed;
                            if (overlayCurrentY < 0) overlayCurrentY = p.height;
                            const currentDrawY = Math.round(overlayCurrentY);

                            // --- Calculate Proportional Widths ---
                            let totalValueForRowOverlay = 0;
                            for (let j = 0; j < numStreams; j++) totalValueForRowOverlay += latestValidData[j] || 0;

                            let rowCurrentXOverlay = 0;
                            p.noStroke();
                            for (let j = 0; j < numStreams; j++) {
                                const value = latestValidData[j] || 0;
                                let proportionalWidthOverlay = 0;
                                if (totalValueForRowOverlay > 0) proportionalWidthOverlay = (value / totalValueForRowOverlay) * p.width;
                                else proportionalWidthOverlay = p.width / numStreams;

                                // Map value to color components (H, S, B)
                                const hueOverlay = p.map(value, 0, 360, 0, 360);
                                // ** Use the reverted overlayDrawSaturation (or a fixed value if you prefer) **
                                // Let's use a fixed saturation for now unless you want to map it too
                                const saturationOverlay = 85; // Fixed saturation
                                const brightnessOverlay = p.map(value, 0, 360, 50, 95);
                                // Use the global overlayDrawAlpha 
                                const alphaOverlay = overlayDrawAlpha;

                                if (totalValueForRowOverlay === 0) {
                                    p.fill(0, 0, 50, alphaOverlay);
                                } else {
                                    p.fill(hueOverlay, saturationOverlay, brightnessOverlay, alphaOverlay);
                                }

                                if (proportionalWidthOverlay > 0 && currentDrawY >= 0) {
                                    // Draw rectangle using the GLOBAL overlayWeftHeight
                                    p.rect(rowCurrentXOverlay, currentDrawY - overlayWeftHeight,
                                           proportionalWidthOverlay, overlayWeftHeight);
                                }
                                rowCurrentXOverlay += proportionalWidthOverlay;
                            }
                            break; // End of wovenTapestryOverlay case

                        case 'none':
                             p.background(240); // Clear background
                             p.noStroke();
                             p.fill(0, 0, 80);
                             // Only show progress bar if NOT indefinite
                             if (!collectIndefinitely) {
                                 const durationMs = parseInt(collectDurationInput.value, 10) * 1000 || 1;
                                 const timeProgress = p.constrain((Date.now() - collectionStartTime) / durationMs, 0, 1);
                                 p.rect(0, p.height - 5, p.width, 5); // Background bar
                                 p.fill(120, 80, 80);
                                 p.rect(0, p.height - 5, p.width * timeProgress, 5); // Progress
                             } else {
                                 // Maybe show a blinking indicator or just nothing for indefinite 'none'
                                 p.fill(150);
                                 p.textAlign(p.CENTER, p.BOTTOM);
                                 p.text("Collecting indefinitely...", p.width / 2, p.height - 10);
                             }
                             break; // End of none case

                        case 'auraReading': {
                            // --- Aura Bloom Live Reading ---
                            // Dark background drawn once per frame with very low alpha = long-exposure accumulation
                            p.background(0, 0, 5, 0.08);

                            const cx = p.width / 2;
                            const cy = p.height / 2;
                            const t = p.frameCount;
                            const NUM_SENSORS = numStreams;

                            // Advance slow-reveal cursor: advance ~1 frame every 3 draw frames
                            // so the aura builds gradually across the full duration
                            if (p.frameCount % 3 === 0 && collectedData.length > readingFrameIndex) {
                                readingFrameIndex++;
                            }

                            // Use the slow-reveal slice rather than the latest frame
                            const revealData = collectedData[readingFrameIndex] || latestValidData;
                            if (!revealData) break;

                            // Overall energy level (0–1) drives background warmth
                            const totalEnergy = revealData.reduce((s, v) => s + (v || 0), 0);
                            const maxPossible = NUM_SENSORS * 360;
                            const energyRatio = p.constrain(totalEnergy / maxPossible, 0, 1);

                            // Draw one lobe per sensor, accumulating each frame
                            p.noStroke();
                            for (let j = 0; j < NUM_SENSORS; j++) {
                                const val = revealData[j] || 0;
                                const lobeAngle = (j / NUM_SENSORS) * p.TWO_PI - p.HALF_PI;

                                // Lobe size — organic wobble via sin offsets
                                const wobble = p.sin(t * 0.04 + j * 1.7) * 0.12 + 1.0;
                                const lobeLen = p.map(val, 0, 360, 0, Math.min(p.width, p.height) * 0.38) * wobble;
                                const lobeWidth = lobeLen * (0.32 + p.sin(t * 0.03 + j * 2.3) * 0.08);

                                // Colour: hue sweeps from cool violet (low) to warm gold (high)
                                const hue = p.map(val, 0, 360, 260, 45);
                                const sat = p.map(val, 0, 360, 40, 95);
                                const bri = p.map(val, 0, 360, 30, 95);
                                // Very low alpha per frame — each pass layers gently
                                const alpha = p.map(val, 0, 360, 0.012, 0.06);

                                p.fill(hue, sat, bri, alpha);

                                // Draw lobe as an ellipse translated and rotated toward its angle
                                p.push();
                                p.translate(cx, cy);
                                p.rotate(lobeAngle);
                                p.ellipse(lobeLen * 0.5, 0, lobeLen, lobeWidth);
                                p.pop();
                            }

                            // Soft central glow — grows with energy
                            const glowR = p.map(energyRatio, 0, 1, 10, 60);
                            p.fill(45, 60, 100, 0.04);
                            p.ellipse(cx, cy, glowR * 2.5, glowR * 2.5);
                            p.fill(45, 30, 100, 0.06);
                            p.ellipse(cx, cy, glowR * 1.2, glowR * 1.2);

                            break;
                        }

                        default:
                            // ... (default case with background clear) ...
                            p.background(240);
                            p.fill(0);
                            p.textAlign(p.CENTER, p.CENTER);
                            p.text(`Unknown live viz: ${currentLiveVisualization}`, p.width/2, p.height/2);

                     } // End switch

                    // --- Countdown radial timer (bottom-right corner, all live modes) ---
                    if (!collectIndefinitely && collectionStartTime) {
                        const durationMs = parseInt(collectDurationInput.value, 10) * 1000 || 1;
                        const elapsed = Date.now() - collectionStartTime;
                        const remaining = p.constrain(1 - elapsed / durationMs, 0, 1);

                        const tr = { x: p.width - 36, y: p.height - 36 }; // centre of timer
                        const timerR = 18;

                        // Background circle
                        p.noStroke();
                        p.fill(0, 0, 8, 0.75);
                        p.ellipse(tr.x, tr.y, (timerR + 5) * 2, (timerR + 5) * 2);

                        // Track ring
                        p.noFill();
                        p.stroke(0, 0, 30, 0.6);
                        p.strokeWeight(2.5);
                        p.arc(tr.x, tr.y, timerR * 2, timerR * 2, -p.HALF_PI, -p.HALF_PI + p.TWO_PI * 0.9999);

                        // Remaining arc — colour shifts from cool to warm as time runs out
                        const timerHue = p.map(remaining, 0, 1, 15, 180);
                        p.stroke(timerHue, 80, 90, 0.9);
                        p.strokeWeight(2.5);
                        if (remaining > 0.001) {
                            p.arc(tr.x, tr.y, timerR * 2, timerR * 2,
                                -p.HALF_PI,
                                -p.HALF_PI + p.TWO_PI * remaining);
                        }

                        // Seconds remaining label
                        const secsLeft = Math.ceil((durationMs - elapsed) / 1000);
                        p.noStroke();
                        p.fill(0, 0, 88, 0.85);
                        p.textAlign(p.CENTER, p.CENTER);
                        p.textSize(9);
                        p.textFont('sans-serif');
                        p.text(Math.max(0, secsLeft), tr.x, tr.y);
                    }

                } else if (collectedData.length > 0) {
                     // --- Post-Collection Logic ---
                    p.background(255); // Clear background for final visualization
                    if (visualizations[currentVisualization]) {
                        try {
                            visualizations[currentVisualization](collectedData);
                            // --- Scene-change countdown timer (same style as reading timer) ---
                            if (isInstallationMode && autoSceneChange && displayHoldStartTime) {
                                const elapsed = Date.now() - displayHoldStartTime;
                                const remaining = p.constrain(1 - elapsed / DISPLAY_HOLD_MS, 0, 1);
                                const tr = { x: p.width - 36, y: p.height - 36 };
                                const timerR = 18;
                                p.noStroke();
                                p.fill(0, 0, 8, 0.75);
                                p.ellipse(tr.x, tr.y, (timerR + 5) * 2, (timerR + 5) * 2);
                                p.noFill();
                                p.stroke(0, 0, 30, 0.6);
                                p.strokeWeight(2.5);
                                p.arc(tr.x, tr.y, timerR * 2, timerR * 2, -p.HALF_PI, -p.HALF_PI + p.TWO_PI * 0.9999);
                                const timerHue = p.map(remaining, 0, 1, 15, 180);
                                p.stroke(timerHue, 80, 90, 0.9);
                                p.strokeWeight(2.5);
                                if (remaining > 0.001) {
                                    p.arc(tr.x, tr.y, timerR * 2, timerR * 2, -p.HALF_PI, -p.HALF_PI + p.TWO_PI * remaining);
                                }
                                const secsLeft = Math.ceil((DISPLAY_HOLD_MS - elapsed) / 1000);
                                p.noStroke();
                                p.fill(0, 0, 88, 0.85);
                                p.textAlign(p.CENTER, p.CENTER);
                                p.textSize(9);
                                p.textFont('sans-serif');
                                p.text(Math.max(0, secsLeft), tr.x, tr.y);
                            }
                            // -------------------------------------------------------------------
                        } catch(visError) {
                             console.error(`Error in visualization '${currentVisualization}':`, visError);
                             p.fill(255,0,0); // Red for error
                             p.noStroke();
                             p.textAlign(p.CENTER, p.CENTER);
                             p.text(`Error rendering visualization: ${visError.message}`, p.width/2, p.height/2);
                        }
                    } else {
                        p.fill(200, 0, 0); // Indicate error - unknown viz
                        p.noStroke();
                        p.textAlign(p.CENTER, p.CENTER);
                        p.text(`Unknown visualization: ${currentVisualization}`, p.width / 2, p.height / 2);
                    }
                } else {
                    // --- Initial State Logic ---
                    p.background(0, 0, 10); // Dark background before connection/collection
                    p.fill(0, 0, 80);
                    p.textAlign(p.CENTER, p.CENTER);
                    p.text('Connect device and collect data to visualize.', p.width / 2, p.height / 2);
                }
            }; // End p.draw

             // Custom function to clear canvas, called before starting collection
            p.clearCanvas = () => {
                p.background(255); // Clear with white
                p.fill(180);
                p.noStroke();
                p.textAlign(p.CENTER, p.CENTER);
                p.text('Ready to collect data...', p.width / 2, p.height / 2);
                // p.redraw(); // Redraw immediately to show the cleared state
            };

            // Optional: Handle window resize
            p.windowResized = () => {
                 // Check if we are in fullscreen targeting the canvas element
                 if (document.fullscreenElement === p.canvas) {
                     p.resizeCanvas(p.windowWidth, p.windowHeight);
                 } else {
                     const area = document.getElementById('canvasArea');
                     canvasWidth  = area.offsetWidth  || window.innerWidth;
                     canvasHeight = area.offsetHeight || window.innerHeight;
                     originalCanvasHeight = canvasHeight;
                     p.resizeCanvas(canvasWidth, canvasHeight);
                 }
                 // Don't redraw if collecting, let the loop handle it, otherwise redraw
                 // (Redrawing is now also triggered by handleFullscreenChange)
                 if (!isCollecting) {
                    // p.redraw(); // Might be redundant now, handleFullscreenChange calls it
                 } else {
                    // Ensure loop is running if collecting, as resize might pause it
                    p.loop();
                 }
            };
        };

        // --- Event Listeners ---
        connectButton.addEventListener('click', async () => {
            if (port) {
                // This case should ideally not happen if button states are correct
                 await disconnectSerial();
                 updateButtonStates(); // Update state after disconnect
            } else {
                await connectSerial(); // connectSerial already handles choosing/reconnecting logic
                // Initialize p5 *if* connectSerial was successful AND p5 isn't already running
                 if (port && port.readable && !p5Instance) {
                      console.log("Initializing p5 after manual connect.");
                      p5Instance = new p5(sketch);
                 } else if (port && port.readable && p5Instance) {
                     // p5 already exists, perhaps reset its view
                     console.log("p5 already initialized, ensuring loop is stopped.");
                     p5Instance.noLoop();
                     p5Instance.clearCanvas?.(); // Use optional chaining
                     p5Instance.redraw(); // Show initial message
                 }
                 if (port && port.readable && isInstallationMode) startWatching();
            }
        });

        // Ensure the global startCollection is called
        startButton.addEventListener('click', startCollection); // No arrow func needed now
        stopButton.addEventListener('click', stopCollection);

        liveVizSelect.addEventListener('change', (event) => {
            currentLiveVisualization = event.target.value;

            // Update visibility using the centralized function
            updateUIDependentElements(); // This now handles the single container

            if (currentLiveVisualization === 'wovenTapestryOverlay') {
                 overlayCurrentY = p5Instance ? p5Instance.height : -1;
            }

            // Clear background if switching TO a mode that needs it
            if (isCollecting && p5Instance && (currentLiveVisualization === 'particleEmitters' || currentLiveVisualization === 'wovenTapestry' || currentLiveVisualization === 'none')) {
                p5Instance.background(240);
            }

            saveSettings();
        });

        vizSelect.addEventListener('change', (event) => {
            currentVisualization = event.target.value;
            if (p5Instance && collectedData.length > 0 && !isCollecting) {
                p5Instance.redraw(); // Redraw with the new visualization if data exists and not collecting
            } else if (p5Instance && !isCollecting) {
                 // Optionally clear or show default message if no data
                 p5Instance.clearCanvas?.(); // Use optional chaining
                 p5Instance.background(255);
                 p5Instance.fill(180);
                 p5Instance.noStroke();
                 p5Instance.textAlign(p5Instance.CENTER, p5Instance.CENTER);
                 p5Instance.text(`Switched to ${currentVisualization}. Collect data to view.`, p5Instance.width / 2, p5Instance.height / 2);
            }

            saveSettings();
        });

        collectDurationInput.addEventListener('input', saveSettings);

        collectIndefinitelyCheckbox.addEventListener('change', (event) => {
            collectIndefinitely = event.target.checked;
            updateUIDependentElements(); // Handles disabling/styling the duration input
            saveSettings();
        });

        overlaySpeedSlider.addEventListener('input', (event) => {
            overlayDrawSpeed = parseFloat(event.target.value);
            updateUIDependentElements(); // Updates the text span
            saveSettings();
        });

        overlayOpacitySlider.addEventListener('input', (event) => {
            overlayDrawAlpha = parseFloat(event.target.value);
            updateUIDependentElements(); // Updates the text span
            saveSettings();
        });

        overlayWeftHeightSlider.addEventListener('input', (event) => {
            overlayWeftHeight = parseInt(event.target.value, 10);
            updateUIDependentElements(); // Updates the text span
            saveSettings();
        });

        // Add listener for debug checkbox - NEW
        debugModeCheckbox.addEventListener('change', (event) => {
            isDebugMode = event.target.checked;
            // No specific dependent UI needs updating here, just save
            saveSettings();
        });

        triggerSensorsInput.addEventListener('change', (event) => {
            triggerSensorIndices = parseTriggerSensors(event.target.value);
            saveSettings();
        });

        triggerMinCountInput.addEventListener('change', (event) => {
            TRIGGER_MIN_COUNT = Math.max(1, parseInt(event.target.value, 10) || 1);
            triggerMinCountInput.value = TRIGGER_MIN_COUNT;
            saveSettings();
        });

        triggerThresholdInput.addEventListener('change', (event) => {
            TRIGGER_THRESHOLD = Math.max(0, parseInt(event.target.value, 10) || 0);
            triggerThresholdInput.value = TRIGGER_THRESHOLD;
            saveSettings();
        });

        autoSceneChangeCheckbox.addEventListener('change', (event) => {
            autoSceneChange = event.target.checked;
            sceneChangeDurationRow.style.display = autoSceneChange ? 'flex' : 'none';
            saveSettings();
        });

        displayHoldSecondsInput.addEventListener('change', (event) => {
            DISPLAY_HOLD_MS = Math.max(1, parseInt(event.target.value, 10) || 1) * 1000;
            displayHoldSecondsInput.value = DISPLAY_HOLD_MS / 1000;
            saveSettings();
        });

        installationModeCheckbox.addEventListener('change', (event) => {
            isInstallationMode = event.target.checked;
            updateUIDependentElements();
            updateButtonStates();
            if (isInstallationMode && port && port.readable && !isCollecting) {
                startWatching();
            } else if (!isInstallationMode) {
                // Leaving installation mode: cancel any pending reset
                isWatching = false;
                clearTimeout(displayHoldTimerId);
                displayHoldTimerId = null;
                if (p5Instance && !isCollecting) {
                    p5Instance.noLoop();
                    p5Instance.redraw();
                }
            }
            saveSettings();
        });

        // --- Viz toggle panel show/hide ---
        document.getElementById('showVizToggles').addEventListener('change', e => {
            document.getElementById('vizTogglePanel').style.display = e.target.checked ? 'block' : 'none';
        });

        // --- Sidebar toggle ---
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        sidebarToggle.addEventListener('click', () => {
            const collapsed = sidebar.classList.toggle('collapsed');
            sidebarToggle.classList.toggle('collapsed', collapsed);
            sidebarToggle.innerHTML = collapsed ? '&#x25BA;' : '&#x25C4;';
            // Let the canvas resize after the CSS transition finishes
            setTimeout(() => { if (p5Instance) p5Instance.windowResized(); }, 270);
        });

        // --- Device Config Panel Listeners ---
        showDeviceConfigCheckbox.addEventListener('change', e => {
            deviceConfigPanel.style.display = e.target.checked ? 'block' : 'none';
        });

        applyChannelCountButton.addEventListener('click', () => {
            applyChannelCount(parseInt(deviceChannelCountInput.value, 10));
        });
        // ------------------------------------

        // --- Fullscreen Change Listener ---
        function handleFullscreenChange() {
            if (document.fullscreenElement === p5Instance?.canvas) {
                // Entering fullscreen — hide sidebar
                sidebar.classList.add('collapsed');
                sidebarToggle.classList.add('collapsed');
                sidebarToggle.style.display = 'none';

                if (p5Instance) {
                    p5Instance.windowResized();
                    p5Instance.background(0, 0, 10);
                    if (isCollecting) { p5Instance.loop(); } else { p5Instance.redraw(); }
                }
            } else {
                // Exiting fullscreen — restore sidebar
                sidebar.classList.remove('collapsed');
                sidebarToggle.classList.remove('collapsed');
                sidebarToggle.style.display = '';
                sidebarToggle.innerHTML = '&#x25C4;';

                if (p5Instance) {
                    setTimeout(() => {
                        p5Instance.windowResized();
                        if (isCollecting) { p5Instance.loop(); } else { p5Instance.redraw(); }
                    }, 50);
                }
            }
        }

        // --- Attempt Auto-Connect on Page Load ---
        document.addEventListener('DOMContentLoaded', async () => {
             loadSettings();
             await tryAutoConnectOnLoad();

             // Add the fullscreen change listener
             document.addEventListener('fullscreenchange', handleFullscreenChange);

             if (!p5Instance) {
                 console.log("Initializing p5 in default state (no connection).");
                 p5Instance = new p5(sketch);
             }
             updateButtonStates();
        });

    </script>

</body>
</html>
