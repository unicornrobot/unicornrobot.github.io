
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P5.js Serial Data Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="idb.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: #ccc;
        }

        /* ── Layout shell ── */
        #appShell {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* ── Sidebar ── */
        #sidebar {
            flex-shrink: 0;
            width: 260px;
            height: 100%;
            background: #111;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            transition: width 0.25s ease, opacity 0.25s ease;
            overflow: hidden;
        }
        #sidebar.collapsed {
            width: 0;
            opacity: 0;
            border-right: none;
        }
        #sidebarInner {
            width: 260px; /* fixed so content doesn't reflow during collapse */
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px 10px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        #sidebarInner::-webkit-scrollbar { width: 4px; }
        #sidebarInner::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        /* ── Sidebar toggle tab ── */
        #sidebarToggle {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            left: 260px;
            transition: left 0.25s ease;
            z-index: 100;
            background: #1a1a1a;
            border: 1px solid #333;
            border-left: none;
            border-radius: 0 6px 6px 0;
            width: 18px;
            height: 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 10px;
            line-height: 1;
            user-select: none;
        }
        #sidebarToggle:hover { background: #222; color: #aaa; }
        #sidebarToggle.collapsed { left: 0; }

        /* ── Canvas area ── */
        #canvasArea {
            flex: 1;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        #canvasContainer {
            width: 100%;
            height: 100%;
        }
        #canvasContainer canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        /* ── Sidebar section headings ── */
        .sidebar-section-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #555;
            padding-bottom: 4px;
            border-bottom: 1px solid #222;
            margin-bottom: 6px;
        }

        /* ── Control overrides for dark sidebar ── */
        #sidebar button, #sidebar select, #sidebar input[type="number"],
        #sidebar input[type="text"], #sidebar input[type="range"] {
            padding: 5px 8px;
            margin: 0;
            border-radius: 5px;
            border: 1px solid #2a2a2a;
            background: #1a1a1a;
            color: #bbb;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s, border-color 0.2s;
        }
        #sidebar button:hover, #sidebar select:hover { background: #252525; border-color: #444; }
        #sidebar button:disabled { cursor: not-allowed; opacity: 0.4; }
        #sidebar input[type="checkbox"] { padding: 0; margin: 0; width: 14px; height: 14px; cursor: pointer; }
        #sidebar label { color: #aaa; }

        /* ── Status pills ── */
        .status-indicator {
            padding: 6px 8px;
            border-radius: 5px;
            font-weight: 600;
            font-size: 11px;
            text-align: center;
        }
        .status-disconnected { background: #3b0f0f; color: #f87171; }
        .status-connected    { background: #0f2b1a; color: #4ade80; }
        .status-collecting   { background: #0f1f3b; color: #60a5fa; }
        .status-finished     { background: #2b2209; color: #fbbf24; }
        .status-error        { background: #2b1408; color: #fb923c; }

        /* ── Device config rows ── */
        #deviceConfigRows .cfg-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 2px 0;
        }
        #deviceConfigRows .cfg-idx {
            width: 18px;
            text-align: right;
            color: #444;
            font-size: 11px;
            flex-shrink: 0;
        }
        #deviceConfigRows input[type="text"] { flex: 1; min-width: 0; }
        #deviceConfigRows select { flex-shrink: 0; width: 80px; }
    </style>
</head>
<body>

<div id="appShell">

    <!-- ── Sidebar ── -->
    <div id="sidebar">
        <div id="sidebarInner">

            <div style="font-size:15px; font-weight:700; color:#888; letter-spacing:0.05em; padding-bottom:8px; border-bottom:1px solid #222;">
                Serial Visualizer
            </div>

            <!-- Connection -->
            <div>
                <div class="sidebar-section-title">Connection</div>
                <button id="connectButton" style="width:100%; background:#1e3a5f; color:#7ec8ff; border-color:#1e3a5f;">Connect to Serial Device</button>
                <div id="status" class="status-indicator status-disconnected" style="margin-top:6px;">Disconnected</div>
                <div id="errorDisplay" class="status-indicator status-error" style="display:none; margin-top:4px;"></div>
            </div>

            <!-- Collection -->
            <div>
                <div class="sidebar-section-title">Collection</div>
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
                    <label for="collectDuration" style="flex-shrink:0;">Duration (s):</label>
                    <input type="number" id="collectDuration" value="10" min="1" style="width:60px;">
                </div>
                <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
                    <input type="checkbox" id="collectIndefinitely">
                    <label for="collectIndefinitely">Collect Indefinitely</label>
                </div>
                <div style="display:flex; gap:6px;">
                    <button id="startButton" disabled style="flex:1; background:#0f2b1a; color:#4ade80; border-color:#1a3d26;">Start</button>
                    <button id="stopButton"  disabled style="flex:1; background:#3b0f0f; color:#f87171; border-color:#4d1515;">Stop</button>
                </div>
                <div id="dataCount" style="margin-top:6px; font-size:11px; color:#555; text-align:center;">Data points: 0</div>
            </div>

            <!-- Visualisation -->
            <div>
                <div class="sidebar-section-title">Visualisation</div>

                <!-- Data Read (live) -->
                <div style="margin-bottom:8px;">
                    <label for="liveVizSelect" style="display:block; margin-bottom:3px;">Data Read</label>
                    <select id="liveVizSelect" style="width:100%;"></select>
                </div>

                <!-- Results (final) -->
                <div style="margin-bottom:8px;">
                    <label for="vizSelect" style="display:block; margin-bottom:3px;">Results</label>
                    <select id="vizSelect" style="width:100%;"></select>
                </div>

                <!-- Viz toggles (collapsible) -->
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;cursor:pointer;" id="vizToggleHeader">
                    <input type="checkbox" id="showVizToggles">
                    <label for="showVizToggles" style="cursor:pointer;font-size:11px;color:#666;">Manage Vizzes</label>
                </div>
                <div id="vizTogglePanel" style="display:none;">
                    <div style="font-size:10px;color:#555;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.08em;">Data Read</div>
                    <div id="liveVizToggles" style="margin-bottom:8px;"></div>
                    <div style="font-size:10px;color:#555;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.08em;">Results</div>
                    <div id="resultsVizToggles"></div>
                </div>
            </div>

            <!-- Dashboard Layout Config (shown when auraDashboard is selected) -->
            <div id="dashboardConfigSection" style="display:none;">
                <div class="sidebar-section-title">Dashboard Layout</div>
                <div style="display:flex; align-items:center; gap:5px; margin-bottom:6px; font-size:11px; color:#666;">
                    Grid:
                    <input type="number" id="dashCols" value="4" min="1" max="8" style="width:30px; text-align:center; padding:2px;" title="Columns">
                    <span>×</span>
                    <input type="number" id="dashRows" value="3" min="1" max="8" style="width:30px; text-align:center; padding:2px;" title="Rows">
                    <span style="color:#444;">cells</span>
                </div>
                <div style="display:flex; gap:4px; font-size:9px; color:#444; margin-bottom:3px; padding:0 2px;">
                    <span style="width:26px; text-align:center;">Col</span>
                    <span style="width:26px; text-align:center;">Row</span>
                    <span style="width:26px; text-align:center;">CW</span>
                    <span style="width:26px; text-align:center;">RH</span>
                    <span style="flex:1; padding-left:2px;">Type</span>
                </div>
                <div id="dashTileList" style="max-height:200px; overflow-y:auto; margin-bottom:6px;"></div>
                <div style="display:flex; gap:6px;">
                    <button id="dashAddTileBtn" style="flex:1;">+ Tile</button>
                    <button id="dashResetBtn" style="flex:1; background:#1a1a1a; color:#555; border-color:#2a2a2a;">Reset</button>
                </div>
            </div>

            <!-- Overlay controls (shown only for Woven Tapestry Overlay) -->
            <div id="overlayControlsContainer" style="display:none;">
                <div class="sidebar-section-title">Overlay Settings</div>
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <label style="flex:1;">Height</label>
                        <input type="range" id="overlayWeftHeightSlider" min="1" max="10" value="4" step="1" style="flex:2; padding:0;">
                        <span id="overlayWeftHeightValue" style="width:18px; text-align:right; color:#666;">4</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <label style="flex:1;">Opacity</label>
                        <input type="range" id="overlayOpacitySlider" min="0.05" max="1" value="0.7" step="0.05" style="flex:2; padding:0;">
                        <span id="overlayOpacityValue" style="width:28px; text-align:right; color:#666;">0.7</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <label style="flex:1;">Speed</label>
                        <input type="range" id="overlaySpeedSlider" min="0.1" max="5" value="1" step="0.1" style="flex:2; padding:0;">
                        <span id="overlaySpeedValue" style="width:28px; text-align:right; color:#666;">1.0</span>
                    </div>
                </div>
            </div>

            <!-- Installation Mode -->
            <div>
                <div class="sidebar-section-title">Installation Mode</div>
                <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
                    <input type="checkbox" id="installationModeCheckbox">
                    <label for="installationModeCheckbox">Enable</label>
                </div>
                <div id="triggerSensorsContainer" style="display:none; flex-direction:column; gap:6px;">
                    <label for="triggerSensorsInput" style="display:block; margin-bottom:3px; font-size:11px;">Trigger sensor indices</label>
                    <input type="text" id="triggerSensorsInput" value="0,1,2,3,4" style="width:100%;" placeholder="e.g. 0,1,2,3,4">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <label style="flex:1; font-size:11px;">Min count</label>
                        <input type="number" id="triggerMinCount" value="3" min="1" max="32" style="width:52px;">
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <label style="flex:1; font-size:11px;">Threshold</label>
                        <input type="number" id="triggerThreshold" value="150" min="0" max="360" style="width:52px;">
                    </div>
                    <div style="border-top:1px solid #222; margin-top:4px; padding-top:6px; display:flex; flex-direction:column; gap:6px;">
                        <div style="display:flex; align-items:center; gap:6px;">
                            <input type="checkbox" id="autoSceneChangeCheckbox" checked>
                            <label for="autoSceneChangeCheckbox" style="font-size:11px;">Auto scene change</label>
                        </div>
                        <div style="display:flex; align-items:center; gap:8px;" id="sceneChangeDurationRow">
                            <label style="flex:1; font-size:11px;">After (s)</label>
                            <input type="number" id="displayHoldSeconds" value="8" min="1" style="width:52px;">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Device Config -->
            <div>
                <div class="sidebar-section-title">Device Config</div>
                <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
                    <input type="checkbox" id="showDeviceConfigCheckbox">
                    <label for="showDeviceConfigCheckbox">Show Channel Config</label>
                </div>
                <div id="deviceConfigPanel" style="display:none;">
                    <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
                        <label>Channels:</label>
                        <input type="number" id="deviceChannelCount" value="8" min="1" max="32" style="width:52px;">
                        <button id="applyChannelCount" style="background:#1a237e; color:#90caf9; border-color:#1a237e; padding:4px 8px;">Apply</button>
                    </div>
                    <div id="deviceConfigRows"></div>
                </div>
            </div>

            <!-- Gallery -->
            <div>
                <div class="sidebar-section-title">Gallery</div>
                <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
                    <input type="checkbox" id="autoSaveCheckbox" checked>
                    <label for="autoSaveCheckbox">Auto-save results</label>
                </div>
                <div id="gallerySaveCount" style="font-size:11px; color:#555; margin-bottom:6px;">Saved: 0 readings</div>
                <div style="display:flex; gap:6px; margin-bottom:6px;">
                    <a href="gallery.html" target="_blank" style="flex:1; display:block; padding:5px 8px; border-radius:5px; border:1px solid #2a2a2a; background:#1a1a1a; color:#bbb; font-size:12px; text-align:center; text-decoration:none; cursor:pointer;">Open Gallery</a>
                </div>
                <div style="display:flex; gap:6px;">
                    <button id="exportReadingsBtn" style="flex:1; background:#1a237e; color:#90caf9; border-color:#1a237e;">Export JSON</button>
                    <button id="clearReadingsBtn"  style="flex:1; background:#3b0f0f; color:#f87171; border-color:#4d1515;">Clear All</button>
                </div>
            </div>

            <!-- Live Data Monitor -->
            <div>
                <div class="sidebar-section-title">Live Data</div>
                <div id="liveDataMonitor" style="font-family:monospace; font-size:11px; line-height:1.7;">
                    <span style="color:#444;">— no data —</span>
                </div>
            </div>

            <!-- Debug -->
            <div>
                <div class="sidebar-section-title">Debug</div>
                <div style="display:flex; align-items:center; gap:6px;">
                    <input type="checkbox" id="debugModeCheckbox">
                    <label for="debugModeCheckbox">Debug Raw Values</label>
                </div>
            </div>

        </div><!-- /sidebarInner -->
    </div><!-- /sidebar -->

    <!-- ── Sidebar toggle tab ── -->
    <div id="sidebarToggle" title="Toggle panel">&#x25C4;</div>

    <!-- ── Canvas area ── -->
    <div id="canvasArea">
        <div id="canvasContainer"></div>
    </div>

</div><!-- /appShell -->

    <script>
    //pi resolution is 1200x720 (w/h)
        // --- Global Variables ---
        let port; // Serial port object
        let reader; // Serial port reader
        let keepReading = false; // Flag to control the reading loop
        let incomingBuffer = ''; // Buffer for incomplete serial lines

        let isCollecting = false; // Flag for data collection state
        let collectionStartTime;
        let collectionTimerId;
        let collectedData = []; // Array to store collected data [[val1, val2,...], [val1, val2,...]]
        let expectedDataLength = -1; // To store the number of values per line, determined by first valid data line
        let lastValidProgress = 0;
        let absoluteLatestData = null; // Store the very last parsed data line
        let latestRawValues = [];     // All raw serial values for live sidebar display
        let collectIndefinitely = false; // Flag for indefinite collection
        let overlayDrawSpeed = 1.0; // Default drawing speed (pixels per frame)
        let overlayDrawAlpha = 0.7; // Default drawing alpha (0.0 to 1.0)
        let overlayWeftHeight = 4; // Default height of weft rows (pixels) - NEW
        let overlayCurrentY = -1; // Current drawing Y position for overlay (-1 indicates reset needed)
        let isDebugMode = false; // Flag for debug mode state - NEW
        let autoSaveResults = true; // Whether to save a snapshot after each reading
        let capturingScreenshot = false; // Suppresses overlay UI (timers etc.) during screen grab
        let originalCanvasHeight = 400; // Store the original height - NEW

        // --- Device Config ---
        // Each entry: { name: string, type: 'sensor'|'rotary'|'button' }
        // 'sensor' and 'rotary' feed into visualisations (0-360).
        // 'button' values (1=pressed, 3=released, 6=longpress) are intercepted and never stored.
        let deviceConfig = [
            { name: 'S1', type: 'sensor' },
            { name: 'S2', type: 'sensor' },
            { name: 'S3', type: 'sensor' },
            { name: 'S4', type: 'sensor' },
            { name: 'S5', type: 'sensor' },
            { name: 'S6', type: 'sensor' },
            { name: 'S7', type: 'sensor' },
            { name: 'S8', type: 'sensor' },
            { name: 'S9', type: 'button' },
            { name: 'S10', type: 'button' },
        ];

        // Derived from deviceConfig — recalculated whenever config changes
        let numberOfTouchSensors = 8; // kept for legacy viz compat, updated by applyDeviceConfig()
        let vizChannelIndices = [];   // indices of sensor+rotary channels passed to visualisations
        let buttonChannelIndices = []; // indices of button channels intercepted for UI actions
        const BUTTON_DEBOUNCE_MS = 500; // ignore repeated button values within this window per channel
        const buttonLastFiredAt = {};   // { channelIndex: timestamp } — tracks last action time per channel

        function applyDeviceConfig() {
            vizChannelIndices    = deviceConfig.map((c, i) => c.type !== 'button' ? i : -1).filter(i => i >= 0);
            buttonChannelIndices = deviceConfig.map((c, i) => c.type === 'button'  ? i : -1).filter(i => i >= 0);
            numberOfTouchSensors = vizChannelIndices.length;
            // Auto-update trigger indices to all viz channels (user can still override in the trigger input)
            triggerSensorIndices = [...vizChannelIndices];
            if (triggerSensorsInput) triggerSensorsInput.value = triggerSensorIndices.join(',');
        }
        // ---------------------

        // --- Installation Mode ---
        let isInstallationMode = false;
        let isWatching = false;         // Waiting for trigger
        let displayHoldTimerId = null;  // Timer to reset after displaying final viz
        let displayHoldStartTime = null; // When the display hold began (for countdown)
        let DISPLAY_HOLD_MS = 8000;    // How long to show final viz before resetting (ms)
        let autoSceneChange = true;    // Whether to auto-reset to watching after display hold
        let TRIGGER_MIN_COUNT = 3;   // Min number of qualifying sensors to fire trigger
        let TRIGGER_THRESHOLD = 150;  // Value threshold per sensor
        let triggerSensorIndices = [0, 1, 2, 3, 4]; // Which sensor indices to check
        // -------------------------

        let p5Instance; // To hold the p5 sketch instance
        let currentVisualization = 'auraDashboard'; // Default FINAL visualization
        let currentLiveVisualization = 'auraReading'; // Default LIVE visualization

        // --- Dashboard grid layout (for auraDashboard viz) ---
        const DASHBOARD_DEFAULT_LAYOUT = {
            cols: 4, rows: 3,
            tiles: [
                { id: 'a', col: 0, row: 0, colSpan: 1, rowSpan: 2, type: 'sparklines'  },
                { id: 'b', col: 1, row: 0, colSpan: 2, rowSpan: 2, type: 'sigil'       },
                { id: 'c', col: 3, row: 0, colSpan: 1, rowSpan: 2, type: 'averages'    },
                { id: 'd', col: 0, row: 2, colSpan: 4, rowSpan: 1, type: 'linegraph'   },
            ]
        };
        let dashboardLayout = JSON.parse(JSON.stringify(DASHBOARD_DEFAULT_LAYOUT));
        const DASHBOARD_PANEL_TYPES = {
            'sparklines':  'Sparklines',
            'sigil':       'Aura Sigil',
            'arcs':        'Concentric Arcs',
            'linegraph':   'Line Graph',
            'averages':    'Avg Numbers',
            'swatches':    'Color Swatches',
            'histogram':   'Histogram',
            'heatmap':     'Heatmap',
            'mask':        'Mask',
            'anniAlbers':  'Anni Albers',
            'sigilResult': 'Sigil Result',
            'empty':       'Empty',
        };

        // --- Viz Registry ---
        // Tracks which vizzes are enabled for cycling / display in the selects.
        const vizRegistry = {
            live: [
                { key: 'auraReading',           label: 'Aura Reading',               enabled: true  },
                { key: 'mycelium',              label: 'Mycelium',                   enabled: true  },
                { key: 'sigilWriting',           label: 'Sigil Writing',              enabled: true  },
                { key: 'centeredStrips',         label: 'Centered Strips',            enabled: true  },
                { key: 'particleEmitters',       label: 'Particle Emitters',          enabled: true  },
                { key: 'wovenTapestry',          label: 'Woven Tapestry',             enabled: false },
                { key: 'wovenTapestryOverlay',   label: 'Woven Tapestry (Overlay)',   enabled: false },
                { key: 'none',                   label: 'None',                       enabled: true  },
            ],
            results: [
                { key: 'auraDashboard',    label: 'Aura Dashboard',    enabled: true  },
                { key: 'anniAlbers',       label: 'Anni Albers',       enabled: true  },
                { key: 'maskResult',       label: 'Mask',              enabled: true  },
                { key: 'sigilResult',      label: 'Sigil Result',      enabled: true  },
                { key: 'fortuneTeller',    label: 'Fortune Teller',    enabled: true  },
                { key: 'dashboard',        label: 'Dashboard',         enabled: true  },
                { key: 'concentricArcs',   label: 'Concentric Arcs',   enabled: true  },
                { key: 'lines',            label: 'Line Graph',        enabled: true  },
                { key: 'circularPlot',     label: 'Circular Plot',     enabled: false },
                { key: 'radialBars',       label: 'Radial Bars',       enabled: false },
                { key: 'stackedBars',      label: 'Stacked Bars',      enabled: false },
                { key: 'histogram',        label: 'Histogram',         enabled: false },
                { key: 'heatmap',          label: 'Heatmap',           enabled: false },
            ]
        };

        function rebuildVizSelects() {
            // Rebuild liveVizSelect from registry
            const liveEnabled = vizRegistry.live.filter(v => v.enabled);
            liveVizSelect.innerHTML = liveEnabled.map(v =>
                `<option value="${v.key}"${v.key === currentLiveVisualization ? ' selected' : ''}>${v.label}</option>`
            ).join('');
            // Ensure currentLiveVisualization is valid
            if (!liveEnabled.find(v => v.key === currentLiveVisualization)) {
                currentLiveVisualization = liveEnabled[0]?.key || 'none';
                liveVizSelect.value = currentLiveVisualization;
            }

            // Rebuild vizSelect from registry
            const resultsEnabled = vizRegistry.results.filter(v => v.enabled);
            vizSelect.innerHTML = resultsEnabled.map(v =>
                `<option value="${v.key}"${v.key === currentVisualization ? ' selected' : ''}>${v.label}</option>`
            ).join('');
            // Ensure currentVisualization is valid
            if (!resultsEnabled.find(v => v.key === currentVisualization)) {
                currentVisualization = resultsEnabled[0]?.key || 'lines';
                vizSelect.value = currentVisualization;
            }
        }

        function renderVizToggles() {
            const liveList = document.getElementById('liveVizToggles');
            const resultsList = document.getElementById('resultsVizToggles');
            if (!liveList || !resultsList) return;

            liveList.innerHTML = vizRegistry.live.map((v, i) => `
                <label style="display:flex;align-items:center;gap:6px;padding:2px 0;cursor:pointer;">
                    <input type="checkbox" data-group="live" data-idx="${i}" ${v.enabled ? 'checked' : ''}>
                    <span style="color:#aaa;font-size:12px;">${v.label}</span>
                </label>`).join('');

            resultsList.innerHTML = vizRegistry.results.map((v, i) => `
                <label style="display:flex;align-items:center;gap:6px;padding:2px 0;cursor:pointer;">
                    <input type="checkbox" data-group="results" data-idx="${i}" ${v.enabled ? 'checked' : ''}>

        async function saveCurrentResult() {
            if (!autoSaveResults || !p5Instance || collectedData.length === 0) return;
            try {
                // Compute per-channel averages
                const nCh  = collectedData[0].length;
                const avgs = Array.from({ length: nCh }, (_, j) =>
                    collectedData.reduce((s, row) => s + (row[j] || 0), 0) / collectedData.length
                );
                // Grab viz label from registry
                const vizEntry = vizRegistry.results.find(v => v.key === currentVisualization);
                const vizLabel = vizEntry ? vizEntry.label : currentVisualization;

                // Hide overlay UI (countdown timers etc.) then redraw before grabbing
                capturingScreenshot = true;
                p5Instance.redraw();
                // Allow the redraw to paint before we read the canvas pixels
                await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

                // Capture canvas at 1920px wide, proportional height
                const canvas   = p5Instance.canvas;
                const scale    = 1920 / canvas.width;
                const offscreen = document.createElement('canvas');
                offscreen.width  = 1920;
                offscreen.height = Math.round(canvas.height * scale);
                const ctx = offscreen.getContext('2d');
                ctx.drawImage(canvas, 0, 0, offscreen.width, offscreen.height);
                const imageDataUrl = offscreen.toDataURL('image/jpeg', 0.88);

                capturingScreenshot = false;

                await ReadingsDB.save({ vizKey: currentVisualization, vizLabel, averages: avgs, imageDataUrl });
                updateGallerySaveCount();
            } catch(e) {
                capturingScreenshot = false;
                console.error('saveCurrentResult failed:', e);
            }
        }

        function saveSettings() {

        function loadSettings() {

                    if (settings.triggerSensors) {
                        triggerSensorIndices = parseTriggerSensors(settings.triggerSensors);

                    // Restore viz registry enabled flags
                    if (settings.vizRegistryLive) {

        function cycleNextVisualization() {

        function parseTriggerSensors(str) {
