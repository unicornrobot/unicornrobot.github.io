        // --- Serial Communication ---
        async function connectSerial() {
            hideError();
            // Reset state variables in case of reconnection
            expectedDataLength = -1;
            absoluteLatestData = null;
            lastValidProgress = 0;

            if ('serial' in navigator) {
                try {
                    updateStatus('Checking for previous ports...', 'collecting');
                    const existingPorts = await navigator.serial.getPorts();

                    // --- Attempt to reconnect to a single remembered port ---
                    if (existingPorts.length === 1) {
                        console.log('Attempting to reconnect to previously granted port.');
                        port = existingPorts[0];
                        try {
                            await port.open({ baudRate: 115200 });
                            updateStatus('Reconnected', 'connected');
                            keepReading = true;
                            readLoop(); // Start reading immediately
                            updateButtonStates();
                            return; // Exit function successfully
                        } catch (err) {
                            console.warn(`Failed to reopen previous port: ${err.message}. Showing selection dialog.`);
                            port = null; // Reset port if opening failed
                            // Fall through to requestPort below
                        }
                    } else if (existingPorts.length > 1) {
                         console.log('Multiple previous ports found. Please select one.');
                         // Fall through to requestPort
                    } else {
                         console.log('No previous ports found. Requesting port selection.');
                         // Fall through to requestPort
                    }
                    // ------------------------------------------------------

                    // --- Fallback: Request port selection from user ---
                    updateStatus('Requesting port selection...', 'collecting');
                    port = await navigator.serial.requestPort();
                    await port.open({ baudRate: 115200 });

                    updateStatus('Connected', 'connected');
                    keepReading = true;
                    readLoop();
                    updateButtonStates();
                    // --------------------------------------------------

                } catch (err) {
                    // This catch block now handles errors from both getPorts, requestPort, and the initial open call
                    updateStatus('Connection failed', 'error');
                    // Avoid showing error if user simply cancelled the requestPort prompt
                    if (err.name !== 'NotFoundError') {
                         showError(`Could not open port: ${err.message}`);
                    } else {
                         updateStatus('Connection cancelled', 'disconnected'); // Or simply 'Disconnected'
                    }
                    port = null;
                    updateButtonStates();
                }
            } else {
                updateStatus('Web Serial API not supported', 'error');
                showError('Your browser does not support the Web Serial API. Try Chrome or Edge.');
            }
        }

        async function readLoop() {
            if (!port || !port.readable) {
                console.warn("Port not available or closed.");
                keepReading = false;
                updateStatus('Disconnected', 'disconnected');
                updateButtonStates();
                return;
            }

            // Use TextDecoderStream for easier text handling
            const textDecoder = new TextDecoderStream();
            // Suppress the expected rejection when the pipe is cancelled
            port.readable.pipeTo(textDecoder.writable).catch(() => {});
            reader = textDecoder.readable.getReader();

            updateStatus('Reading data...', 'connected');

            let readError = null;
            try {
                while (keepReading) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    if (value) {
                        processIncomingData(value);
                    }
                }
            } catch (error) {
                readError = error;
            } finally {
                // Release the lock exactly once
                try { reader.releaseLock(); } catch(e) {}
                reader = null;
            }

            if (readError) {
                console.error('Error during reading:', readError);
                // Close the port so a fresh reconnect can open it cleanly
                try { await port.close(); } catch(e) {}
                port = null;
                updateButtonStates();

                if (isInstallationMode) {
                    // In installation mode: silently retry after a short delay
                    console.log('Read error in installation mode, retrying in 3s...');
                    updateStatus('Connection lost — retrying...', 'error');
                    isWatching = false;
                    setTimeout(async () => {
                        const reconnected = await tryAutoConnectOnLoad();
                        if (reconnected) {
                            startWatching();
                        } else {
                            updateStatus('Reconnect failed — check device', 'error');
                        }
                    }, 3000);
                } else {
                    showError(`Read error: ${readError.message}`);
                    updateStatus('Read error — reconnect to continue', 'error');
                }
                return;
            }

            // Clean exit: keepReading was set to false by disconnectSerial
            if (!keepReading) {
                await disconnectSerial();
            } else {
                updateStatus('Reading stopped (port closed?)', 'disconnected');
                updateButtonStates();
            }
        }

        function processIncomingData(chunk) {
            incomingBuffer += chunk;
            let newlineIndex;

            // Process buffer line by line
            while ((newlineIndex = incomingBuffer.indexOf('\n')) >= 0) {
                const line = incomingBuffer.substring(0, newlineIndex).trim(); // Get line, remove trailing \r if present
                incomingBuffer = incomingBuffer.substring(newlineIndex + 1); // Remove processed line from buffer

                if (line) { // Only process non-empty lines
                    parseAndStoreData(line);
                }
            }
            // Keep any remaining partial line in the buffer for the next chunk
        }

        function parseAndStoreData(line) {
            const threshold = 20;
            const padValue = 0;

            try {
                const values = line.split(',')
                                   .map(val => val.trim())
                                   .filter(val => val !== '')
                                   .map(Number);

                // --- Basic Format/Range Validation ---
                const isValidFormat = values.every(v => !isNaN(v) && v <= 360); // Allow negatives up to 360

                if (isValidFormat && values.length > 0) {
                    latestRawValues = values; // keep all channels for sidebar monitor
                    // Store only viz-channel values for live display; raw values kept in local `values`
                    absoluteLatestData = vizChannelIndices.length > 0
                        ? vizChannelIndices.map(i => values[i] != null ? values[i] : 0)
                        : values;

                    // --- Button Channel Interception ---
                    // Handle before anything else; button values never reach viz storage.
                    // Debounced per channel — ignores repeats within BUTTON_DEBOUNCE_MS.
                    buttonChannelIndices.forEach(i => {
                        const btnVal = values[i];
                        if (btnVal !== 1 && btnVal !== 6) return; // only act on press / longpress

                        const now = Date.now();
                        if ((now - (buttonLastFiredAt[i] || 0)) < BUTTON_DEBOUNCE_MS) return;
                        buttonLastFiredAt[i] = now;

                        if (btnVal === 1) cycleNextVisualization(); // pressed → cycle final viz
                        // 6 = longpress — reserved for future use
                        // 3 = released — intentionally ignored
                    });
                    // -----------------------------------

                    // --- Installation Mode Trigger Check ---
                    if (isInstallationMode && isWatching && !isCollecting) {
                        const triggerCount = triggerSensorIndices.filter(i => (values[i] || 0) > TRIGGER_THRESHOLD).length;
                        if (triggerCount >= TRIGGER_MIN_COUNT) {
                            isWatching = false;
                            startCollection();
                        }
                    }
                    // ---------------------------------------

                    // --- Sensor Control for Overlay Viz ---
                    if (currentLiveVisualization === 'wovenTapestryOverlay' && values.length >= 13) {
                        // Speed (using index 10 -> values[10])
                        const speedValue = values[10];
                        const newSpeed = p5Instance.map(speedValue, 0, 360, 0.1, 5.0);
                        overlayDrawSpeed = p5Instance.constrain(newSpeed, 0.1, 5.0);

                        // Opacity (using index 11 -> values[11])
                        const opacityValue = values[11];
                        const newAlpha = p5Instance.map(opacityValue, 0, 360, 0.0, 1.0);
                        overlayDrawAlpha = p5Instance.constrain(newAlpha, 0.05, 1.0); // Enforce minimum 0.05

                        // Weft Height (using index 12 -> values[12])
                        const weftHeightValue = values[12];
                        const newWeftHeight = p5Instance.map(weftHeightValue, 0, 360, 1, 10);
                        overlayWeftHeight = Math.round(p5Instance.constrain(newWeftHeight, 1, 10));

                        // --- Update UI Sliders to Reflect Sensor Values ---
                        // This ensures sliders track sensors *while this viz is active*
                        if (overlaySpeedSlider && overlaySpeedValueSpan) {
                            overlaySpeedSlider.value = overlayDrawSpeed;
                            overlaySpeedValueSpan.textContent = overlayDrawSpeed.toFixed(1);
                        }
                        if (overlayOpacitySlider && overlayOpacityValueSpan) {
                             overlayOpacitySlider.value = overlayDrawAlpha;
                             overlayOpacityValueSpan.textContent = overlayDrawAlpha.toFixed(2);
                        }
                        if (overlayWeftHeightSlider && overlayWeftHeightValueSpan) {
                             overlayWeftHeightSlider.value = overlayWeftHeight;
                             overlayWeftHeightValueSpan.textContent = overlayWeftHeight;
                        }
                        // --- End UI Slider Update ---
                    }
                    // ------------------------------------

                    // Set expected length based on viz channels (not raw line length)
                    if (isCollecting && expectedDataLength === -1) {
                        const vizLen = vizChannelIndices.length > 0 ? vizChannelIndices.length : values.length;
                        expectedDataLength = vizLen;
                        console.log(`Determined expected data length for this collection: ${expectedDataLength}`);
                    }
                } else {
                    console.warn("Invalid data format/range received:", line, values);
                    return;
                }
                // ---------------------------------------


                // --- Threshold Check & Data Storage Logic ---
                if (isCollecting) {
                    // Extract only the viz channels (sensor + rotary), discarding button channels
                    const vizValues = vizChannelIndices.length > 0
                        ? vizChannelIndices.map(i => values[i] != null ? values[i] : padValue)
                        : values;

                    const meetsThreshold = vizValues.some(v => v > threshold);
                    if (meetsThreshold) {
                        if (expectedDataLength === -1) {
                             expectedDataLength = vizValues.length;
                             console.log(`Determined expected data length: ${expectedDataLength}`);
                         }

                        let adjustedValues = [];
                        if (vizValues.length === expectedDataLength) adjustedValues = vizValues;
                        else if (vizValues.length < expectedDataLength) { adjustedValues = [...vizValues]; while (adjustedValues.length < expectedDataLength) adjustedValues.push(padValue); }
                        else { adjustedValues = vizValues.slice(0, expectedDataLength); }

                        collectedData.push(adjustedValues);
                        updateDataCount();

                        // *** Define durationMs HERE ***
                        const durationMs = parseInt(collectDurationInput.value, 10) * 1000;

                        // Update progress based on time (only if not indefinite)
                        if (durationMs > 0 && !collectIndefinitely) {
                            lastValidProgress = Math.min((Date.now() - collectionStartTime) / durationMs, 1);
                        }
                    }
                }
                // -------------------------------------------

            } catch (parseError) {
                 console.error("Error parsing line:", line, parseError);
            }
        }


        async function disconnectSerial() {
            keepReading = false;
            try {
                // cancel() releases the reader lock internally — do not call releaseLock() after
                if (reader) {
                    try { await reader.cancel(); } catch(e) {}
                    reader = null;
                }
                if (port) {
                    try { await port.close(); } catch(e) {}
                    port = null;
                }
            } finally {
                // Always reset state
                port = null;
                reader = null;
                expectedDataLength = -1;
                absoluteLatestData = null;
                updateStatus('Disconnected', 'disconnected');
                updateButtonStates();
                console.log('Serial port disconnected.');
            }
        }

        async function tryAutoConnectOnLoad() {
            if (!('serial' in navigator)) return; // Web Serial not supported

            try {
                console.log("Checking for previously granted ports on load...");
                const existingPorts = await navigator.serial.getPorts();

                if (existingPorts.length === 1) {
                    console.log("Found one remembered port. Attempting auto-reconnect...");
                    port = existingPorts[0];
                    try {
                        await port.open({ baudRate: 115200 });
                        updateStatus('Auto-reconnected', 'connected');
                        keepReading = true;
                        readLoop(); // Start reading
                        updateButtonStates();
                         // Initialize P5 now that we have a connection
                         if (!p5Instance) {
                             p5Instance = new p5(sketch);
                         } else {
                             // Optional: Reset p5 state if it existed somehow
                             p5Instance.clearCanvas?.(); // Use optional chaining
                         }
                        console.log("Auto-reconnect successful.");
                        if (isInstallationMode) startWatching();
                        return true; // Indicate success
                    } catch (err) {
                        console.warn(`Failed to auto-reopen remembered port: ${err.message}. Manual connection required.`);
                        port = null; // Reset port if opening failed
                        updateStatus('Disconnected (auto-reconnect failed)', 'disconnected');
                        updateButtonStates();
                    }
                } else if (existingPorts.length > 1) {
                    console.log("Multiple remembered ports found. Manual connection required.");
                } else {
                    console.log("No remembered ports found. Manual connection required.");
                }
            } catch (err) {
                console.error("Error during auto-connect check:", err);
                // Ensure UI reflects disconnected state
                updateStatus('Disconnected (error)', 'error');
                 updateButtonStates();
            }
            return false; // Indicate auto-connect did not happen or failed
        }

        // --- Data Collection ---
        function startCollection() {
            if (!port || !port.readable) {
                showError("Not connected to a serial device.");
                return;
            }
            if (isCollecting) return;

            hideError();
            collectedData = [];
            // Reset expected length for this specific collection run
            expectedDataLength = -1;
            lastValidProgress = 0;
            absoluteLatestData = null; // Clear latest data from previous run
            overlayCurrentY = -1; // Reset Y position marker
            updateDataCount();
            isCollecting = true;
            collectionStartTime = Date.now();

            let statusMessage = "";
            if (collectIndefinitely) {
                statusMessage = "Collecting data indefinitely...";
                updateStatus(statusMessage, 'collecting');
                // Do NOT set the timer
                clearTimeout(collectionTimerId);
                collectionTimerId = null; // Explicitly clear timer ID
            } else {
                const durationSeconds = parseInt(collectDurationInput.value, 10);
                const durationMs = durationSeconds * 1000;
                statusMessage = `Collecting data for ${durationSeconds}s...`;
                updateStatus(statusMessage, 'collecting');
                // Set the timer only if not indefinite
                clearTimeout(collectionTimerId);
                collectionTimerId = setTimeout(stopCollection, durationMs);
            }

            updateButtonStates(); // Update buttons after setting isCollecting

            // Prepare p5 canvas
            if (p5Instance) {
                 if (p5Instance.sketchInstanceVariables && typeof p5Instance.sketchInstanceVariables.clearParticles === 'function') {
                    p5Instance.sketchInstanceVariables.clearParticles();
                 }
                 // Trigger the sigil dissolve transition
                 if (p5Instance.sketchInstanceVariables && typeof p5Instance.sketchInstanceVariables.beginDissolve === 'function') {
                    p5Instance.sketchInstanceVariables.beginDissolve();
                 }
                 // Reset slow-reveal cursor and sigil state
                 if (p5Instance.sketchInstanceVariables) {
                    p5Instance.sketchInstanceVariables.resetReadingFrame?.();
                    p5Instance.sketchInstanceVariables.resetSigil?.();
                    p5Instance.sketchInstanceVariables.resetFortune?.();
                 }

                 // Set initial background based on selected live visualization
                 // Modes that don't clear per frame need an initial clear.
                 if (currentLiveVisualization === 'centeredStrips' || currentLiveVisualization === 'wovenTapestryOverlay') {
                     p5Instance.background(240);
                     if (currentLiveVisualization === 'wovenTapestryOverlay' && p5Instance.height) {
                         overlayCurrentY = p5Instance.height; // Initialize Y specifically for overlay
                     }
                 } else {
                     // For others (particles, standard tapestry, none), the background
                     // will be handled within their respective draw cases.
                     p5Instance.background(240); // General initial clear still okay
                 }

                 p5Instance.loop(); // Start the p5 draw loop
            }
        }

        function stopCollection() {
            if (!isCollecting) return; // Not collecting

            isCollecting = false;
            isWatching = false;
            clearTimeout(collectionTimerId); // Clear timer in case stopped manually
            const collectionEndTime = Date.now();
            const actualDuration = ((collectionEndTime - collectionStartTime) / 1000).toFixed(1);

            updateStatus(`Collection finished (${actualDuration}s). ${collectedData.length} points captured.`, 'finished');
            updateButtonStates();

            // Stop the p5 draw loop and trigger a final draw for the selected post-collection visualization
            if (p5Instance) {
                // Clear dissolve state so the final viz renders, not the frozen sigil
                if (p5Instance.sketchInstanceVariables) {
                    p5Instance.sketchInstanceVariables.resetDissolve();
                }
                // Animated reveals — keep loop alive; they self-pause when done
                if (currentVisualization === 'sigilResult') {
                    p5Instance.loop();
                    setTimeout(saveCurrentResult, 4500);
                } else if (currentVisualization === 'fortuneTeller') {
                    p5Instance.loop();
                    // Save after animation completes (~7.5s at 60fps)
                    setTimeout(saveCurrentResult, 8000);
                } else {
                    p5Instance.noLoop();
                    p5Instance.redraw();
                    setTimeout(saveCurrentResult, 120);
                }
            }

            // In installation mode, schedule automatic reset back to watching
            if (isInstallationMode && autoSceneChange) {
                displayHoldStartTime = Date.now();
                displayHoldTimerId = setTimeout(resetToWatching, DISPLAY_HOLD_MS);
                if (p5Instance) p5Instance.loop(); // keep drawing so countdown animates
            }
        }

        // --- Installation Mode Functions ---
        function startWatching() {
            if (!isInstallationMode) return;
            isWatching = true;
            clearTimeout(displayHoldTimerId);
            displayHoldTimerId = null;
            updateStatus('Watching for activity...', 'connected');
            if (p5Instance) {
                p5Instance.loop(); // Keep draw running so the waiting animation plays
            }
        }

        function resetToWatching() {
            // Called after the display hold period ends
            displayHoldStartTime = null;
            collectedData = [];
            expectedDataLength = -1;
            lastValidProgress = 0;
            absoluteLatestData = null;
            overlayCurrentY = -1;
            updateDataCount();
            if (p5Instance && p5Instance.sketchInstanceVariables) {
                p5Instance.sketchInstanceVariables.resetDissolve();
            }
            startWatching();
            if (p5Instance) {
                p5Instance.loop();
            }
        }
        // ---------------------------------

        // --- P5 Sketch Definition ---
        const sketch = (p) => {
            let canvasWidth = 600;
            let canvasHeight = 400;

            // Store sketch-specific variables/functions needed externally
            // Note: This is a slight workaround for accessing sketch state from global functions
            let sigilDissolveAlpha = 0;   // 0 = sigil visible, 1 = fully dissolved
            let sigilDissolving = false;   // true while transition is running
            let readingFrameIndex = 0;    // slow-reveal cursor into collectedData during aura live viz
            let myceliumNoiseOffsets = []; // per-tendril noise seed offsets for mycelium viz

            // --- Sigil Writing state ---
            let sigilPath = [];          // [{x, y, weight, hue}] accumulated during live draw
            let sigilCursorX = 0;        // current drawing cursor position
            let sigilCursorY = 0;
            let sigilCursorAngle = 0;    // current heading (radians)
            let sigilRevealIndex = 0;    // for results replay animation
            let sigilRevealDone = false; // true once replay has finished
            // Cached normalisation — computed once at start of sigilResult render
            let sigilNorm = null;        // { cx, cy, scale } — path centroid + fit scale

            // --- Fortune Teller state ---
            let fortuneFrame = 0;    // increments each draw call during animation
            let fortuneDone  = false;

            p.sketchInstanceVariables = {
                 particles: [],
                 clearParticles: () => { p.sketchInstanceVariables.particles = []; },
                 beginDissolve: () => { sigilDissolving = true; sigilDissolveAlpha = 0; },
                 resetDissolve: () => { sigilDissolving = false; sigilDissolveAlpha = 0; },
                 resetReadingFrame: () => { readingFrameIndex = 0; },
                 resetSigil: () => {
                     sigilPath = [];
                     sigilCursorX = 0; sigilCursorY = 0; sigilCursorAngle = 0;
                     sigilRevealIndex = 0; sigilRevealDone = false; sigilNorm = null;
                 },
                 resetFortune: () => { fortuneFrame = 0; fortuneDone = false; }
            };
            let particles = p.sketchInstanceVariables.particles; // Local reference

            // Simple Particle class (or object structure)
            class Particle {
                constructor(x, y, vx, vy, lifespan, col) {
                    this.pos = p.createVector(x, y);
                    this.vel = p.createVector(vx, vy);
                    this.lifespan = lifespan; // Frames
                    this.initialLifespan = lifespan;
                    this.col = col; // p5.color object
                }

                update() {
                    this.pos.add(this.vel);
                    this.lifespan -= 1;
                }

                display() {
                    // Fade out as lifespan decreases
                    let alpha = p.map(this.lifespan, 0, this.initialLifespan, 0, 255);
                    // Use HSB components from the stored color, but adjust alpha
                    p.fill(p.hue(this.col), p.saturation(this.col), p.brightness(this.col), alpha / 255); // p5 alpha is 0-1 in HSB
                    p.noStroke();
                    p.ellipse(this.pos.x, this.pos.y, 8, 8); // Draw particle as a small circle
                }

                isDead() {
                    return this.lifespan <= 0;
                }
            }


            // ─── Dashboard panel renderers (close over p + sigilPath) ────────────────
            // Each takes (data, avgs, nCh, bx, by, bw, bh) — tile bounds in canvas px.

            const _dp_sparklines = (data, avgs, nCh, bx, by, bw, bh) => {
                if (data.length < 2) return;
                const rows = Math.min(nCh, 8);
                const rh = bh / rows;
                for (let j = 0; j < rows; j++) {
                    const ry = by + j * rh;
                    const hue = (j / nCh) * 300;
                    const lastVal = data[data.length - 1][j] || 0;
                    if (j > 0) { p.stroke(0,0,18,0.3); p.strokeWeight(0.5); p.line(bx+4,ry,bx+bw-4,ry); }
                    p.noStroke(); p.fill(hue,60,65,0.7);
                    p.textAlign(p.LEFT,p.CENTER); p.textSize(Math.min(rh*0.44,9));
                    p.text(`S${j+1}`, bx+3, ry+rh/2);
                    p.fill(hue,65,82,0.9); p.textAlign(p.RIGHT,p.CENTER);
                    p.text(Math.round(lastVal), bx+bw-3, ry+rh/2);
                    const xOff=20, xEnd=bw-28; if (xEnd<4) continue;
                    const xStep=xEnd/(data.length-1), yPad=rh*0.14;
                    p.noFill(); p.stroke(hue,75,85,0.75); p.strokeWeight(0.9);
                    p.beginShape();
                    for (let i=0;i<data.length;i++) p.vertex(bx+xOff+i*xStep, p.map(data[i][j]||0,0,360,ry+rh-yPad,ry+yPad));
                    p.endShape();
                    p.noStroke(); p.fill(hue,70,75,0.1);
                    p.beginShape(); p.vertex(bx+xOff,ry+rh);
                    for (let i=0;i<data.length;i++) p.vertex(bx+xOff+i*xStep, p.map(data[i][j]||0,0,360,ry+rh-yPad,ry+yPad));
                    p.vertex(bx+xOff+(data.length-1)*xStep,ry+rh); p.endShape(p.CLOSE);
                    const barH=p.map(lastVal,0,360,0,rh*0.7);
                    p.noStroke(); p.fill(hue,80,85,0.5); p.rect(bx+bw-5,ry+rh-barH,4,barH);
                }
            };

            const _dp_sigil = (data, avgs, nCh, bx, by, bw, bh) => {
                const cx=bx+bw/2, cy=by+bh/2, r=Math.min(bw,bh)*0.42;
                const totalAvg=avgs.reduce((s,v)=>s+v,0);
                const energy=p.constrain(totalAvg/(nCh*360),0,1);
                p.noFill(); p.stroke(0,0,22,0.4); p.strokeWeight(0.5); p.ellipse(cx,cy,r*2.15,r*2.15);
                p.noStroke();
                for (let j=0;j<nCh;j++) {
                    const angle=(j/nCh)*p.TWO_PI-p.HALF_PI, avg=avgs[j];
                    const lobeLen=p.map(avg,0,360,0,r*0.92), lobeW=lobeLen*0.38;
                    const hue=p.map(avg,0,360,260,45), sat=p.map(avg,0,360,40,90), bri=p.map(avg,0,360,40,95);
                    for (let pass=0;pass<3;pass++) {
                        const sc=1+pass*0.35, a=[0.35,0.18,0.07][pass];
                        p.fill(hue,sat*(1-pass*0.2),bri,a);
                        p.push(); p.translate(cx,cy); p.rotate(angle); p.ellipse(lobeLen*0.5,0,lobeLen*sc,lobeW*sc); p.pop();
                    }
                }
                for (let j=0;j<nCh;j++) {
                    const angle=(j/nCh)*p.TWO_PI-p.HALF_PI, avg=avgs[j];
                    const tipLen=p.map(avg,0,360,2,r*0.44), hue=p.map(avg,0,360,260,45);
                    const sw=Math.max(2,r*0.025);
                    const tx=cx+p.cos(angle)*tipLen, ty=cy+p.sin(angle)*tipLen;
                    const sx1=cx+p.cos(angle+p.HALF_PI)*sw, sy1=cy+p.sin(angle+p.HALF_PI)*sw;
                    const sx2=cx+p.cos(angle-p.HALF_PI)*sw, sy2=cy+p.sin(angle-p.HALF_PI)*sw;
                    p.fill(hue,80,90,0.55); p.noStroke();
                    p.beginShape(); p.vertex(tx,ty); p.vertex(sx1,sy1); p.vertex(sx2,sy2); p.endShape(p.CLOSE);
                }
                if (data.length>1) {
                    const rs=(r*0.88)/nCh, aStep=p.TWO_PI/data.length; p.noFill();
                    for (let j=0;j<nCh;j++) {
                        const rr=(j+0.5)*rs; p.strokeWeight(Math.max(0.6,rs*0.3));
                        for (let i=0;i<data.length;i++) {
                            const val=data[i][j]||0; if(val<=0) continue;
                            const sa=i*aStep-p.HALF_PI, ea=(i+1)*aStep-p.HALF_PI-p.radians(0.5);
                            if(ea<=sa) continue;
                            p.stroke((j/nCh)*300,75,88,p.map(val,0,360,0.05,0.5)); p.arc(cx,cy,rr*2,rr*2,sa,ea);
                        }
                    }
                }
                p.noStroke();
                p.fill(p.lerp(200,45,energy),50,100,0.12); p.ellipse(cx,cy,r*0.18,r*0.18);
                p.fill(p.lerp(200,45,energy),60,100,0.5);  p.ellipse(cx,cy,r*0.06,r*0.06);
            };

            const _dp_arcs = (data, avgs, nCh, bx, by, bw, bh) => {
                if (data.length<2) return;
                const cx=bx+bw/2, cy=by+bh/2, r=Math.min(bw,bh)*0.46;
                const rs=(r*0.95)/nCh, aStep=p.TWO_PI/data.length; p.noFill();
                for (let j=0;j<nCh;j++) {
                    const rr=(j+0.5)*rs; p.strokeWeight(Math.max(0.8,rs*0.35));
                    for (let i=0;i<data.length;i++) {
                        const val=data[i][j]||0; if(val<=0) continue;
                        const sa=i*aStep-p.HALF_PI, ea=(i+1)*aStep-p.HALF_PI-p.radians(0.4);
                        if(ea<=sa) continue;
                        p.stroke((j/nCh)*300,75,88,p.map(val,0,360,0.05,0.55)); p.arc(cx,cy,rr*2,rr*2,sa,ea);
                    }
                }
            };

            const _dp_linegraph = (data, avgs, nCh, bx, by, bw, bh) => {
                if (data.length<2) return;
                const pad=6, xStep=bw/(data.length-1);
                for (let j=0;j<nCh;j++) {
                    const hue=(j/nCh)*300; p.noFill(); p.stroke(hue,75,85,0.65); p.strokeWeight(0.9);
                    p.beginShape();
                    for (let i=0;i<data.length;i++) p.vertex(bx+i*xStep, p.map(data[i][j]||0,0,360,by+bh-pad,by+pad));
                    p.endShape();
                }
            };

            const _dp_averages = (data, avgs, nCh, bx, by, bw, bh) => {
                const rows=Math.min(nCh,8), half=Math.ceil(rows/2), colW=bw/2, rh=bh/half;
                for (let j=0;j<rows;j++) {
                    const col=j<half?0:1, row=j<half?j:j-half;
                    const rx=bx+col*colW, ry=by+row*rh, rw=colW;
                    const v=avgs[j]||0, hue=p.map(v,0,360,260,45), sat=p.map(v,0,360,40,90), bri=p.map(v,0,360,40,95);
                    if (row>0) { p.stroke(0,0,18,0.3); p.strokeWeight(0.5); p.line(rx+3,ry,rx+rw-3,ry); }
                    if (col===1&&row===0) { p.stroke(0,0,18,0.3); p.strokeWeight(0.5); p.line(rx,by+4,rx,by+bh-4); }
                    p.noStroke(); p.fill(0,0,45,0.6);
                    p.textAlign(p.LEFT,p.TOP); p.textSize(Math.min(rh*0.38,8));
                    p.text(`S${j+1}`, rx+4, ry+2);
                    const numSz=p.constrain(rh*0.48,9,22);
                    p.textSize(numSz); p.textAlign(p.LEFT,p.CENTER); p.fill(hue,sat,bri,0.95);
                    p.text(Math.round(v), rx+18, ry+rh*0.52);
                    const barY=ry+rh-4, barMaxW=rw-8, barFillW=p.map(v,0,360,0,barMaxW);
                    p.noStroke(); p.fill(0,0,18); p.rect(rx+4,barY,barMaxW,3,2);
                    p.fill(hue,sat,bri,0.75); if(barFillW>0) p.rect(rx+4,barY,barFillW,3,2);
                }
            };

            const _dp_swatches = (data, avgs, nCh, bx, by, bw, bh) => {
                const cols=Math.ceil(Math.sqrt(nCh)), rows=Math.ceil(nCh/cols);
                const sw=bw/cols, sh=bh/rows, pad=2;
                for (let j=0;j<nCh;j++) {
                    const col=j%cols, row=Math.floor(j/cols);
                    const sx=bx+col*sw+pad, sy=by+row*sh+pad;
                    const v=avgs[j]||0, hue=p.map(v,0,360,260,45), sat=p.map(v,0,360,40,90), bri=p.map(v,0,360,40,95);
                    p.noStroke(); p.fill(hue,sat,bri,0.9); p.rect(sx,sy,sw-pad*2,sh-pad*2,3);
                    const tsz=Math.min(sw*0.28,sh*0.28,10);
                    p.fill(0,0,100,0.75); p.textAlign(p.CENTER,p.CENTER); p.textSize(tsz);
                    p.text(`S${j+1}`, sx+(sw-pad*2)/2, sy+(sh-pad*2)*0.35);
                    p.textSize(tsz*1.15); p.text(Math.round(v), sx+(sw-pad*2)/2, sy+(sh-pad*2)*0.68);
                }
            };

            const _dp_histogram = (data, avgs, nCh, bx, by, bw, bh) => {
                const bins=12, binW=360/bins, counts=new Array(bins).fill(0);
                for (const row of data) for (let j=0;j<nCh;j++) counts[Math.min(bins-1,Math.floor((row[j]||0)/binW))]++;
                const maxC=Math.max(...counts,1), barW=bw/bins, pad=5;
                p.noStroke();
                for (let b=0;b<bins;b++) {
                    const barH=p.map(counts[b],0,maxC,0,bh-pad*2);
                    p.fill((b/bins)*300,70,80,0.8); p.rect(bx+b*barW+1,by+bh-pad-barH,barW-2,barH,2,2,0,0);
                }
                p.fill(0,0,40,0.5); p.textSize(7);
                p.textAlign(p.LEFT,p.BOTTOM); p.text('0',bx+2,by+bh-1);
                p.textAlign(p.RIGHT,p.BOTTOM); p.text('360',bx+bw-2,by+bh-1);
            };

            const _dp_heatmap = (data, avgs, nCh, bx, by, bw, bh) => {
                if (!data.length) return;
                const colW=bw/data.length, rowH=bh/nCh;
                for (let i=0;i<data.length;i++) for (let j=0;j<nCh;j++) {
                    const v=data[i][j]||0;
                    p.noStroke(); p.fill(p.map(v,0,360,200,15),80,p.map(v,0,360,20,90),0.9);
                    p.rect(bx+i*colW,by+j*rowH,colW,rowH);
                }
            };

            const _dp_mask = (data, avgs, nCh, bx, by, bw, bh) => {
                // Renders entirely in tile coordinates — no colorMode or angleMode changes.
                // Alpha values are in the sketch's default 0–1.0 range.
                const norm=avgs.map(v=>p.constrain(v/360,0,1));
                const W=bw, H=bh, cx=bx+W/2;

                p.blendMode(p.ADD); p.noFill();

                const drawSE=(ex,ey,ew,eh,n)=>{
                    const na=2/Math.max(n,0.1); p.beginShape();
                    for(let a=0;a<360;a+=6){
                        const ra=p.radians(a), ca=Math.cos(ra), sa=Math.sin(ra);
                        p.vertex(ex+Math.pow(Math.abs(ca),na)*ew/2*(ca>=0?1:-1),
                                 ey+Math.pow(Math.abs(sa),na)*eh/2*(sa>=0?1:-1));
                    }
                    p.endShape(p.CLOSE);
                };
                const drawSh=(sx,sy,sw,sh,num,m)=>{
                    switch(num){
                        case 0:p.ellipse(sx+sw/2,sy+sh/2,sw,sh);break;
                        case 1:p.arc(sx,sy,sw*2,sh*2,0,p.HALF_PI);break;
                        case 2:p.quad(sx,sy,sx+sw/2,sy,sx+sw,sy+sh,sx+sw/2,sy+sh);break;
                        case 3:p.circle(sx+sw/2,sy+sh/2,Math.min(sw,sh));break;
                        case 4:p.rect(sx,sy,sw,sh,Math.max(sw,sh)*0.3);break;
                        case 5:p.triangle(sx,sy,sx+sw,sy+sh,sx+sw,sy);break;
                        case 6:drawSE(sx+sw/2,sy+sh/2,sw,sh,m);break;
                    }
                };
                const zones=[{fx:.50,fy:.26,fw:.42,fh:.088,ch:0},{fx:.38,fy:.36,fw:.152,fh:.112,ch:1},
                    {fx:.62,fy:.36,fw:.152,fh:.112,ch:2},{fx:.31,fy:.50,fw:.136,fh:.168,ch:3},
                    {fx:.69,fy:.50,fw:.136,fh:.168,ch:4},{fx:.50,fy:.50,fw:.120,fh:.152,ch:5},
                    {fx:.50,fy:.64,fw:.272,fh:.080,ch:6},{fx:.50,fy:.73,fw:.224,fh:.088,ch:7%nCh}];
                zones.forEach(z=>{
                    const v=norm[Math.min(z.ch,norm.length-1)];
                    const hue=p.map(v,0,1,200,45),sat=p.map(v,0,1,40,95),bri=p.map(v,0,1,40,95);
                    const shNum=Math.floor(p.map(v,0,1,0,6.99));
                    const angle=p.map(v,0,1,p.HALF_PI,p.PI+p.HALF_PI); // radians equiv of 90-270°
                    const shX=p.map(v,0,1,-7,7),shY=p.map(v,0,1,-5,5);
                    const sep=Math.max(1,Math.floor(p.map(v,0,1,1,3)));
                    const mVal=p.map(v,0,1,.4,3.5),swB=p.map(v,0,1,.5,2.2);
                    const zw=z.fw*W,zh=z.fh*H,cw=zw*.70,ch2=zh*.70;
                    const zx=bx+z.fx*W, zy=by+z.fy*H;
                    // Left side
                    p.push(); p.translate(zx,zy);
                    for(let i=1.3;i>0;i-=1/sep){
                        p.push(); p.scale(i); p.strokeWeight(swB/i); p.shearX(shX); p.shearY(shY); p.rotate(angle);
                        p.translate(-cw/2,-ch2/2);
                        p.stroke(hue,sat,bri, p.map(i,0,1.3,0.15,0.85)); // alpha in 0-1 range
                        drawSh(0,0,cw,ch2,shNum,mVal); p.pop();
                    }
                    p.pop();
                    // Right mirror
                    p.push(); p.translate(bx+W-z.fx*W,zy); p.scale(-1,1);
                    for(let i=1.3;i>0;i-=1/sep){
                        p.push(); p.scale(i); p.strokeWeight(swB/i); p.shearX(shX); p.shearY(shY); p.rotate(angle);
                        p.translate(-cw/2,-ch2/2);
                        p.stroke(hue,sat,bri, p.map(i,0,1.3,0.15,0.85));
                        drawSh(0,0,cw,ch2,shNum,mVal); p.pop();
                    }
                    p.pop();
                });
                // Axis + silhouette — reset blend first
                p.blendMode(p.BLEND);
                p.stroke(0,0,20,0.35); p.strokeWeight(0.5); p.line(cx,by+H*.22,cx,by+H*.78);
                p.noFill(); p.stroke(0,0,35,0.25); p.strokeWeight(.8); p.ellipse(cx,by+H*.5,W*.48,H*.58);
                // Explicit state reset — do not rely on push/pop for non-transform state
                p.blendMode(p.BLEND);
            };

            const _dp_anniAlbers = (data, avgs, nCh, bx, by, bw, bh) => {
                const n=i=>p.constrain(avgs[i%nCh]/360,0,1);
                const numCols=Math.max(3,Math.round(p.map(n(0),0,1,3,10)));
                const numRows=Math.max(3,Math.round(p.map(n(1),0,1,3,10)));
                const tW=bw/numCols, tH=bh/numRows;
                for(let col=0;col<numCols;col++) for(let row=0;row<numRows;row++){
                    const idx=(col*numRows+row)%nCh;
                    const hBase=p.map(avgs[idx%nCh],0,360,20,280);
                    const stripes=Math.max(2,Math.round(p.map(n(idx),0,1,2,7)));
                    const sH=tH/stripes;
                    for(let s=0;s<stripes;s++){
                        p.noStroke(); p.fill((hBase+s*18)%360, p.map(n((idx+s)%nCh),0,1,25,85), p.map(n((idx+s+1)%nCh),0,1,30,92), 0.9);
                        p.rect(bx+col*tW, by+row*tH+s*sH, tW, sH);
                    }
                }
            };

            const _dp_sigilResult = (data, avgs, nCh, bx, by, bw, bh) => {
                const cx=bx+bw/2, cy=by+bh/2;
                const maxSrcR=p.width*0.38;
                let path=sigilPath.length>2?sigilPath:null;
                if(!path){
                    path=[]; let px=0,py=0;
                    for(let i=0;i<Math.min(data.length,200);i++){
                        const angle=p.TWO_PI*(((data[i][0]||0)+(data[i][1]||0))/720+i*0.03);
                        const step=p.map((data[i][2]||0)/360,0,1,1,4);
                        px+=p.cos(angle)*step; py+=p.sin(angle)*step;
                        const d=Math.sqrt(px*px+py*py); if(d>maxSrcR){px*=maxSrcR/d;py*=maxSrcR/d;}
                        path.push({x:px,y:py});
                    }
                }
                if(path.length<2) return;
                // Scale from actual path bounding radius — not the theoretical max — so it fills the tile
                const actualR=Math.max(...path.map(pt=>Math.sqrt(pt.x*pt.x+pt.y*pt.y)),1);
                const sc=Math.min(bw,bh)*0.46/actualR;
                const sw=Math.max(0.5, Math.min(bw,bh)*0.003);
                p.noFill();
                for(let rot=0;rot<4;rot++){
                    p.push(); p.translate(cx,cy); p.rotate((rot/4)*p.TWO_PI);
                    p.beginShape();
                    for(const pt of path){
                        p.stroke(p.map(Math.sqrt(pt.x*pt.x+pt.y*pt.y),0,actualR,270,45),75,88,rot===0?0.8:0.2);
                        p.strokeWeight(sw); p.curveVertex(pt.x*sc,pt.y*sc);
                    }
                    p.endShape(); p.pop();
                }
            };

            const dashPanelRender = (type, data, avgs, nCh, bx, by, bw, bh) => {
                switch(type) {
                    case 'sparklines':  _dp_sparklines(data,avgs,nCh,bx,by,bw,bh);  break;
                    case 'sigil':       _dp_sigil(data,avgs,nCh,bx,by,bw,bh);       break;
                    case 'arcs':        _dp_arcs(data,avgs,nCh,bx,by,bw,bh);        break;
                    case 'linegraph':   _dp_linegraph(data,avgs,nCh,bx,by,bw,bh);   break;
                    case 'averages':    _dp_averages(data,avgs,nCh,bx,by,bw,bh);    break;
                    case 'swatches':    _dp_swatches(data,avgs,nCh,bx,by,bw,bh);    break;
                    case 'histogram':   _dp_histogram(data,avgs,nCh,bx,by,bw,bh);   break;
                    case 'heatmap':     _dp_heatmap(data,avgs,nCh,bx,by,bw,bh);     break;
                    case 'mask':        _dp_mask(data,avgs,nCh,bx,by,bw,bh);        break;
                    case 'anniAlbers':  _dp_anniAlbers(data,avgs,nCh,bx,by,bw,bh);  break;
                    case 'sigilResult': _dp_sigilResult(data,avgs,nCh,bx,by,bw,bh); break;
                    // 'empty': nothing
                }
            };
            // ─────────────────────────────────────────────────────────────────────────

            // Visualization functions are defined within the sketch scope
            const visualizations = {
                lines: (data) => {
                    p.noFill();
                    p.strokeWeight(1.5); // Set consistent stroke weight

                    if (data.length === 0 || data[0].length === 0) return; // No data

                    const numLines = data[0].length;
                    const spacing = p.width / (data.length -1 || 1); // Avoid division by zero if only 1 point
                    const hueStep = 360 / (numLines || 1); // Distribute hues evenly

                    for (let j = 0; j < numLines; j++) {
                        // --- Set color ONCE per line based on index j ---
                        const lineHue = (j * hueStep) % 360;
                        // Using fixed saturation and brightness for clarity between lines
                        // Adjust alpha (last parameter) for transparency if needed (e.g., 0.8 for 80% opaque)
                        p.stroke(lineHue, 85, 90, 1.0); 
                        // ----------------------------------------------

                        p.beginShape();
                        // Add first point twice for smooth start
                        const startX = 0;
                        const startY = p.map(data[0][j] || 0, 0, 360, p.height - 20, 20);
                        p.curveVertex(startX, startY);
                        p.curveVertex(startX, startY);

                        for (let i = 0; i < data.length; i++) {
                            const x = i * spacing;
                            const value = data[i][j] || 0;
                            // Map data value (0-360) to canvas height (with padding)
                            const y = p.map(value, 0, 360, p.height - 20, 20);
                            
                            p.curveVertex(x, y);
                        }

                        // Add last point twice for smooth end
                        const endX = (data.length - 1) * spacing;
                        const endY = p.map(data[data.length - 1][j] || 0, 0, 360, p.height - 20, 20);
                        p.curveVertex(endX, endY);
                        p.curveVertex(endX, endY);
                        
                        p.endShape();
                    }

                    // Draw axes/labels (optional)
                    p.stroke(150);
                    p.strokeWeight(0.5);
                    p.line(0, p.height - 20, p.width, p.height - 20); // X-axis (bottom)
                    p.line(0, 20, p.width, 20); // Top guide
                    p.textAlign(p.LEFT, p.CENTER);
                    p.noStroke();
                    p.fill(100);
                    p.text('0', 5, p.height - 20);
                    p.text('360', 5, 20);
                },
                circles: (data) => {
                    p.noStroke();
                    if (data.length === 0 || data[0].length === 0) return;

                    const numStreams = data[0].length;
                    const maxRadius = p.min(p.width, p.height) / 2 * 0.8; // Max radius for largest circle
                    const centerX = p.width / 2;
                    const centerY = p.height / 2;

                    // Use the *last* data point for the visualization
                    const lastDataPoint = data[data.length - 1];

                    for (let i = 0; i < numStreams; i++) {
                        const value = lastDataPoint[i] || 0;
                        const radius = p.map(value, 0, 360, 0, maxRadius);
                        // Assign different colors based on index
                        p.fill((i * 60) % 255, 150, 200, 100); // Vary hue, semi-transparent
                        p.ellipse(centerX, centerY, radius * 2, radius * 2);
                    }
                     // Add labels (optional)
                    p.fill(0);
                    p.textAlign(p.CENTER, p.CENTER);
                    p.text(`Last reading: ${lastDataPoint.map(v => v.toFixed(0)).join(', ')}`, centerX, p.height - 20);
                },
                radial: (data) => {
                    p.strokeWeight(2);
                    if (data.length === 0 || data[0].length === 0) return;

                    const numStreams = data[0].length;
                    const centerX = p.width / 2;
                    const centerY = p.height / 2;
                    const maxLen = p.min(p.width, p.height) / 2 * 0.8;
                    const angleStep = p.TWO_PI / data.length; // Angle per data point over time

                    for (let j = 0; j < numStreams; j++) {
                        // Assign color based on stream index
                        p.stroke((j * 70) % 360, 80, 70); // HSB color mode

                        for (let i = 0; i < data.length; i++) {
                            const value = data[i][j] || 0;
                            const len = p.map(value, 0, 360, 0, maxLen);
                            const angle = i * angleStep - p.HALF_PI; // Start from top

                            const x = centerX + p.cos(angle) * len;
                            const y = centerY + p.sin(angle) * len;

                            // Draw a line from center to point for each reading
                            p.line(centerX, centerY, x, y);
                        }
                    }
                },
                stackedBars: (data) => {
                    p.noStroke();
                    if (data.length === 0 || data[0].length === 0) return;

                    const numDataPoints = data.length;
                    const numStreams = data[0].length;
                    const barWidth = p.width / numDataPoints;
                    // Removed maxPossibleTotalValue, as we now normalize each bar to full height

                    for (let i = 0; i < numDataPoints; i++) {
                        let totalValue = 0;
                        // Calculate total value for this time step first
                        for (let j = 0; j < numStreams; j++) {
                            totalValue += data[i][j] || 0;
                        }

                        // No longer need totalBarHeight mapping
                        // const totalBarHeight = p.map(totalValue, 0, maxPossibleTotalValue, 0, p.height);

                        // Draw segments, scaling them to fill p.height proportionally
                        let segmentStartY = p.height; // Start drawing from the bottom
                        for (let j = 0; j < numStreams; j++) {
                            const value = data[i][j] || 0;

                            // Calculate segment height as a proportion of the *total canvas height*
                            // If totalValue is 0, make segments equal height (or handle as needed)
                            let segmentHeight = 0;
                            if (totalValue > 0) {
                                segmentHeight = (value / totalValue) * p.height;
                            } else if (numStreams > 0) {
                                // Handle case where all values are 0: distribute height equally
                                segmentHeight = p.height / numStreams;
                            }

                            // Assign color based on stream index (using HSB)
                            // Use a distinct hue for each stream index j
                            const hue = (j * (360 / (numStreams || 1))) % 360;
                            p.fill(hue, 85, 90); // Consistent saturation/brightness

                            // Draw the rectangle segment
                            // Ensure segmentHeight is not negative or excessively large due to floating point issues
                            segmentHeight = p.max(0, segmentHeight); 
                            // Prevent drawing above canvas top if rounding errors occur
                            const yPos = p.max(0, segmentStartY - segmentHeight);
                            const actualDrawHeight = segmentStartY - yPos;

                            p.rect(i * barWidth, yPos, barWidth, actualDrawHeight);

                            // Update the starting Y for the next segment
                            segmentStartY = yPos; // Move start Y to the top of the drawn segment
                        }
                         // Ensure the very top is filled due to potential rounding errors
                         if (segmentStartY > 0.1 && i*barWidth >=0 ) { // Check if a small gap remains at the top
                             p.rect(i * barWidth, 0, barWidth, segmentStartY); // Fill remaining gap
                         }
                    }

                    // Optional: Add labels or legend
                    p.fill(50); // Dark grey text
                    p.textAlign(p.LEFT, p.TOP); // Align to top left
                    p.text(`Showing ${numDataPoints} time steps as normalized stacked bars.`, 5, 5); // Position at top left
                },
                histogram: (data) => {
                    p.stroke(100); // Light grey border for bars
                    p.strokeWeight(0.5);
                    if (data.length === 0 || data[0].length === 0) {
                        p.fill(150);
                        p.noStroke();
                        p.textAlign(p.CENTER, p.CENTER);
                        p.text('No data for histogram.', p.width / 2, p.height / 2);
                        return;
                    }

                    const numBins = 12; // How many bins to divide 0-360 into (e.g., 12 bins of 30 degrees)
                    const binWidthValue = 360 / numBins; // The range of values each bin covers
                    let binCounts = new Array(numBins).fill(0); // Initialize counts to zero

                    // --- Data Processing: Count values into bins ---
                    // We'll analyze the *first* data stream (index 0)
                    for (let i = 0; i < data.length; i++) {
                        const value = data[i][0] || 0; // Get value from the first stream
                        // Ensure value is within expected range (clamp just in case)
                        const clampedValue = p.constrain(value, 0, 359.999); // Use 359.999 to keep 360 out of bounds for bin index calc
                        const binIndex = Math.floor(clampedValue / binWidthValue);
                        if (binIndex >= 0 && binIndex < numBins) {
                            binCounts[binIndex]++;
                        } else {
                             console.warn(`Value ${value} resulted in unexpected bin index ${binIndex}`);
                        }
                    }

                    // --- Drawing ---
                    let maxCount = 0;
                    for (let count of binCounts) {
                        if (count > maxCount) {
                            maxCount = count;
                        }
                    }

                    if (maxCount === 0) {
                         p.fill(150);
                         p.noStroke();
                         p.textAlign(p.CENTER, p.CENTER);
                         p.text('No data points found in the expected range for Stream 1.', p.width / 2, p.height / 2);
                         return;
                    }

                    const barWidthPixels = p.width / numBins;
                    p.fill(0, 80, 80); // Use HSB color (Reddish)

                    for (let b = 0; b < numBins; b++) {
                        // Map the count in this bin to a height on the canvas
                        // Map range [0, maxCount] to [0, p.height]
                        const barHeight = p.map(binCounts[b], 0, maxCount, 0, p.height);

                        const x = b * barWidthPixels;
                        const y = p.height - barHeight; // Y position starts from bottom

                        p.rect(x, y, barWidthPixels, barHeight);

                        // Optional: Add labels for bins
                        p.fill(50); // Dark text
                        p.noStroke();
                        p.textAlign(p.CENTER, p.BOTTOM);
                        const binStart = Math.round(b * binWidthValue);
                        const binEnd = Math.round((b + 1) * binWidthValue);
                        // Only draw label if bar has some width
                        if (barWidthPixels > 20) {
                             p.text(`${binStart}-${binEnd}`, x + barWidthPixels / 2, p.height - 5);
                        }
                         p.fill(0, 80, 80); // Reset fill for next bar
                         p.stroke(100); // Reset stroke for next bar
                    }

                     // Add overall title/info
                     p.fill(50);
                     p.noStroke();
                     p.textAlign(p.LEFT, p.TOP);
                     p.text(`Histogram of Stream 1 values (${data.length} points, max count: ${maxCount})`, 5, 5);
                },
                heatmap: (data) => {
                    p.noStroke(); // No borders for the cells initially
                    if (data.length === 0 || data[0].length === 0) {
                        p.fill(150);
                        p.textAlign(p.CENTER, p.CENTER);
                        p.text('No data for heatmap.', p.width / 2, p.height / 2);
                        return;
                    }

                    const numTimeSteps = data.length;
                    const numStreams = data[0].length;

                    // Calculate the size of each cell to fit the canvas
                    const cellWidth = p.width / numTimeSteps;
                    const cellHeight = p.height / numStreams;

                    // --- Draw the heatmap cells ---
                    for (let i = 0; i < numTimeSteps; i++) { // Iterate through time (columns)
                        for (let j = 0; j < numStreams; j++) { // Iterate through streams (rows)
                            const value = data[i][j] || 0;

                            // Map the value (0-360) to a color hue (e.g., blue to red)
                            // Using HSB: Hue from 240 (blue) down to 0 (red)
                            const hue = p.map(value, 0, 360, 240, 0);
                            p.fill(hue, 90, 90); // Saturation and Brightness set to 90

                            // Calculate position
                            const x = i * cellWidth;
                            const y = j * cellHeight;

                            // Draw the rectangle cell
                            p.rect(x, y, cellWidth, cellHeight);
                        }
                    }

                    // --- Optional: Add labels or grid lines if cells are large enough ---
                    if (cellHeight > 15) { // Only add stream labels if cells are tall enough
                        p.fill(0); // Black text
                        p.textAlign(p.LEFT, p.CENTER);
                        p.textSize(p.constrain(cellHeight * 0.6, 8, 14)); // Scale text size
                        for (let j = 0; j < numStreams; j++) {
                            p.text(`S${j+1}`, 5, j * cellHeight + cellHeight / 2);
                        }
                    }
                     if (cellWidth > 30) { // Only add time labels if cells are wide enough
                         p.fill(0);
                         p.textAlign(p.CENTER, p.TOP);
                         p.textSize(p.constrain(cellWidth * 0.2, 8, 12));
                         for (let i = 0; i < numTimeSteps; i+= Math.max(1, Math.floor(numTimeSteps/10))) { // Label ~10 steps
                             p.text(`${i}`, i * cellWidth + cellWidth / 2, 5);
                         }
                     }

                     // Add overall title
                     p.fill(50);
                     p.noStroke();
                     p.textAlign(p.CENTER, p.BOTTOM);
                     p.textSize(12);
                     p.text(`Heatmap: ${numStreams} streams over ${numTimeSteps} time steps`, p.width / 2, p.height - 5);
                },
                concentricArcs: (data) => {
                    p.background(0, 0, 10); // Dark background
                    if (data.length === 0 || data[0].length === 0) return;

                    const numTimeSteps = data.length;
                    const numStreams = data[0].length;
                    const centerX = p.width / 2;
                    const centerY = p.height / 2;

                    const padding = 30; // Space from canvas edge
                    const maxRadius = (p.min(p.width, p.height) / 2) - padding;
                    // Space the rings based on the number of sensors
                    const ringSpacing = numStreams > 1 ? maxRadius / (numStreams -1) : maxRadius; 
                    const innerRadius = numStreams > 1 ? 0 : maxRadius / 2; // Small inner radius if multiple streams

                    // Calculate the angle step for each time point along the circumference
                    const angleStep = p.TWO_PI / numTimeSteps;
                    // Define a small gap angle between segments (optional, set to 0 for no gap)
                    const angleGap = p.radians(0.5); // Small gap in radians

                    p.noFill();
                    // Determine stroke weight based on ring density
                    const baseStrokeWeight = p.max(1, ringSpacing * 0.5); // Adjust multiplier (0.5) as needed
                    p.strokeWeight(baseStrokeWeight);

                    // Iterate through sensor streams (rings)
                    for (let j = 0; j < numStreams; j++) {
                        // Calculate the radius for the current sensor's ring
                        const radius = innerRadius + j * ringSpacing;
                        const diameter = radius * 2;

                        // Iterate through time steps (arc segments)
                        for (let i = 0; i < numTimeSteps; i++) {
                            const value = data[i][j] || 0;

                            // --- Condition to draw the arc: value > 0 ---
                            // (Could be adjusted to a different threshold)
                            if (value > 0) {
                                // Map value (0-360) to hue
                                const hue = p.map(value, 0, 360, 0, 360);
                                // Use high saturation/brightness for visibility
                                p.stroke(hue, 90, 95);

                                // Calculate start and end angles for the arc segment
                                // Subtract HALF_PI to start drawing from the top
                                const startAngle = (i * angleStep) - p.HALF_PI + (angleGap / 2);
                                // Ensure end angle doesn't overlap start due to gap
                                const endAngle = ((i + 1) * angleStep) - p.HALF_PI - (angleGap / 2);

                                // Draw the arc only if endAngle > startAngle (handles the gap)
                                if (endAngle > startAngle) {
                                    p.arc(centerX, centerY, diameter, diameter, startAngle, endAngle);
                                }
                            }
                            // --- If value <= 0, do nothing, leaving a gap ---
                        }
                    }
                     // Optional: Add a center marker or labels if needed
                     p.fill(0, 0, 80); // White-ish
                     p.noStroke();
                     p.ellipse(centerX, centerY, 5, 5);
                     // Add text label
                     p.textAlign(p.CENTER, p.BOTTOM);
                     p.textSize(12);
                     p.text(`Concentric Arcs: ${numStreams} sensors over ${numTimeSteps} time steps`, p.width/2, p.height - 5);

                }, // End concentricArcs

                dashboard: (data) => {
                    p.background(230, 230, 240); // Light grey background for the dashboard
                    if (data.length === 0 || data[0].length === 0) {
                         // ... (no data message) ...
                         return;
                    }

                    const margin = 10;

                    // --- Define Grid Boxes ---
                    // Added names directly here for clarity in logging/debugging
                    const box1 = { name: 'lines', x: margin, y: margin, w: p.width - 2 * margin, h: p.height * 0.6 - 1.5 * margin };
                    const box2 = { name: 'stackedBars', x: margin, y: p.height * 0.6 + margin * 0.5, w: p.width * 0.5 - 1.5 * margin, h: p.height * 0.4 - 1.5 * margin };
                    const box3 = { name: 'concentricArcs', x: p.width * 0.5 + margin * 0.5, y: p.height * 0.6 + margin * 0.5, w: p.width * 0.5 - 1.5 * margin, h: p.height * 0.4 - 1.5 * margin };

                    // Helper function to draw a sub-viz (Revised)
                    const drawSubViz = (vizFunc, box, data) => {
                        p.push(); // Isolate transformations and styles
                        try {
                            // 1. Apply transformations
                            p.translate(box.x, box.y);
                            p.scale(box.w / p.width, box.h / p.height);

                            // 2. REMOVED background clearing here. Draw directly on main background.

                            // 3. REMOVED explicit state resets here. Rely on push/pop + viz function.

                            // 4. Call the actual visualization function
                            if (vizFunc && typeof vizFunc === 'function') {
                                 console.log(`Dashboard: Drawing ${box.name}`); // Debug log
                                 vizFunc(data); // Execute the visualization
                            } else {
                                 // ... (unavailable viz message) ...
                            }

                        } catch (error) {
                             // ... (error handling) ...
                             console.error(`Dashboard: Error in visualization '${box.name}':`, error);
                             // Draw error message within the box (in scaled coordinates)
                             p.background(255, 200, 200); // Use main background call within scaled context for error
                             p.fill(150, 0, 0); p.noStroke(); p.textAlign(p.CENTER, p.CENTER);
                             p.textSize(24); // Note: Text size will be scaled down by p.scale()
                             p.text(`ERROR\n${box.name}\n${error.name}`, p.width / 2, p.height / 2);
                        } finally {
                             p.pop(); // Restore previous drawing state (transformations, styles)
                        }

                        // 5. Draw bounding box outline *after* pop (in main coordinates)
                        p.stroke(200); p.strokeWeight(1); p.noFill();
                        p.rect(box.x, box.y, box.w, box.h);
                    };

                    // --- Draw the Sub-Visualizations ---
                    if (visualizations.lines) drawSubViz(visualizations.lines, box1, data);
                    if (visualizations.stackedBars) drawSubViz(visualizations.stackedBars, box2, data);
                    if (visualizations.concentricArcs) drawSubViz(visualizations.concentricArcs, box3, data);

                     // Add dashboard title (optional)
                     // ...
                }, // End dashboard

                auraDashboard: (data) => {
                    if (data.length === 0 || data[0].length === 0) return;
                    const nCh = data[0].length;
                    const W = p.width, H = p.height, gap = 6;

                    // Per-sensor averages
                    const avgs = Array.from({length: nCh}, (_,j) =>
                        data.reduce((s,row) => s+(row[j]||0), 0) / data.length
                    );

                    p.background(0, 0, 8);

                    const { cols, rows, tiles } = dashboardLayout;
                    const cellW = (W - gap*(cols+1)) / cols;
                    const cellH = (H - gap*(rows+1)) / rows;

                    for (const tile of tiles) {
                        if (tile.col >= cols || tile.row >= rows) continue;
                        const bx = gap + tile.col * (cellW + gap);
                        const by = gap + tile.row * (cellH + gap);
                        const bw = tile.colSpan * cellW + (tile.colSpan - 1) * gap;
                        const bh = tile.rowSpan * cellH + (tile.rowSpan - 1) * gap;

                        // Tile background
                        p.noStroke(); p.fill(0, 0, 11); p.rect(bx, by, bw, bh, 4);

                        // Clip rendering to this tile
                        p.drawingContext.save();
                        p.drawingContext.beginPath();
                        p.drawingContext.rect(bx, by, bw, bh);
                        p.drawingContext.clip();

                        try { dashPanelRender(tile.type, data, avgs, nCh, bx, by, bw, bh); }
