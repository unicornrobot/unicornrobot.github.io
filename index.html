
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P5.js Serial Data Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: #ccc;
        }

        /* ── Layout shell ── */
        #appShell {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* ── Sidebar ── */
        #sidebar {
            flex-shrink: 0;
            width: 260px;
            height: 100%;
            background: #111;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            transition: width 0.25s ease, opacity 0.25s ease;
            overflow: hidden;
        }
        #sidebar.collapsed {
            width: 0;
            opacity: 0;
            border-right: none;
        }
        #sidebarInner {
            width: 260px; /* fixed so content doesn't reflow during collapse */
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px 10px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        #sidebarInner::-webkit-scrollbar { width: 4px; }
        #sidebarInner::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        /* ── Sidebar toggle tab ── */
        #sidebarToggle {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            left: 260px;
            transition: left 0.25s ease;
            z-index: 100;
            background: #1a1a1a;
            border: 1px solid #333;
            border-left: none;
            border-radius: 0 6px 6px 0;
            width: 18px;
            height: 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 10px;
            line-height: 1;
            user-select: none;
        }
        #sidebarToggle:hover { background: #222; color: #aaa; }
        #sidebarToggle.collapsed { left: 0; }

        /* ── Canvas area ── */
        #canvasArea {
            flex: 1;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        #canvasContainer {
            width: 100%;
            height: 100%;
        }
        #canvasContainer canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        /* ── Sidebar section headings ── */
        .sidebar-section-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #555;
            padding-bottom: 4px;
            border-bottom: 1px solid #222;
            margin-bottom: 6px;
        }

        /* ── Control overrides for dark sidebar ── */
        #sidebar button, #sidebar select, #sidebar input[type="number"],
        #sidebar input[type="text"], #sidebar input[type="range"] {
            padding: 5px 8px;
            margin: 0;
            border-radius: 5px;
            border: 1px solid #2a2a2a;
            background: #1a1a1a;
            color: #bbb;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s, border-color 0.2s;
        }
        #sidebar button:hover, #sidebar select:hover { background: #252525; border-color: #444; }
        #sidebar button:disabled { cursor: not-allowed; opacity: 0.4; }
        #sidebar input[type="checkbox"] { padding: 0; margin: 0; width: 14px; height: 14px; cursor: pointer; }
        #sidebar label { color: #aaa; }

        /* ── Status pills ── */
        .status-indicator {
            padding: 6px 8px;
            border-radius: 5px;
            font-weight: 600;
            font-size: 11px;
            text-align: center;
        }
        .status-disconnected { background: #3b0f0f; color: #f87171; }
        .status-connected    { background: #0f2b1a; color: #4ade80; }
        .status-collecting   { background: #0f1f3b; color: #60a5fa; }
        .status-finished     { background: #2b2209; color: #fbbf24; }
        .status-error        { background: #2b1408; color: #fb923c; }

        /* ── Device config rows ── */
        #deviceConfigRows .cfg-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 2px 0;
        }
        #deviceConfigRows .cfg-idx {
            width: 18px;
            text-align: right;
            color: #444;
            font-size: 11px;
            flex-shrink: 0;
        }
        #deviceConfigRows input[type="text"] { flex: 1; min-width: 0; }
        #deviceConfigRows select { flex-shrink: 0; width: 80px; }
    </style>
</head>
<body>

<div id="appShell">

    <!-- ── Sidebar ── -->
    <div id="sidebar">
        <div id="sidebarInner">

            <div style="font-size:15px; font-weight:700; color:#888; letter-spacing:0.05em; padding-bottom:8px; border-bottom:1px solid #222;">
                Serial Visualizer
            </div>

            <!-- Connection -->
            <div>
                <div class="sidebar-section-title">Connection</div>
                <button id="connectButton" style="width:100%; background:#1e3a5f; color:#7ec8ff; border-color:#1e3a5f;">Connect to Serial Device</button>
                <div id="status" class="status-indicator status-disconnected" style="margin-top:6px;">Disconnected</div>
                <div id="errorDisplay" class="status-indicator status-error" style="display:none; margin-top:4px;"></div>
            </div>

            <!-- Collection -->
            <div>
                <div class="sidebar-section-title">Collection</div>
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
                    <label for="collectDuration" style="flex-shrink:0;">Duration (s):</label>
                    <input type="number" id="collectDuration" value="10" min="1" style="width:60px;">
                </div>
                <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
                    <input type="checkbox" id="collectIndefinitely">
                    <label for="collectIndefinitely">Collect Indefinitely</label>
                </div>
                <div style="display:flex; gap:6px;">
                    <button id="startButton" disabled style="flex:1; background:#0f2b1a; color:#4ade80; border-color:#1a3d26;">Start</button>
                    <button id="stopButton"  disabled style="flex:1; background:#3b0f0f; color:#f87171; border-color:#4d1515;">Stop</button>
                </div>
                <div id="dataCount" style="margin-top:6px; font-size:11px; color:#555; text-align:center;">Data points: 0</div>
            </div>

            <!-- Visualisation -->
            <div>
                <div class="sidebar-section-title">Visualisation</div>

                <!-- Data Read (live) -->
                <div style="margin-bottom:8px;">
                    <label for="liveVizSelect" style="display:block; margin-bottom:3px;">Data Read</label>
                    <select id="liveVizSelect" style="width:100%;"></select>
                </div>

                <!-- Results (final) -->
                <div style="margin-bottom:8px;">
                    <label for="vizSelect" style="display:block; margin-bottom:3px;">Results</label>
                    <select id="vizSelect" style="width:100%;"></select>
                </div>

                <!-- Viz toggles (collapsible) -->
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;cursor:pointer;" id="vizToggleHeader">
                    <input type="checkbox" id="showVizToggles">
                    <label for="showVizToggles" style="cursor:pointer;font-size:11px;color:#666;">Manage Vizzes</label>
                </div>
                <div id="vizTogglePanel" style="display:none;">
                    <div style="font-size:10px;color:#555;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.08em;">Data Read</div>
                    <div id="liveVizToggles" style="margin-bottom:8px;"></div>
                    <div style="font-size:10px;color:#555;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.08em;">Results</div>
                    <div id="resultsVizToggles"></div>
                </div>
            </div>

            <!-- Overlay controls (shown only for Woven Tapestry Overlay) -->
            <div id="overlayControlsContainer" style="display:none;">
                <div class="sidebar-section-title">Overlay Settings</div>
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <label style="flex:1;">Height</label>
                        <input type="range" id="overlayWeftHeightSlider" min="1" max="10" value="4" step="1" style="flex:2; padding:0;">
                        <span id="overlayWeftHeightValue" style="width:18px; text-align:right; color:#666;">4</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <label style="flex:1;">Opacity</label>
                        <input type="range" id="overlayOpacitySlider" min="0.05" max="1" value="0.7" step="0.05" style="flex:2; padding:0;">
                        <span id="overlayOpacityValue" style="width:28px; text-align:right; color:#666;">0.7</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <label style="flex:1;">Speed</label>
                        <input type="range" id="overlaySpeedSlider" min="0.1" max="5" value="1" step="0.1" style="flex:2; padding:0;">
                        <span id="overlaySpeedValue" style="width:28px; text-align:right; color:#666;">1.0</span>
                    </div>
                </div>
            </div>

            <!-- Installation Mode -->
            <div>
                <div class="sidebar-section-title">Installation Mode</div>
                <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
                    <input type="checkbox" id="installationModeCheckbox">
                    <label for="installationModeCheckbox">Enable</label>
                </div>
                <div id="triggerSensorsContainer" style="display:none; flex-direction:column; gap:6px;">
                    <label for="triggerSensorsInput" style="display:block; margin-bottom:3px; font-size:11px;">Trigger sensor indices</label>
                    <input type="text" id="triggerSensorsInput" value="0,1,2,3,4" style="width:100%;" placeholder="e.g. 0,1,2,3,4">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <label style="flex:1; font-size:11px;">Min count</label>
                        <input type="number" id="triggerMinCount" value="3" min="1" max="32" style="width:52px;">
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <label style="flex:1; font-size:11px;">Threshold</label>
                        <input type="number" id="triggerThreshold" value="150" min="0" max="360" style="width:52px;">
                    </div>
                    <div style="border-top:1px solid #222; margin-top:4px; padding-top:6px; display:flex; flex-direction:column; gap:6px;">
                        <div style="display:flex; align-items:center; gap:6px;">
                            <input type="checkbox" id="autoSceneChangeCheckbox" checked>
                            <label for="autoSceneChangeCheckbox" style="font-size:11px;">Auto scene change</label>
                        </div>
                        <div style="display:flex; align-items:center; gap:8px;" id="sceneChangeDurationRow">
                            <label style="flex:1; font-size:11px;">After (s)</label>
                            <input type="number" id="displayHoldSeconds" value="8" min="1" style="width:52px;">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Device Config -->
            <div>
                <div class="sidebar-section-title">Device Config</div>
                <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
                    <input type="checkbox" id="showDeviceConfigCheckbox">
                    <label for="showDeviceConfigCheckbox">Show Channel Config</label>
                </div>
                <div id="deviceConfigPanel" style="display:none;">
                    <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
                        <label>Channels:</label>
                        <input type="number" id="deviceChannelCount" value="8" min="1" max="32" style="width:52px;">
                        <button id="applyChannelCount" style="background:#1a237e; color:#90caf9; border-color:#1a237e; padding:4px 8px;">Apply</button>
                    </div>
                    <div id="deviceConfigRows"></div>
                </div>
            </div>

            <!-- Debug -->
            <div>
                <div class="sidebar-section-title">Debug</div>
                <div style="display:flex; align-items:center; gap:6px;">
                    <input type="checkbox" id="debugModeCheckbox">
                    <label for="debugModeCheckbox">Debug Raw Values</label>
                </div>
            </div>

        </div><!-- /sidebarInner -->
    </div><!-- /sidebar -->

    <!-- ── Sidebar toggle tab ── -->
    <div id="sidebarToggle" title="Toggle panel">&#x25C4;</div>

    <!-- ── Canvas area ── -->
    <div id="canvasArea">
        <div id="canvasContainer"></div>
    </div>

</div><!-- /appShell -->

    <script>
    //pi resolution is 1200x720 (w/h)
        // --- Global Variables ---
        let port; // Serial port object
        let reader; // Serial port reader
        let keepReading = false; // Flag to control the reading loop
        let incomingBuffer = ''; // Buffer for incomplete serial lines

        let isCollecting = false; // Flag for data collection state
        let collectionStartTime;
        let collectionTimerId;
        let collectedData = []; // Array to store collected data [[val1, val2,...], [val1, val2,...]]
        let expectedDataLength = -1; // To store the number of values per line, determined by first valid data line
        let lastValidProgress = 0;
        let absoluteLatestData = null; // Store the very last parsed data line
        let collectIndefinitely = false; // Flag for indefinite collection
        let overlayDrawSpeed = 1.0; // Default drawing speed (pixels per frame)
        let overlayDrawAlpha = 0.7; // Default drawing alpha (0.0 to 1.0)
        let overlayWeftHeight = 4; // Default height of weft rows (pixels) - NEW
        let overlayCurrentY = -1; // Current drawing Y position for overlay (-1 indicates reset needed)
        let isDebugMode = false; // Flag for debug mode state - NEW
        let originalCanvasHeight = 400; // Store the original height - NEW

        // --- Device Config ---
        // Each entry: { name: string, type: 'sensor'|'rotary'|'button' }
        // 'sensor' and 'rotary' feed into visualisations (0-360).
        // 'button' values (1=pressed, 3=released, 6=longpress) are intercepted and never stored.
        let deviceConfig = [
            { name: 'S1', type: 'sensor' },
            { name: 'S2', type: 'sensor' },
            { name: 'S3', type: 'sensor' },
            { name: 'S4', type: 'sensor' },
            { name: 'S5', type: 'sensor' },
            { name: 'S6', type: 'sensor' },
            { name: 'S7', type: 'sensor' },
            { name: 'S8', type: 'sensor' },
            { name: 'S9', type: 'button' },
            { name: 'S10', type: 'button' },
        ];

        // Derived from deviceConfig — recalculated whenever config changes
        let numberOfTouchSensors = 8; // kept for legacy viz compat, updated by applyDeviceConfig()
        let vizChannelIndices = [];   // indices of sensor+rotary channels passed to visualisations
        let buttonChannelIndices = []; // indices of button channels intercepted for UI actions
        const BUTTON_DEBOUNCE_MS = 500; // ignore repeated button values within this window per channel
        const buttonLastFiredAt = {};   // { channelIndex: timestamp } — tracks last action time per channel

        function applyDeviceConfig() {
            vizChannelIndices    = deviceConfig.map((c, i) => c.type !== 'button' ? i : -1).filter(i => i >= 0);
            buttonChannelIndices = deviceConfig.map((c, i) => c.type === 'button'  ? i : -1).filter(i => i >= 0);
            numberOfTouchSensors = vizChannelIndices.length;
            // Auto-update trigger indices to all viz channels (user can still override in the trigger input)
            triggerSensorIndices = [...vizChannelIndices];
            if (triggerSensorsInput) triggerSensorsInput.value = triggerSensorIndices.join(',');
        }
        // ---------------------

        // --- Installation Mode ---
        let isInstallationMode = false;
        let isWatching = false;         // Waiting for trigger
        let displayHoldTimerId = null;  // Timer to reset after displaying final viz
        let displayHoldStartTime = null; // When the display hold began (for countdown)
        let DISPLAY_HOLD_MS = 8000;    // How long to show final viz before resetting (ms)
        let autoSceneChange = true;    // Whether to auto-reset to watching after display hold
        let TRIGGER_MIN_COUNT = 3;   // Min number of qualifying sensors to fire trigger
        let TRIGGER_THRESHOLD = 150;  // Value threshold per sensor
        let triggerSensorIndices = [0, 1, 2, 3, 4]; // Which sensor indices to check
        // -------------------------

        let p5Instance; // To hold the p5 sketch instance
        let currentVisualization = 'auraDashboard'; // Default FINAL visualization
        let currentLiveVisualization = 'auraReading'; // Default LIVE visualization

        // --- Viz Registry ---
        // Tracks which vizzes are enabled for cycling / display in the selects.
        const vizRegistry = {
            live: [
                { key: 'auraReading',           label: 'Aura Reading',               enabled: true  },
                { key: 'centeredStrips',         label: 'Centered Strips',            enabled: true  },
                { key: 'particleEmitters',       label: 'Particle Emitters',          enabled: true  },
                { key: 'wovenTapestry',          label: 'Woven Tapestry',             enabled: false },
                { key: 'wovenTapestryOverlay',   label: 'Woven Tapestry (Overlay)',   enabled: false },
                { key: 'none',                   label: 'None',                       enabled: true  },
            ],
            results: [
                { key: 'auraDashboard',    label: 'Aura Dashboard',    enabled: true  },
                { key: 'dashboard',        label: 'Dashboard',         enabled: true  },
                { key: 'concentricArcs',   label: 'Concentric Arcs',   enabled: true  },
                { key: 'lines',            label: 'Line Graph',        enabled: true  },
                { key: 'circularPlot',     label: 'Circular Plot',     enabled: false },
                { key: 'radialBars',       label: 'Radial Bars',       enabled: false },
                { key: 'stackedBars',      label: 'Stacked Bars',      enabled: false },
                { key: 'histogram',        label: 'Histogram',         enabled: false },
                { key: 'heatmap',          label: 'Heatmap',           enabled: false },
            ]
        };

        function rebuildVizSelects() {
            // Rebuild liveVizSelect from registry
            const liveEnabled = vizRegistry.live.filter(v => v.enabled);
            liveVizSelect.innerHTML = liveEnabled.map(v =>
                `<option value="${v.key}"${v.key === currentLiveVisualization ? ' selected' : ''}>${v.label}</option>`
            ).join('');
            // Ensure currentLiveVisualization is valid
            if (!liveEnabled.find(v => v.key === currentLiveVisualization)) {
                currentLiveVisualization = liveEnabled[0]?.key || 'none';
                liveVizSelect.value = currentLiveVisualization;
            }

            // Rebuild vizSelect from registry
            const resultsEnabled = vizRegistry.results.filter(v => v.enabled);
            vizSelect.innerHTML = resultsEnabled.map(v =>
                `<option value="${v.key}"${v.key === currentVisualization ? ' selected' : ''}>${v.label}</option>`
            ).join('');
            // Ensure currentVisualization is valid
            if (!resultsEnabled.find(v => v.key === currentVisualization)) {
                currentVisualization = resultsEnabled[0]?.key || 'lines';
                vizSelect.value = currentVisualization;
            }
        }

        function renderVizToggles() {
            const liveList = document.getElementById('liveVizToggles');
            const resultsList = document.getElementById('resultsVizToggles');
            if (!liveList || !resultsList) return;

            liveList.innerHTML = vizRegistry.live.map((v, i) => `
                <label style="display:flex;align-items:center;gap:6px;padding:2px 0;cursor:pointer;">
                    <input type="checkbox" data-group="live" data-idx="${i}" ${v.enabled ? 'checked' : ''}>
                    <span style="color:#aaa;font-size:12px;">${v.label}</span>
                </label>`).join('');

            resultsList.innerHTML = vizRegistry.results.map((v, i) => `
                <label style="display:flex;align-items:center;gap:6px;padding:2px 0;cursor:pointer;">
                    <input type="checkbox" data-group="results" data-idx="${i}" ${v.enabled ? 'checked' : ''}>
                    <span style="color:#aaa;font-size:12px;">${v.label}</span>
                </label>`).join('');

            // Attach listeners
            [liveList, resultsList].forEach(list => {
                list.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                    cb.addEventListener('change', e => {
                        const group = e.target.dataset.group;
                        const idx = parseInt(e.target.dataset.idx, 10);
                        vizRegistry[group][idx].enabled = e.target.checked;
                        rebuildVizSelects();
                        saveSettings();
                    });
                });
            });
        }
        // ---------------------

        // --- UI Elements ---
        const connectButton = document.getElementById('connectButton');
        const startButton = document.getElementById('startButton');
        const stopButton = document.getElementById('stopButton');
        const collectDurationInput = document.getElementById('collectDuration');
        const collectIndefinitelyCheckbox = document.getElementById('collectIndefinitely');
        const liveVizSelect = document.getElementById('liveVizSelect');
        const vizSelect = document.getElementById('vizSelect');
        const statusDiv = document.getElementById('status');
        const errorDiv = document.getElementById('errorDisplay');
        const dataCountDiv = document.getElementById('dataCount');
        const canvasContainer = document.getElementById('canvasContainer');
        const overlayControlsContainer = document.getElementById('overlayControlsContainer');
        const debugModeCheckbox = document.getElementById('debugModeCheckbox'); // NEW Reference
        const installationModeCheckbox = document.getElementById('installationModeCheckbox');
        const triggerSensorsInput = document.getElementById('triggerSensorsInput');
        const triggerSensorsContainer = document.getElementById('triggerSensorsContainer');
        const triggerMinCountInput = document.getElementById('triggerMinCount');
        const triggerThresholdInput = document.getElementById('triggerThreshold');
        const autoSceneChangeCheckbox = document.getElementById('autoSceneChangeCheckbox');
        const displayHoldSecondsInput = document.getElementById('displayHoldSeconds');
        const sceneChangeDurationRow = document.getElementById('sceneChangeDurationRow');
        const showDeviceConfigCheckbox = document.getElementById('showDeviceConfigCheckbox');
        const deviceConfigPanel = document.getElementById('deviceConfigPanel');
        const deviceChannelCountInput = document.getElementById('deviceChannelCount');
        const applyChannelCountButton = document.getElementById('applyChannelCount');
        const deviceConfigRows = document.getElementById('deviceConfigRows');

        // Add missing references for Speed slider
        const overlaySpeedSlider = document.getElementById('overlaySpeedSlider');
        const overlaySpeedValueSpan = document.getElementById('overlaySpeedValue');
        // Existing references below
        const overlayOpacitySlider = document.getElementById('overlayOpacitySlider');
        const overlayOpacityValueSpan = document.getElementById('overlayOpacityValue');
        const overlayWeftHeightSlider = document.getElementById('overlayWeftHeightSlider');
        const overlayWeftHeightValueSpan = document.getElementById('overlayWeftHeightValue');

        // --- Utility Functions ---
        function updateStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status-indicator status-${type}`;
        }

        function showError(message) {
            console.error(message);
            errorDiv.textContent = `Error: ${message}`;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            errorDiv.style.display = 'none';
        }

        function updateDataCount() {
            dataCountDiv.textContent = `Data points collected: ${collectedData.length}`;
        }

        function updateButtonStates() {
            const isConnected = port && port.readable;
            connectButton.disabled = isConnected;
            // In installation mode the trigger handles start/stop automatically
            startButton.style.display = isInstallationMode ? 'none' : '';
            stopButton.style.display = isInstallationMode ? 'none' : '';
            if (!isInstallationMode) {
                startButton.disabled = !isConnected || isCollecting;
                stopButton.disabled = !isCollecting;
            }
            collectDurationInput.disabled = isCollecting;
            collectIndefinitelyCheckbox.disabled = isCollecting;
        }

        // --- Device Config UI ---
        function renderDeviceConfigRows() {
            deviceConfigRows.innerHTML = '';
            deviceChannelCountInput.value = deviceConfig.length;
            deviceConfig.forEach((ch, i) => {
                const row = document.createElement('div');
                row.className = 'cfg-row';
                row.innerHTML = `
                    <span class="cfg-idx">${i}</span>
                    <input type="text" value="${ch.name}" data-idx="${i}" data-field="name" class="config-name">
                    <select data-idx="${i}" data-field="type" class="config-type">
                        <option value="sensor"  ${ch.type==='sensor'  ? 'selected':''}>Sensor</option>
                        <option value="rotary"  ${ch.type==='rotary'  ? 'selected':''}>Rotary</option>
                        <option value="button"  ${ch.type==='button'  ? 'selected':''}>Button</option>
                    </select>`;
                deviceConfigRows.appendChild(row);
            });
            // Live-update on any field change
            deviceConfigRows.querySelectorAll('.config-name, .config-type').forEach(el => {
                el.addEventListener('change', e => {
                    const idx   = parseInt(e.target.dataset.idx, 10);
                    const field = e.target.dataset.field;
                    deviceConfig[idx][field] = e.target.value;
                    applyDeviceConfig();
                    saveSettings();
                });
            });
        }

        function applyChannelCount(n) {
            n = Math.max(1, Math.min(32, n));
            while (deviceConfig.length < n) {
                deviceConfig.push({ name: `CH${deviceConfig.length}`, type: 'sensor' });
            }
            deviceConfig = deviceConfig.slice(0, n);
            renderDeviceConfigRows();
            applyDeviceConfig();
            saveSettings();
        }
        // ------------------------

        function saveSettings() {
            const settings = {
                collectDuration: collectDurationInput.value,
                collectIndefinitely: collectIndefinitelyCheckbox.checked,
                liveViz: liveVizSelect.value,
                finalViz: vizSelect.value,
                overlaySpeed: overlaySpeedSlider.value,
                overlayOpacity: overlayOpacitySlider.value,
                overlayWeftHeight: overlayWeftHeightSlider.value,
                debugMode: debugModeCheckbox.checked,
                installationMode: installationModeCheckbox.checked,
                triggerSensors: triggerSensorsInput.value,
                triggerMinCount: triggerMinCountInput.value,
                triggerThreshold: triggerThresholdInput.value,
                autoSceneChange: autoSceneChange,
                displayHoldSeconds: DISPLAY_HOLD_MS / 1000,
                deviceConfig: deviceConfig,
                // Save enabled state only (keys are stable, order may change)
                vizRegistryLive:    vizRegistry.live.map(v => ({ key: v.key, enabled: v.enabled })),
                vizRegistryResults: vizRegistry.results.map(v => ({ key: v.key, enabled: v.enabled }))
            };
            try {
                localStorage.setItem('visualizerSettings', JSON.stringify(settings));
                // console.log("Settings saved:", settings); // Optional: for debugging
            } catch (e) {
                console.error("Error saving settings to localStorage:", e);
            }
        }

        function loadSettings() {
            try {
                const savedSettings = localStorage.getItem('visualizerSettings');
                if (savedSettings) {
                    const settings = JSON.parse(savedSettings);
                    console.log("Loading saved settings:", settings); // Optional: for debugging

                    // Apply settings directly to UI elements and global variables
                    collectDurationInput.value = settings.collectDuration || '10';
                    collectIndefinitelyCheckbox.checked = settings.collectIndefinitely || false;
                    liveVizSelect.value = settings.liveViz || 'centeredStrips';
                    vizSelect.value = settings.finalViz || 'lines'; // Keep 'lines' as default or change if desired
                    overlaySpeedSlider.value = settings.overlaySpeed || '1.0';
                    // Load and clamp opacity
                    let loadedOpacity = parseFloat(settings.overlayOpacity || '0.7');
                    loadedOpacity = Math.max(0.05, loadedOpacity); // Ensure minimum of 0.05
                    overlayOpacitySlider.value = loadedOpacity; // Set clamped value to slider
                    overlayWeftHeightSlider.value = settings.overlayWeftHeight || '4';
                    debugModeCheckbox.checked = settings.debugMode || false; // Load debug state
                    installationModeCheckbox.checked = settings.installationMode || false;
                    if (settings.triggerSensors) triggerSensorsInput.value = settings.triggerSensors;
                    if (settings.triggerMinCount) { triggerMinCountInput.value = settings.triggerMinCount; TRIGGER_MIN_COUNT = parseInt(settings.triggerMinCount, 10); }
                    if (settings.triggerThreshold) { triggerThresholdInput.value = settings.triggerThreshold; TRIGGER_THRESHOLD = parseInt(settings.triggerThreshold, 10); }
                    if (settings.autoSceneChange !== undefined) {
                        autoSceneChange = settings.autoSceneChange;
                        autoSceneChangeCheckbox.checked = autoSceneChange;
                        sceneChangeDurationRow.style.display = autoSceneChange ? 'flex' : 'none';
                    }
                    if (settings.displayHoldSeconds) {
                        DISPLAY_HOLD_MS = parseFloat(settings.displayHoldSeconds) * 1000;
                        displayHoldSecondsInput.value = settings.displayHoldSeconds;
                    }

                    // Update global variables based on loaded settings
                    collectIndefinitely = collectIndefinitelyCheckbox.checked;
                    currentLiveVisualization = liveVizSelect.value;
                    currentVisualization = vizSelect.value;
                    overlayDrawSpeed = parseFloat(overlaySpeedSlider.value);
                    overlayDrawAlpha = loadedOpacity; // Use the clamped loaded value
                    overlayWeftHeight = parseInt(overlayWeftHeightSlider.value, 10);
                    isDebugMode = debugModeCheckbox.checked; // Update global debug state
                    isInstallationMode = installationModeCheckbox.checked;
                    if (settings.deviceConfig && Array.isArray(settings.deviceConfig)) {
                        deviceConfig = settings.deviceConfig;
                    }
                    applyDeviceConfig();
                    // Override trigger indices with saved value if present (user may have customised)
                    if (settings.triggerSensors) {
                        triggerSensorIndices = parseTriggerSensors(settings.triggerSensors);
                        triggerSensorsInput.value = settings.triggerSensors;
                    }
                    // Restore viz registry enabled flags
                    if (settings.vizRegistryLive) {
                        settings.vizRegistryLive.forEach(saved => {
                            const entry = vizRegistry.live.find(v => v.key === saved.key);
                            if (entry) entry.enabled = saved.enabled;
                        });
                    }
                    if (settings.vizRegistryResults) {
                        settings.vizRegistryResults.forEach(saved => {
                            const entry = vizRegistry.results.find(v => v.key === saved.key);
                            if (entry) entry.enabled = saved.enabled;
                        });
                    }
                    renderDeviceConfigRows();
                    renderVizToggles();
                    rebuildVizSelects();

                    // Call the function to update dependent UI AFTER all values are set
                    updateUIDependentElements();

                } else {
                     console.log("No saved settings found, using defaults.");
                     applyDeviceConfig();
                     triggerSensorIndices = parseTriggerSensors(triggerSensorsInput.value);
                     renderDeviceConfigRows();
                     renderVizToggles();
                     rebuildVizSelects();
                     // Ensure dependent UI reflects default values (min opacity is handled by default slider value)
                     updateUIDependentElements();
                }
            } catch (e) {
                console.error("Error loading or applying settings from localStorage:", e);
                 // Fallback: Ensure dependent UI reflects default values on error
                 updateUIDependentElements();
            }
        }

        function cycleNextVisualization() {
            // Only cycle through enabled results vizzes
            const enabled = vizRegistry.results.filter(v => v.enabled).map(v => v.key);
            if (enabled.length === 0) return;
            const current = enabled.indexOf(currentVisualization);
            currentVisualization = enabled[(current + 1) % enabled.length];
            vizSelect.value = currentVisualization;
            saveSettings();
            // Redraw immediately if we're in post-collection display state
            if (p5Instance && collectedData.length > 0 && !isCollecting) {
                p5Instance.redraw();
            }
        }

        function parseTriggerSensors(str) {
            return str.split(',')
                .map(s => parseInt(s.trim(), 10))
                .filter(n => !isNaN(n) && n >= 0);
        }

        function updateUIDependentElements() {
            // Update text spans for sliders
            if (overlaySpeedValueSpan && overlaySpeedSlider) {
                overlaySpeedValueSpan.textContent = parseFloat(overlaySpeedSlider.value).toFixed(1);
            }
            if (overlayOpacityValueSpan && overlayOpacitySlider) {
                overlayOpacityValueSpan.textContent = parseFloat(overlayOpacitySlider.value).toFixed(2);
            }
            if (overlayWeftHeightValueSpan && overlayWeftHeightSlider) {
                 overlayWeftHeightValueSpan.textContent = parseInt(overlayWeftHeightSlider.value, 10);
            }

            // Update visibility of the *single* overlay controls container
            const showOverlayControls = liveVizSelect.value === 'wovenTapestryOverlay';
            if (overlayControlsContainer) { // Check if the container exists
                overlayControlsContainer.style.display = showOverlayControls ? 'flex' : 'none'; // Use flex when showing
            }

            // Show trigger sensor input only when installation mode is on
            if (triggerSensorsContainer) {
                triggerSensorsContainer.style.display = installationModeCheckbox.checked ? 'flex' : 'none';
            }

            // Update duration input disabled state and appearance
             if (collectIndefinitelyCheckbox && collectDurationInput) {
                collectDurationInput.disabled = collectIndefinitelyCheckbox.checked;
                if (collectIndefinitelyCheckbox.checked) {
                    collectDurationInput.parentElement.classList.add('opacity-50');
                } else {
                    collectDurationInput.parentElement.classList.remove('opacity-50');
                }
             }
        }

        // --- Serial Communication ---
        async function connectSerial() {
            hideError();
            // Reset state variables in case of reconnection
            expectedDataLength = -1;
            absoluteLatestData = null;
            lastValidProgress = 0;

            if ('serial' in navigator) {
                try {
                    updateStatus('Checking for previous ports...', 'collecting');
                    const existingPorts = await navigator.serial.getPorts();

                    // --- Attempt to reconnect to a single remembered port ---
                    if (existingPorts.length === 1) {
                        console.log('Attempting to reconnect to previously granted port.');
                        port = existingPorts[0];
                        try {
                            await port.open({ baudRate: 9600 });
                            updateStatus('Reconnected', 'connected');
                            keepReading = true;
                            readLoop(); // Start reading immediately
                            updateButtonStates();
                            return; // Exit function successfully
                        } catch (err) {
                            console.warn(`Failed to reopen previous port: ${err.message}. Showing selection dialog.`);
                            port = null; // Reset port if opening failed
                            // Fall through to requestPort below
                        }
                    } else if (existingPorts.length > 1) {
                         console.log('Multiple previous ports found. Please select one.');
                         // Fall through to requestPort
                    } else {
                         console.log('No previous ports found. Requesting port selection.');
                         // Fall through to requestPort
                    }
                    // ------------------------------------------------------

                    // --- Fallback: Request port selection from user ---
                    updateStatus('Requesting port selection...', 'collecting');
                    port = await navigator.serial.requestPort();
                    await port.open({ baudRate: 9600 });

                    updateStatus('Connected', 'connected');
                    keepReading = true;
                    readLoop();
                    updateButtonStates();
                    // --------------------------------------------------

                } catch (err) {
                    // This catch block now handles errors from both getPorts, requestPort, and the initial open call
                    updateStatus('Connection failed', 'error');
                    // Avoid showing error if user simply cancelled the requestPort prompt
                    if (err.name !== 'NotFoundError') {
                         showError(`Could not open port: ${err.message}`);
                    } else {
                         updateStatus('Connection cancelled', 'disconnected'); // Or simply 'Disconnected'
                    }
                    port = null;
                    updateButtonStates();
                }
            } else {
                updateStatus('Web Serial API not supported', 'error');
                showError('Your browser does not support the Web Serial API. Try Chrome or Edge.');
            }
        }

        async function readLoop() {
            if (!port || !port.readable) {
                console.warn("Port not available or closed.");
                keepReading = false;
                updateStatus('Disconnected', 'disconnected');
                updateButtonStates();
                return;
            }

            // Use TextDecoderStream for easier text handling
            const textDecoder = new TextDecoderStream();
            // Suppress the expected rejection when the pipe is cancelled
            port.readable.pipeTo(textDecoder.writable).catch(() => {});
            reader = textDecoder.readable.getReader();

            updateStatus('Reading data...', 'connected');

            let readError = null;
            try {
                while (keepReading) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    if (value) {
                        processIncomingData(value);
                    }
                }
            } catch (error) {
                readError = error;
            } finally {
                // Release the lock exactly once
                try { reader.releaseLock(); } catch(e) {}
                reader = null;
            }

            if (readError) {
                console.error('Error during reading:', readError);
                // Close the port so a fresh reconnect can open it cleanly
                try { await port.close(); } catch(e) {}
                port = null;
                updateButtonStates();

                if (isInstallationMode) {
                    // In installation mode: silently retry after a short delay
                    console.log('Read error in installation mode, retrying in 3s...');
                    updateStatus('Connection lost — retrying...', 'error');
                    isWatching = false;
                    setTimeout(async () => {
                        const reconnected = await tryAutoConnectOnLoad();
                        if (reconnected) {
                            startWatching();
                        } else {
                            updateStatus('Reconnect failed — check device', 'error');
                        }
                    }, 3000);
                } else {
                    showError(`Read error: ${readError.message}`);
                    updateStatus('Read error — reconnect to continue', 'error');
                }
                return;
            }

            // Clean exit: keepReading was set to false by disconnectSerial
            if (!keepReading) {
                await disconnectSerial();
            } else {
                updateStatus('Reading stopped (port closed?)', 'disconnected');
                updateButtonStates();
            }
        }

        function processIncomingData(chunk) {
            incomingBuffer += chunk;
            let newlineIndex;

            // Process buffer line by line
            while ((newlineIndex = incomingBuffer.indexOf('\n')) >= 0) {
                const line = incomingBuffer.substring(0, newlineIndex).trim(); // Get line, remove trailing \r if present
                incomingBuffer = incomingBuffer.substring(newlineIndex + 1); // Remove processed line from buffer

                if (line) { // Only process non-empty lines
                    parseAndStoreData(line);
                }
            }
            // Keep any remaining partial line in the buffer for the next chunk
        }

        function parseAndStoreData(line) {
            const threshold = 20;
            const padValue = 0;

            try {
                const values = line.split(',')
                                   .map(val => val.trim())
                                   .filter(val => val !== '')
                                   .map(Number);

                // --- Basic Format/Range Validation ---
                const isValidFormat = values.every(v => !isNaN(v) && v <= 360); // Allow negatives up to 360

                if (isValidFormat && values.length > 0) {
                    // Store only viz-channel values for live display; raw values kept in local `values`
                    absoluteLatestData = vizChannelIndices.length > 0
                        ? vizChannelIndices.map(i => values[i] != null ? values[i] : 0)
                        : values;

                    // --- Button Channel Interception ---
                    // Handle before anything else; button values never reach viz storage.
                    // Debounced per channel — ignores repeats within BUTTON_DEBOUNCE_MS.
                    buttonChannelIndices.forEach(i => {
                        const btnVal = values[i];
                        if (btnVal !== 1 && btnVal !== 6) return; // only act on press / longpress

                        const now = Date.now();
                        if ((now - (buttonLastFiredAt[i] || 0)) < BUTTON_DEBOUNCE_MS) return;
                        buttonLastFiredAt[i] = now;

                        if (btnVal === 1) cycleNextVisualization(); // pressed → cycle final viz
                        // 6 = longpress — reserved for future use
                        // 3 = released — intentionally ignored
                    });
                    // -----------------------------------

                    // --- Installation Mode Trigger Check ---
                    if (isInstallationMode && isWatching && !isCollecting) {
                        const triggerCount = triggerSensorIndices.filter(i => (values[i] || 0) > TRIGGER_THRESHOLD).length;
                        if (triggerCount >= TRIGGER_MIN_COUNT) {
                            isWatching = false;
                            startCollection();
                        }
                    }
                    // ---------------------------------------

                    // --- Sensor Control for Overlay Viz ---
                    if (currentLiveVisualization === 'wovenTapestryOverlay' && values.length >= 13) {
                        // Speed (using index 10 -> values[10])
                        const speedValue = values[10];
                        const newSpeed = p5Instance.map(speedValue, 0, 360, 0.1, 5.0);
                        overlayDrawSpeed = p5Instance.constrain(newSpeed, 0.1, 5.0);

                        // Opacity (using index 11 -> values[11])
                        const opacityValue = values[11];
                        const newAlpha = p5Instance.map(opacityValue, 0, 360, 0.0, 1.0);
                        overlayDrawAlpha = p5Instance.constrain(newAlpha, 0.05, 1.0); // Enforce minimum 0.05

                        // Weft Height (using index 12 -> values[12])
                        const weftHeightValue = values[12];
                        const newWeftHeight = p5Instance.map(weftHeightValue, 0, 360, 1, 10);
                        overlayWeftHeight = Math.round(p5Instance.constrain(newWeftHeight, 1, 10));

                        // --- Update UI Sliders to Reflect Sensor Values ---
                        // This ensures sliders track sensors *while this viz is active*
                        if (overlaySpeedSlider && overlaySpeedValueSpan) {
                            overlaySpeedSlider.value = overlayDrawSpeed;
                            overlaySpeedValueSpan.textContent = overlayDrawSpeed.toFixed(1);
                        }
                        if (overlayOpacitySlider && overlayOpacityValueSpan) {
                             overlayOpacitySlider.value = overlayDrawAlpha;
                             overlayOpacityValueSpan.textContent = overlayDrawAlpha.toFixed(2);
                        }
                        if (overlayWeftHeightSlider && overlayWeftHeightValueSpan) {
                             overlayWeftHeightSlider.value = overlayWeftHeight;
                             overlayWeftHeightValueSpan.textContent = overlayWeftHeight;
                        }
                        // --- End UI Slider Update ---
                    }
                    // ------------------------------------

                    // Set expected length based on viz channels (not raw line length)
                    if (isCollecting && expectedDataLength === -1) {
                        const vizLen = vizChannelIndices.length > 0 ? vizChannelIndices.length : values.length;
                        expectedDataLength = vizLen;
                        console.log(`Determined expected data length for this collection: ${expectedDataLength}`);
                    }
                } else {
                    console.warn("Invalid data format/range received:", line, values);
                    return;
                }
                // ---------------------------------------


                // --- Threshold Check & Data Storage Logic ---
                if (isCollecting) {
                    // Extract only the viz channels (sensor + rotary), discarding button channels
                    const vizValues = vizChannelIndices.length > 0
                        ? vizChannelIndices.map(i => values[i] != null ? values[i] : padValue)
                        : values;

                    const meetsThreshold = vizValues.some(v => v > threshold);
                    if (meetsThreshold) {
                        if (expectedDataLength === -1) {
                             expectedDataLength = vizValues.length;
                             console.log(`Determined expected data length: ${expectedDataLength}`);
                         }

                        let adjustedValues = [];
                        if (vizValues.length === expectedDataLength) adjustedValues = vizValues;
                        else if (vizValues.length < expectedDataLength) { adjustedValues = [...vizValues]; while (adjustedValues.length < expectedDataLength) adjustedValues.push(padValue); }
                        else { adjustedValues = vizValues.slice(0, expectedDataLength); }

                        collectedData.push(adjustedValues);
                        updateDataCount();

                        // *** Define durationMs HERE ***
                        const durationMs = parseInt(collectDurationInput.value, 10) * 1000;

                        // Update progress based on time (only if not indefinite)
                        if (durationMs > 0 && !collectIndefinitely) {
                            lastValidProgress = Math.min((Date.now() - collectionStartTime) / durationMs, 1);
                        }
                    }
                }
                // -------------------------------------------

            } catch (parseError) {
                 console.error("Error parsing line:", line, parseError);
            }
        }


        async function disconnectSerial() {
            keepReading = false;
            try {
                // cancel() releases the reader lock internally — do not call releaseLock() after
                if (reader) {
                    try { await reader.cancel(); } catch(e) {}
                    reader = null;
                }
                if (port) {
                    try { await port.close(); } catch(e) {}
                    port = null;
                }
            } finally {
                // Always reset state
                port = null;
                reader = null;
                expectedDataLength = -1;
                absoluteLatestData = null;
                updateStatus('Disconnected', 'disconnected');
                updateButtonStates();
                console.log('Serial port disconnected.');
            }
        }

        async function tryAutoConnectOnLoad() {
            if (!('serial' in navigator)) return; // Web Serial not supported

            try {
                console.log("Checking for previously granted ports on load...");
                const existingPorts = await navigator.serial.getPorts();

                if (existingPorts.length === 1) {
                    console.log("Found one remembered port. Attempting auto-reconnect...");
                    port = existingPorts[0];
                    try {
                        await port.open({ baudRate: 9600 });
                        updateStatus('Auto-reconnected', 'connected');
                        keepReading = true;
                        readLoop(); // Start reading
                        updateButtonStates();
                         // Initialize P5 now that we have a connection
                         if (!p5Instance) {
                             p5Instance = new p5(sketch);
                         } else {
                             // Optional: Reset p5 state if it existed somehow
                             p5Instance.clearCanvas?.(); // Use optional chaining
                         }
                        console.log("Auto-reconnect successful.");
                        if (isInstallationMode) startWatching();
                        return true; // Indicate success
                    } catch (err) {
                        console.warn(`Failed to auto-reopen remembered port: ${err.message}. Manual connection required.`);
                        port = null; // Reset port if opening failed
                        updateStatus('Disconnected (auto-reconnect failed)', 'disconnected');
                        updateButtonStates();
                    }
                } else if (existingPorts.length > 1) {
                    console.log("Multiple remembered ports found. Manual connection required.");
                } else {
                    console.log("No remembered ports found. Manual connection required.");
                }
            } catch (err) {
                console.error("Error during auto-connect check:", err);
                // Ensure UI reflects disconnected state
                updateStatus('Disconnected (error)', 'error');
                 updateButtonStates();
            }
            return false; // Indicate auto-connect did not happen or failed
        }

        // --- Data Collection ---
        function startCollection() {
            if (!port || !port.readable) {
                showError("Not connected to a serial device.");
                return;
            }
            if (isCollecting) return;

            hideError();
            collectedData = [];
            // Reset expected length for this specific collection run
            expectedDataLength = -1;
            lastValidProgress = 0;
            absoluteLatestData = null; // Clear latest data from previous run
            overlayCurrentY = -1; // Reset Y position marker
            updateDataCount();
            isCollecting = true;
            collectionStartTime = Date.now();

            let statusMessage = "";
            if (collectIndefinitely) {
                statusMessage = "Collecting data indefinitely...";
                updateStatus(statusMessage, 'collecting');
                // Do NOT set the timer
                clearTimeout(collectionTimerId);
                collectionTimerId = null; // Explicitly clear timer ID
            } else {
                const durationSeconds = parseInt(collectDurationInput.value, 10);
                const durationMs = durationSeconds * 1000;
                statusMessage = `Collecting data for ${durationSeconds}s...`;
                updateStatus(statusMessage, 'collecting');
                // Set the timer only if not indefinite
                clearTimeout(collectionTimerId);
                collectionTimerId = setTimeout(stopCollection, durationMs);
            }

            updateButtonStates(); // Update buttons after setting isCollecting

            // Prepare p5 canvas
            if (p5Instance) {
                 if (p5Instance.sketchInstanceVariables && typeof p5Instance.sketchInstanceVariables.clearParticles === 'function') {
                    p5Instance.sketchInstanceVariables.clearParticles();
                 }
                 // Trigger the sigil dissolve transition
                 if (p5Instance.sketchInstanceVariables && typeof p5Instance.sketchInstanceVariables.beginDissolve === 'function') {
                    p5Instance.sketchInstanceVariables.beginDissolve();
                 }
                 // Reset slow-reveal cursor
                 if (p5Instance.sketchInstanceVariables) {
                    p5Instance.sketchInstanceVariables.resetReadingFrame?.();
                 }

                 // Set initial background based on selected live visualization
                 // Modes that don't clear per frame need an initial clear.
                 if (currentLiveVisualization === 'centeredStrips' || currentLiveVisualization === 'wovenTapestryOverlay') {
                     p5Instance.background(240);
                     if (currentLiveVisualization === 'wovenTapestryOverlay' && p5Instance.height) {
                         overlayCurrentY = p5Instance.height; // Initialize Y specifically for overlay
                     }
                 } else {
                     // For others (particles, standard tapestry, none), the background
                     // will be handled within their respective draw cases.
                     p5Instance.background(240); // General initial clear still okay
                 }

                 p5Instance.loop(); // Start the p5 draw loop
            }
        }

        function stopCollection() {
            if (!isCollecting) return; // Not collecting

            isCollecting = false;
            isWatching = false;
            clearTimeout(collectionTimerId); // Clear timer in case stopped manually
            const collectionEndTime = Date.now();
            const actualDuration = ((collectionEndTime - collectionStartTime) / 1000).toFixed(1);

            updateStatus(`Collection finished (${actualDuration}s). ${collectedData.length} points captured.`, 'finished');
            updateButtonStates();

            // Stop the p5 draw loop and trigger a final draw for the selected post-collection visualization
            if (p5Instance) {
                // Clear dissolve state so the final viz renders, not the frozen sigil
                if (p5Instance.sketchInstanceVariables) {
                    p5Instance.sketchInstanceVariables.resetDissolve();
                }
                p5Instance.noLoop();
                p5Instance.redraw(); // Redraw one last time with the selected visualization
            }

            // In installation mode, schedule automatic reset back to watching
            if (isInstallationMode && autoSceneChange) {
                displayHoldStartTime = Date.now();
                displayHoldTimerId = setTimeout(resetToWatching, DISPLAY_HOLD_MS);
                if (p5Instance) p5Instance.loop(); // keep drawing so countdown animates
            }
        }

        // --- Installation Mode Functions ---
        function startWatching() {
            if (!isInstallationMode) return;
            isWatching = true;
            clearTimeout(displayHoldTimerId);
            displayHoldTimerId = null;
            updateStatus('Watching for activity...', 'connected');
            if (p5Instance) {
                p5Instance.loop(); // Keep draw running so the waiting animation plays
            }
        }

        function resetToWatching() {
            // Called after the display hold period ends
            displayHoldStartTime = null;
            collectedData = [];
            expectedDataLength = -1;
            lastValidProgress = 0;
            absoluteLatestData = null;
            overlayCurrentY = -1;
            updateDataCount();
            if (p5Instance && p5Instance.sketchInstanceVariables) {
                p5Instance.sketchInstanceVariables.resetDissolve();
            }
            startWatching();
            if (p5Instance) {
                p5Instance.loop();
            }
        }
        // ---------------------------------

        // --- P5 Sketch Definition ---
        const sketch = (p) => {
            let canvasWidth = 600;
            let canvasHeight = 400;

            // Store sketch-specific variables/functions needed externally
            // Note: This is a slight workaround for accessing sketch state from global functions
            let sigilDissolveAlpha = 0;   // 0 = sigil visible, 1 = fully dissolved
            let sigilDissolving = false;   // true while transition is running
            let readingFrameIndex = 0;    // slow-reveal cursor into collectedData during aura live viz

            p.sketchInstanceVariables = {
                 particles: [],
                 clearParticles: () => { p.sketchInstanceVariables.particles = []; },
                 beginDissolve: () => { sigilDissolving = true; sigilDissolveAlpha = 0; },
                 resetDissolve: () => { sigilDissolving = false; sigilDissolveAlpha = 0; },
                 resetReadingFrame: () => { readingFrameIndex = 0; }
            };
            let particles = p.sketchInstanceVariables.particles; // Local reference

            // Simple Particle class (or object structure)
            class Particle {
                constructor(x, y, vx, vy, lifespan, col) {
                    this.pos = p.createVector(x, y);
                    this.vel = p.createVector(vx, vy);
                    this.lifespan = lifespan; // Frames
                    this.initialLifespan = lifespan;
                    this.col = col; // p5.color object
                }

                update() {
                    this.pos.add(this.vel);
                    this.lifespan -= 1;
                }

                display() {
                    // Fade out as lifespan decreases
                    let alpha = p.map(this.lifespan, 0, this.initialLifespan, 0, 255);
                    // Use HSB components from the stored color, but adjust alpha
                    p.fill(p.hue(this.col), p.saturation(this.col), p.brightness(this.col), alpha / 255); // p5 alpha is 0-1 in HSB
                    p.noStroke();
                    p.ellipse(this.pos.x, this.pos.y, 8, 8); // Draw particle as a small circle
                }

                isDead() {
                    return this.lifespan <= 0;
                }
            }


            // Visualization functions are defined within the sketch scope
            const visualizations = {
                lines: (data) => {
                    p.noFill();
                    p.strokeWeight(1.5); // Set consistent stroke weight

                    if (data.length === 0 || data[0].length === 0) return; // No data

                    const numLines = data[0].length;
                    const spacing = p.width / (data.length -1 || 1); // Avoid division by zero if only 1 point
                    const hueStep = 360 / (numLines || 1); // Distribute hues evenly

                            p.curveVertex(x, y);
                        }

                        // Add last point twice for smooth end

                        const endY = p.map(data[data.length - 1][j] || 0, 0, 360, p.height - 20, 20);
                        p.curveVertex(endX, endY);
                        p.curveVertex(endX, endY);
                        
                        p.endShape();
                    }

                },

                    const lastDataPoint = data[data.length - 1];

                    for (let i = 0; i < numStreams; i++) {

                radial: (data) => {

                    const angleStep = p.TWO_PI / data.length; // Angle per data point over time

                    for (let j = 0; j < numStreams; j++) {
                        // Assign color based on stream index
                        p.stroke((j * 70) % 360, 80, 70); // HSB color mode

                        for (let i = 0; i < data.length; i++) {
                            const value = data[i][j] || 0;
                            const len = p.map(value, 0, 360, 0, maxLen);
                            const angle = i * angleStep - p.HALF_PI; // Start from top

                            const x = centerX + p.cos(angle) * len;
                            const y = centerY + p.sin(angle) * len;

                            // Draw a line from center to point for each reading
                            p.line(centerX, centerY, x, y);
                        }
                    }
                },

                    const numDataPoints = data.length;

                    const barWidth = p.width / numDataPoints;
                    // Removed maxPossibleTotalValue, as we now normalize each bar to full height

                    for (let i = 0; i < numDataPoints; i++) {
                        let totalValue = 0;
                        // Calculate total value for this time step first
                        for (let j = 0; j < numStreams; j++) {
                            totalValue += data[i][j] || 0;
                        }

                        // No longer need totalBarHeight mapping
                        // const totalBarHeight = p.map(totalValue, 0, maxPossibleTotalValue, 0, p.height);

                        // Draw segments, scaling them to fill p.height proportionally
                        let segmentStartY = p.height; // Start drawing from the bottom
                        for (let j = 0; j < numStreams; j++) {
                            const value = data[i][j] || 0;

                            // Calculate segment height as a proportion of the *total canvas height*
                            // If totalValue is 0, make segments equal height (or handle as needed)
                            let segmentHeight = 0;
                            if (totalValue > 0) {
                                segmentHeight = (value / totalValue) * p.height;
                            } else if (numStreams > 0) {
                                // Handle case where all values are 0: distribute height equally
                                segmentHeight = p.height / numStreams;
                            }

                            // Assign color based on stream index (using HSB)
                            // Use a distinct hue for each stream index j
                            const hue = (j * (360 / (numStreams || 1))) % 360;
                            p.fill(hue, 85, 90); // Consistent saturation/brightness

                            // Draw the rectangle segment
                            // Ensure segmentHeight is not negative or excessively large due to floating point issues
                            segmentHeight = p.max(0, segmentHeight); 
                            // Prevent drawing above canvas top if rounding errors occur
                            const yPos = p.max(0, segmentStartY - segmentHeight);
                            const actualDrawHeight = segmentStartY - yPos;

                            p.rect(i * barWidth, yPos, barWidth, actualDrawHeight);

                            // Update the starting Y for the next segment
                            segmentStartY = yPos; // Move start Y to the top of the drawn segment
                        }
                         // Ensure the very top is filled due to potential rounding errors
                         if (segmentStartY > 0.1 && i*barWidth >=0 ) { // Check if a small gap remains at the top
                             p.rect(i * barWidth, 0, barWidth, segmentStartY); // Fill remaining gap
                         }
                    }

                    // Optional: Add labels or legend
                    p.fill(50); // Dark grey text

                histogram: (data) => {

                    let binCounts = new Array(numBins).fill(0); // Initialize counts to zero

                    // --- Data Processing: Count values into bins ---
                    // We'll analyze the *first* data stream (index 0)
                    for (let i = 0; i < data.length; i++) {
                        const value = data[i][0] || 0; // Get value from the first stream
                        // Ensure value is within expected range (clamp just in case)
                        const clampedValue = p.constrain(value, 0, 359.999); // Use 359.999 to keep 360 out of bounds for bin index calc
                        const binIndex = Math.floor(clampedValue / binWidthValue);
                        if (binIndex >= 0 && binIndex < numBins) {
                            binCounts[binIndex]++;
                        } else {
                             console.warn(`Value ${value} resulted in unexpected bin index ${binIndex}`);
                        }
                    }

                    // --- Drawing ---
                    let maxCount = 0;
                    for (let count of binCounts) {
                        if (count > maxCount) {
                            maxCount = count;

                    if (maxCount === 0) {
                         p.fill(150);

                    const barWidthPixels = p.width / numBins;

                    for (let b = 0; b < numBins; b++) {

                        // Map range [0, maxCount] to [0, p.height]
                        const barHeight = p.map(binCounts[b], 0, maxCount, 0, p.height);

                        const binStart = Math.round(b * binWidthValue);

                        // Only draw label if bar has some width
                        if (barWidthPixels > 20) {
                             p.text(`${binStart}-${binEnd}`, x + barWidthPixels / 2, p.height - 5);
                        }
                         p.fill(0, 80, 80); // Reset fill for next bar
                         p.stroke(100); // Reset stroke for next bar
                    }

                     // Add overall title/info
                     p.fill(50);
                     p.noStroke();
                     p.textAlign(p.LEFT, p.TOP);
                     p.text(`Histogram of Stream 1 values (${data.length} points, max count: ${maxCount})`, 5, 5);
                },
                heatmap: (data) => {

                    if (data.length === 0 || data[0].length === 0) {

                },
                concentricArcs: (data) => {
                    p.background(0, 0, 10); // Dark background
                    if (data.length === 0 || data[0].length === 0) return;

                    const numTimeSteps = data.length;

                    // Space the rings based on the number of sensors
                    const ringSpacing = numStreams > 1 ? maxRadius / (numStreams -1) : maxRadius; 
                    const innerRadius = numStreams > 1 ? 0 : maxRadius / 2; // Small inner radius if multiple streams

                    // Calculate the angle step for each time point along the circumference
                    const angleStep = p.TWO_PI / numTimeSteps;
                    // Define a small gap angle between segments (optional, set to 0 for no gap)
                    const angleGap = p.radians(0.5); // Small gap in radians

                    p.noFill();
                    // Determine stroke weight based on ring density
                    const baseStrokeWeight = p.max(1, ringSpacing * 0.5); // Adjust multiplier (0.5) as needed
                    p.strokeWeight(baseStrokeWeight);

                    // Iterate through sensor streams (rings)
                    for (let j = 0; j < numStreams; j++) {
                        // Calculate the radius for the current sensor's ring
                        const radius = innerRadius + j * ringSpacing;
                        const diameter = radius * 2;

                        // Iterate through time steps (arc segments)
                        for (let i = 0; i < numTimeSteps; i++) {
                            const value = data[i][j] || 0;

                            // --- Condition to draw the arc: value > 0 ---
                            // (Could be adjusted to a different threshold)
                            if (value > 0) {
                                // Map value (0-360) to hue
                                const hue = p.map(value, 0, 360, 0, 360);
                                // Use high saturation/brightness for visibility
                                p.stroke(hue, 90, 95);

                                // Calculate start and end angles for the arc segment
                                // Subtract HALF_PI to start drawing from the top
                                const startAngle = (i * angleStep) - p.HALF_PI + (angleGap / 2);
                                // Ensure end angle doesn't overlap start due to gap
                                const endAngle = ((i + 1) * angleStep) - p.HALF_PI - (angleGap / 2);

                                // Draw the arc only if endAngle > startAngle (handles the gap)
                                if (endAngle > startAngle) {
                                    p.arc(centerX, centerY, diameter, diameter, startAngle, endAngle);
                                }
                            }
                            // --- If value <= 0, do nothing, leaving a gap ---
                        }
                    }
                     // Optional: Add a center marker or labels if needed
                     p.fill(0, 0, 80); // White-ish
                     p.noStroke();
                     p.ellipse(centerX, centerY, 5, 5);
