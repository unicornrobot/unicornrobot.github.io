                sigilResult: (data) => {
                    // --- Sigil Result — reveal & 4-fold mandala ---
                    p.background(0, 0, 3);

                    // If no sigilPath was captured, derive a fallback from collectedData
                    const path = sigilPath.length > 2 ? sigilPath : (() => {
                        const fallback = [];
                        let fx = 0, fy = 0, fa = -p.HALF_PI;
                        const maxR = Math.min(p.width, p.height) * 0.42;
                        for (let i = 0; i < data.length; i++) {
                            const d = data[i] || [];
                            const v0 = (d[0] || 0) / 360, v1 = (d[1] || 0) / 360;
                            const v2 = (d[2] || 0) / 360, v3 = (d[3] || 0) / 360;
                            const v6 = (d[6] || 0) / 360, v7 = (d[Math.min(7, d.length-1)] || 0) / 360;
                            fa += p.map(v0 - v1, -1, 1, -0.15, 0.15);
                            const dist2c = Math.sqrt(fx * fx + fy * fy);
                            if (dist2c > maxR * 0.82) fa += (Math.atan2(-fy, -fx) - fa) * 0.06;
                            const step = p.map((v2 + v3) * 0.5, 0, 1, 1.5, 6);
                            fx += Math.cos(fa) * step;
                            fy += Math.sin(fa) * step;
                            const hue = (270 + i * 0.35) % 360;
                            fallback.push({ x: fx, y: fy, weight: p.map((v6 + v7) * 0.5, 0, 1, 0.4, 2.8), hue, sat: 75, bri: 85 });
                        }
                        return fallback;
                    })();

                    if (path.length < 2) return;

                    // Advance reveal cursor (~180 frames for full reveal regardless of path length)
                    const REVEAL_SPEED = Math.max(1, Math.floor(path.length / 180));
                    if (!sigilRevealDone) {
                        sigilRevealIndex = Math.min(sigilRevealIndex + REVEAL_SPEED, path.length - 1);
                        if (sigilRevealIndex >= path.length - 1) sigilRevealDone = true;
                    }
                    const drawUpTo = sigilRevealIndex;

                    // --- Compute normalisation (once, using the full path bounding box) ---
                    if (!sigilNorm) {
                        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                        for (const pt of path) {
                            if (pt.x < minX) minX = pt.x; if (pt.x > maxX) maxX = pt.x;
                            if (pt.y < minY) minY = pt.y; if (pt.y > maxY) maxY = pt.y;
                        }
                        const pathW = maxX - minX || 1;
                        const pathH = maxY - minY || 1;
                        const pathCx = (minX + maxX) / 2;
                        const pathCy = (minY + maxY) / 2;
                        // Fit within canvas leaving 10% padding on each side
                        const fitW = p.width  * 0.80;
                        const fitH = p.height * 0.80;
                        sigilNorm = {
                            cx: pathCx,
                            cy: pathCy,
                            scale: Math.min(fitW / pathW, fitH / pathH)
                        };
                    }
                    const { cx: ncx, cy: ncy, scale: nsc } = sigilNorm;
                    const screenCx = p.width  / 2;
                    const screenCy = p.height / 2;

                    // Helper: draw path[0..upTo] centred & scaled. Caller sets up transform.
                    // Fades in over the first 8% of points and out over the last 8%.
                    const tx = (pt) => (pt.x - ncx) * nsc;
                    const ty = (pt) => (pt.y - ncy) * nsc;

                    const drawSigilPath = (upTo, alphaScale) => {
                        p.noFill();
                        const fadeLen = Math.max(4, Math.floor((upTo + 1) * 0.08));
                        for (let i = 1; i <= upTo; i++) {
                            const pt   = path[i];
                            const prev = path[i - 1];
                            // Fade at head and tail
                            let fade = 1.0;
                            if (i < fadeLen)           fade = i / fadeLen;
                            if (i > upTo - fadeLen)    fade = (upTo - i) / fadeLen;
                            p.stroke(pt.hue, pt.sat, pt.bri, 0.78 * alphaScale * fade);
                            p.strokeWeight(pt.weight);
                            p.line(tx(prev), ty(prev), tx(pt), ty(pt));
                        }
                    };

                    // --- 4-fold symmetry copies (behind, low alpha) ---
                    if (sigilRevealDone) {
                        for (let k = 1; k < 4; k++) {
                            p.push();
                            p.translate(screenCx, screenCy);
                            p.rotate(k * p.HALF_PI);
                            drawSigilPath(drawUpTo, 0.14);
                            p.pop();
                        }
                    }

                    // --- Primary sigil ---
                    p.push();
                    p.translate(screenCx, screenCy);
                    drawSigilPath(drawUpTo, 1.0);
                    p.pop();

                    // --- Radial glow bloom ---
                    if (sigilRevealDone) {
                        const glowT   = (p.frameCount % 300) / 300;
                        const glowR   = Math.min(p.width, p.height) * (0.28 + p.sin(glowT * p.TWO_PI) * 0.02);
                        const lastHue = path[path.length - 1].hue;
                        p.noStroke();
                        //Concentric rings?
                        /*
                        for (let r = 3; r >= 1; r--) {
                            p.fill(lastHue, 60, 80, 0.03 * r);
                            p.ellipse(screenCx, screenCy, glowR * r, glowR * r);
                        }
                        p.fill(lastHue, 30, 100, 0.55);
                        p.ellipse(screenCx, screenCy, 10, 10);
                        p.fill(lastHue, 10, 100, 0.35);
                        p.ellipse(screenCx, screenCy, 22, 22);
                        */

                    }

                    if (!sigilRevealDone) p.loop(); else p.noLoop();
                }, // End sigilResult

                maskResult: (data) => {
                    // --- Mask Result ---
                    // Compute per-channel averages (0-360) from collected data
                    const nCh = data[0] ? data[0].length : 0;
                    if (nCh < 1) return;
                    const avgs = Array.from({ length: nCh }, (_, j) => {
                        const sum = data.reduce((s, row) => s + (row[j] || 0), 0);
                        return sum / data.length;
                    });
                    const norm = avgs.map(v => p.constrain(v / 360, 0, 1));

                    p.background(0, 0, 4);
                    p.angleMode(p.DEGREES);
                    p.colorMode(p.HSB, 360, 100, 100, 100);
                    p.blendMode(p.ADD);

                    const W = p.width, H = p.height;
                    const cx = W / 2;

                    // Noise grain graphics
                    const grain = p.createGraphics(W, H);
                    grain.noStroke();
                    grain.fill(255, 12);
                    for (let i = 0; i < W * H * 0.01; i++) {
                        const gx = p.random(W), gy = p.random(H);
                        grain.ellipse(gx, gy, p.noise(gx * 0.01, gy * 0.01) * 1.5 + 0.5);
                    }

                    // Superellipse helper (from masks.js)
                    const drawSuperEllipse = (ex, ey, ew, eh, n) => {
                        const na = 2 / Math.max(n, 0.1);
                        p.beginShape();
                        for (let a = 0; a < 360; a += 3) {
                            const ca = p.cos(a), sa = p.sin(a);
                            p.vertex(
                                ex + Math.pow(Math.abs(ca), na) * ew / 2 * (ca >= 0 ? 1 : -1),
                                ey + Math.pow(Math.abs(sa), na) * eh / 2 * (sa >= 0 ? 1 : -1)
                            );
                        }
                        p.endShape(p.CLOSE);
                    };

                    const drawShape = (sx, sy, sw, sh, shapeNum, m) => {
                        switch (shapeNum) {
                            case 0: p.ellipse(sx+sw/2, sy+sh/2, sw, sh); break;
                            case 1: p.arc(sx, sy, sw*2, sh*2, 0, 90, p.PIE); break;
                            case 2: p.quad(sx, sy, sx+sw/2, sy, sx+sw, sy+sh, sx+sw/2, sy+sh); break;
                            case 3: p.circle(sx+sw/2, sy+sh/2, Math.min(sw, sh)); break;
                            case 4: p.rect(sx, sy, sw, sh, Math.max(sw, sh) * 0.3); break;
                            case 5: p.triangle(sx, sy, sx+sw, sy+sh, sx+sw, sy); break;
                            case 6: drawSuperEllipse(sx+sw/2, sy+sh/2, sw, sh, m); break;
                        }
                    };

                    // 8 mask zones — positioned symmetrically like a ritual face mask
                    // [fracCentreX, fracCentreY, fracW, fracH, sensorChannel]
                    const zones = [
                        { fx:0.50, fy:0.26, fw:0.42, fh:0.088, ch:0 }, // brow / crown
                        { fx:0.38, fy:0.36, fw:0.152, fh:0.112, ch:1 }, // left eye
                        { fx:0.62, fy:0.36, fw:0.152, fh:0.112, ch:2 }, // right eye
                        { fx:0.31, fy:0.50, fw:0.136, fh:0.168, ch:3 }, // left cheek
                        { fx:0.69, fy:0.50, fw:0.136, fh:0.168, ch:4 }, // right cheek
                        { fx:0.50, fy:0.50, fw:0.120, fh:0.152, ch:5 }, // nose
                        { fx:0.50, fy:0.64, fw:0.272, fh:0.080, ch:6 }, // mouth
                        { fx:0.50, fy:0.73, fw:0.224, fh:0.088, ch:7 % nCh }, // chin
                    ];

                    // Draw a zone using the masks.js layered-shear technique
                    const drawZone = (zx, zy, zw, zh, ch) => {
                        const v = norm[Math.min(ch, norm.length - 1)];

                        const hue      = p.map(v, 0, 1, 200, 45);
                        const sat      = p.map(v, 0, 1, 40, 95);
                        const bri      = p.map(v, 0, 1, 40, 95);
                        const shapeNum = Math.floor(p.map(v, 0, 1, 0, 6.99));
                        const angle    = p.map(v, 0, 1, 90, 270);
                        const shXamt   = p.map(v, 0, 1, -7, 7);
                        const shYamt   = p.map(v, 0, 1, -5, 5);
                        const sep      = Math.max(2, Math.floor(p.map(v, 0, 1, 2, 6)));
                        const mVal     = p.map(v, 0, 1, 0.4, 3.5);
                        const swBase   = p.map(v, 0, 1, 0.5, 2.2);
                        const glowSz   = p.map(v, 0, 1, 8, Math.max(zw, zh) / 2.2);
                        const cw = zw * 0.70, ch2 = zh * 0.70;

                        // Left side
                        p.push();
                        p.translate(zx, zy);
                        p.drawingContext.shadowBlur = glowSz;
                        p.drawingContext.shadowColor = p.color(hue, sat, bri, 80);
                        for (let i = 1.3; i > 0; i -= 1 / sep) {
                            p.push();
                            p.scale(i);
                            p.strokeWeight(swBase / i);
                            p.shearX(shXamt); p.shearY(shYamt);
                            p.rotate(angle);
                            p.translate(-cw / 2, -ch2 / 2);
                            p.stroke(hue, sat, bri, p.map(i, 0, 1.3, 15, 85));
                            p.noFill();
                            drawShape(0, 0, cw, ch2, shapeNum, mVal);
                            p.pop();
                        }
                        p.drawingContext.shadowBlur = 0;
                        p.pop();

                        // Right-side mirror (bilateral symmetry via scale(-1,1))
                        p.push();
                        p.translate(W - zx, zy);
                        p.scale(-1, 1);
                        p.drawingContext.shadowBlur = glowSz;
                        p.drawingContext.shadowColor = p.color(hue, sat, bri, 80);
                        for (let i = 1.3; i > 0; i -= 1 / sep) {
                            p.push();
                            p.scale(i);
                            p.strokeWeight(swBase / i);
                            p.shearX(shXamt); p.shearY(shYamt);
                            p.rotate(angle);
                            p.translate(-cw / 2, -ch2 / 2);
                            p.stroke(hue, sat, bri, p.map(i, 0, 1.3, 15, 85));
                            p.noFill();
                            drawShape(0, 0, cw, ch2, shapeNum, mVal);
                            p.pop();
                        }
                        p.drawingContext.shadowBlur = 0;
                        p.pop();
                    };

                    p.noFill();
                    zones.forEach(z => drawZone(z.fx * W, z.fy * H, z.fw * W, z.fh * H, z.ch));

                    // Faint vertical axis and mask silhouette
                    p.blendMode(p.BLEND);
                    p.stroke(0, 0, 20, 35);
                    p.strokeWeight(0.5);
                    p.line(cx, H * 0.22, cx, H * 0.78);
                    p.noFill();
                    p.stroke(0, 0, 35, 25);
                    p.strokeWeight(0.8);
                    p.ellipse(cx, H * 0.50, W * 0.48, H * 0.58);

                    // Grain overlay
                    p.blendMode(p.ADD);
                    p.image(grain, 0, 0);
                    grain.remove();

                    // Restore p5 defaults for other vizzes
                    p.blendMode(p.BLEND);
                    p.colorMode(p.HSB, 360, 100, 100, 1.0);
                    p.angleMode(p.RADIANS);
                }, // End maskResult

                anniAlbers: (data) => {
                    // --- Anni Albers textile grid ---
                    // Compute per-channel averages, normalised 0-1
                    const nCh = data[0] ? data[0].length : 1;
                    const avgs = Array.from({ length: nCh }, (_, j) =>
                        data.reduce((s, row) => s + (row[j] || 0), 0) / data.length
                    );
                    const n = (i) => p.constrain(avgs[i % nCh] / 360, 0, 1);

                    const W = p.width, H = p.height;

                    // --- Parameters driven by sensor averages ---
                    // n(0): grid columns  4-12
                    const countW = Math.round(p.map(n(0), 0, 1, 4, 12));
                    // n(1): grid rows  3-8
                    const countH = Math.round(p.map(n(1), 0, 1, 3, 8));
                    // n(2): horizontal margin  5%-30% of width
                    const marginW = W * p.map(n(2), 0, 1, 0.05, 0.30);
                    // n(3): vertical margin  5%-20% of height
                    const marginH = H * p.map(n(3), 0, 1, 0.05, 0.20);
                    // n(4): probability of double-width tile  0-0.8
                    const doubleProb = p.map(n(4), 0, 1, 0.0, 0.80);
                    // n(5): stripe count per tile  2-12
                    const stripeCount = Math.round(p.map(n(5), 0, 1, 2, 12));
                    // n(6): stripe height multiplier  thin-thick
                    const stripeThick = p.map(n(6), 0, 1, 1.5, 8);
                    // n(7): background lightness  light cream → deep indigo
                    const bgLight = p.map(n(7), 0, 1, 96, 12);
                    const bgHue   = p.map(n(7), 0, 1, 42, 240);
                    const bgSat   = p.map(n(7), 0, 1, 18, 55);

                    // --- Palette derived from all channel averages ---
                    // Each channel contributes one hue; saturation/brightness vary with value
                    const palette = avgs.map((avg, i) => {
                        const v   = avg / 360;
                        const hue = (p.map(v, 0, 1, 15, 340) + i * 28) % 360;
                        const sat = p.map(v, 0, 1, 30, 92);
                        const bri = p.map(v, 0, 1, 40, 96);
                        return { hue, sat, bri };
                    });
                    const pickCol = (seed) => {
                        const idx = Math.abs(Math.round(seed * 1000)) % palette.length;
                        return palette[idx];
                    };

                    // --- Background ---
                    p.colorMode(p.HSB, 360, 100, 100, 1.0);
                    p.background(bgHue, bgSat, bgLight);

                    // --- Noise grain graphics (linen texture) ---
                    const grain = p.createGraphics(W, H);
                    grain.noStroke();
                    grain.colorMode(grain.RGB, 255);
                    for (let i = 0; i < W * H * 0.008; i++) {
                        const gx = p.random(W), gy = p.random(H);
                        const gs = p.noise(gx * 0.012, gy * 0.012) * W * 0.0015;
                        grain.fill(255, 22);
                        grain.rect(gx, gy, gs, gs);
                    }

                    // --- Tile grid ---
                    const tileW = (W - marginW * 2) / countW;
                    const tileH = (H - marginH * 2) / countH;

                    // Deterministic seed per cell position
                    const cellSeed = (col, row) => (col * 7.391 + row * 13.17 + n(0) + n(1));

                    for (let row = 0; row < countH; row++) {
                        const ty = marginH + row * tileH;
                        let col = 0;
                        while (col < countW) {
                            const seed = cellSeed(col, row);
                            const spaceLeft = countW - col;
                            // Double-width tile probability comes from n(4)
                            const isDouble = spaceLeft >= 2 && ((seed % 1) < doubleProb);
                            const mult = isDouble ? 2 : 1;
                            const tx = marginW + col * tileW;
                            const tw = tileW * mult;

                            // Base fill
                            const baseC = pickCol(seed);
                            p.noStroke();
                            p.fill(baseC.hue, baseC.sat, baseC.bri);
                            p.rect(tx, ty, tw, tileH);

                            // Horizontal stripes — colour from a different palette entry
                            const sc = stripeCount;
                            const sh = tileH / sc;
                            for (let si = 0; si < sc; si++) {
                                const stripeSeed = cellSeed(col + si * 0.31, row + si * 0.17);
                                const stripeC = pickCol(stripeSeed + 0.5);
                                // Stripe height tapers at tile edges for a woven look
                                const edgeFade = Math.sin((si / (sc - 1 || 1)) * Math.PI);
                                const sHeight = Math.max(1, stripeThick * edgeFade + 1);
                                p.fill(stripeC.hue, stripeC.sat, stripeC.bri, 0.72);
                                p.rect(tx, ty + sh * si + 1, tw, sHeight);
                            }

                            // Thin grid line between tiles
                            p.stroke(bgHue, bgSat * 0.5, bgLight * 0.6, 0.45);
                            p.strokeWeight(0.8);
                            p.noFill();
                            p.rect(tx, ty, tw, tileH);
                            p.noStroke();

                            col += mult;
                        }
                    }

                    // --- Grain overlay ---
                    p.push();
                    p.blendMode(p.MULTIPLY);
                    p.image(grain, 0, 0);
                    p.pop();
                    grain.remove();

                }, // End anniAlbers

                            const angle  = -p.HALF_PI + (i / 8) * p.TWO_PI;
                            const val01  = avgs[i] / 360;
                            const el     = ELEMENTS[i];
                            const armLen = octR * (0.18 + val01 * 0.82) * armProg;
                            const tipX   = octCX + Math.cos(angle) * armLen;
                            const tipY   = octCY + Math.sin(angle) * armLen;

                            // Glow halo
                            p.stroke(el.hue, el.sat, 75, 0.16 * armProg);

                            p.line(octCX, octCY, tipX, tipY);

                            p.noStroke();
                            const dr = (2.5 + val01 * 3.5) * armProg;
                            p.fill(el.hue, el.sat - 15, 96, 0.85 * armProg);
                            p.ellipse(tipX, tipY, dr * 2, dr * 2);

                            // Full element name at labelR
                            if (armProg > 0.3) {
                                const lx = octCX + Math.cos(angle) * labelR;
                                const ly = octCY + Math.sin(angle) * labelR;
                                p.fill(el.hue, el.sat - 25, 78, armProg * 0.82);
                                p.textAlign(p.CENTER, p.CENTER);
                                p.textSize(Math.max(6, W * 0.012));
                                p.textFont('sans-serif');
                                p.text(el.name, lx, ly);
                            }
                        }

                        // Centre glow
                        const cp = Math.min(octProg * 2.5, 1);
                        p.noStroke();
                        p.fill(40, 15, 100, cp * (0.45 + 0.28 * Math.sin(f * 0.07)));
                        p.ellipse(octCX, octCY, 8, 8);
                        p.fill(40, 5, 100, cp * 0.6);
                        p.ellipse(octCX, octCY, 3.5, 3.5);
                    }

                    // ── Vertical divider + bottom strip line (with first row) ────
                    if (f > 210) {

                        p.stroke(38, 20, 40, divA * 0.4);

                        // Vertical divider between panels
                        p.line(W * 0.54, contentTop, W * 0.54, stripTop - H * 0.01);

                        p.line(W * 0.04, stripTop - H * 0.01, W * 0.96, stripTop - H * 0.01);

                    // ── Phase 3 (210–450): fortune rows (right) + dot gauges (bottom)
                    for (let i = 0; i < 8; i++) {
                        const rowA = fadeIn(210 + i * 30, 22);
                        if (rowA === 0) continue;
                        const el   = ELEMENTS[i];
                        const val  = avgs[i];
                        const band = val < 120 ? 0 : val < 240 ? 1 : 2;

                        // ── Right panel row ────────────────────────────────────
                        const ry = contentTop + i * rowH + rowH * 0.5;
                        // Element name heading
                        p.noStroke();
                        p.textAlign(p.LEFT, p.TOP);
                        p.textSize(Math.max(8, W * 0.016));
                        p.textFont('sans-serif');
                        p.fill(el.hue, el.sat - 5, 85, rowA * 0.9);
                        p.text(el.name, rightX, ry - rowH * 0.46);
                        // Fortune text
                        p.textAlign(p.LEFT, p.TOP);
                        p.textSize(Math.max(7, W * 0.015));
                        p.fill(38, 8, 70, rowA * 0.70);
                        p.text(FORTUNES[i][band], rightX, ry - rowH * 0.46 + Math.max(10, W * 0.021), rightW, rowH * 0.58);

                        // ── Bottom dot gauge column ────────────────────────────
                        const dotsLit  = Math.round(p.map(val, 0, 360, 0, 8));
                        const colCX    = colW * i + colW * 0.5;
                        const grpStart = colCX - dotGrpW * 0.5;
                        for (let d = 0; d < 8; d++) {
                            const lit = d < dotsLit;
                            const dx  = grpStart + d * dotSp;
                            p.noStroke();
                            p.fill(el.hue, lit ? el.sat : 8, lit ? 82 : 20, rowA * (lit ? 0.9 : 0.32));
                            p.ellipse(dx, dotsY, lit ? 5 : 3.5, lit ? 5 : 3.5);

                        // Abbreviated label below dots
                        p.noStroke();
                        p.fill(el.hue, el.sat - 28, 68, rowA * 0.65);
                        p.textAlign(p.CENTER, p.CENTER);
                        p.textSize(Math.max(6, W * 0.011));
                        p.textFont('sans-serif');
                        p.text(el.name.substring(0, 3), colCX, labelY);
                    }

                    // ── Phase 4 (450+): done ─────────────────────────────────────
                    if (f >= 450 && !fortuneDone) fortuneDone = true;
                    if (!fortuneDone) p.loop(); else p.noLoop();
                }, // End fortuneTeller

            }; // End visualizations object

            p.setup = () => {
                const area = document.getElementById('canvasArea');
                canvasWidth  = area.offsetWidth  || window.innerWidth;

                originalCanvasHeight = canvasHeight;

                p.colorMode(p.HSB, 360, 100, 100, 1.0); // Use HSB for easier color manipulation

                if (currentLiveVisualization === 'wovenTapestryOverlay') {
                     overlayCurrentY = p.height;
                     console.log(`Setup: Initialized overlayCurrentY to ${overlayCurrentY} based on loaded setting.`);

                }

                 // --- End Fullscreen Toggle ---
            };

            p.draw = () => {
                 particles = p.sketchInstanceVariables.particles; // Ensure local reference is up-to-date

                // --- Installation Mode: Watching/Waiting State ---
                if ((isWatching || sigilDissolving) && !isCollecting) {
                    const cx = p.width / 2;
                    const cy = p.height / 2;
                    const t = p.frameCount;
                    const NUM_NODES = 8;
                    const nodeRadius = Math.min(p.width, p.height) * 0.32;

                    // Gather live sensor values (fall back to zeros if no data yet)
                    const sensorVals = [];
                    for (let j = 0; j < NUM_NODES; j++) {
                        sensorVals.push((absoluteLatestData && absoluteLatestData[j] != null)
                            ? absoluteLatestData[j] : 0);

                    // How many nodes are above the trigger threshold
                    const activeCount = triggerSensorIndices.filter(i => (sensorVals[i] || 0) > TRIGGER_THRESHOLD).length;

                    // Idle: near-black blue-grey. Active: deep amber-brown.

                    for (let j = 0; j < NUM_NODES; j++) {
                        const baseAngle = (j / NUM_NODES) * p.TWO_PI - p.HALF_PI + globalRotation;

                        const ny = cy + p.sin(baseAngle) * nodeRadius;

                        const val = sensorVals[j] || 0;
                        const isTriggered = triggerSensorIndices.includes(j) && val > TRIGGER_THRESHOLD;
                        const fillRatio = p.constrain(val / TRIGGER_THRESHOLD, 0, 1); // 0→1 as value approaches threshold

                        // Per-node hue: idle cool blue, activated warm gold
                        const nodeHue = p.lerp(200, 45, fillRatio);
                        const nodeSat = p.lerp(40, 90, fillRatio);
                        const nodeBri = p.lerp(35, 95, fillRatio);
                        const nodeAlpha = p.lerp(0.25, 1.0, fillRatio);

                            ? p.lerp(0.35, 0.75, p.sin(t * 0.08 + j) * 0.5 + 0.5)

                        p.stroke(nodeHue, nodeSat, nodeBri, lineAlpha);
                        p.strokeWeight(isTriggered ? 1.2 : 0.6);
                        p.line(cx, cy, nx, ny);

                        const arcR = 14;
                        p.noFill();
                        // Dim track ring
                        p.stroke(nodeHue, 20, 30, 0.3);
                        p.strokeWeight(2);
                        p.arc(nx, ny, arcR * 2, arcR * 2, -p.HALF_PI, -p.HALF_PI + p.TWO_PI * 0.999);
                        // Fill arc
                        if (fillRatio > 0) {
                            p.stroke(nodeHue, nodeSat, nodeBri, nodeAlpha);
                            p.strokeWeight(2.5);
                            p.arc(nx, ny, arcR * 2, arcR * 2,
                                -p.HALF_PI,
                                -p.HALF_PI + p.TWO_PI * fillRatio);
                        }

                        // --- Node dot ---
                        p.noStroke();
                        if (isTriggered) {
                            // Outer glow
                            const glowR = 10 + p.sin(t * 0.12 + j * 1.3) * 3;
                            p.fill(nodeHue, nodeSat * 0.6, nodeBri, 0.15);
                            p.ellipse(nx, ny, glowR * 2.8, glowR * 2.8);
                            p.fill(nodeHue, nodeSat, nodeBri, 0.5);
                            p.ellipse(nx, ny, glowR * 1.6, glowR * 1.6);
                        }
                        // Core dot
                        p.fill(nodeHue, nodeSat, nodeBri, nodeAlpha);
                        p.ellipse(nx, ny, isTriggered ? 8 : 5, isTriggered ? 8 : 5);
                    }

                    // --- Central 8-pointed sigil star ---
                    // Each arm assembles when its corresponding node activates
                    const starInner = 8;
                    const starOuter = 28;
                    p.noStroke();
                    for (let j = 0; j < NUM_NODES; j++) {
                        const val = sensorVals[j] || 0;
                        const isTriggered = triggerSensorIndices.includes(j) && val > TRIGGER_THRESHOLD;
                        const fillRatio = p.constrain(val / TRIGGER_THRESHOLD, 0, 1);
                        const nodeHue = p.lerp(200, 45, fillRatio);
                        const armAlpha = isTriggered
                            ? p.lerp(0.5, 0.9, p.sin(t * 0.06 + j) * 0.5 + 0.5)
                            : fillRatio * 0.25;
                        if (armAlpha < 0.02) continue;

                        const armAngle = (j / NUM_NODES) * p.TWO_PI - p.HALF_PI + globalRotation;
                        const tipLen = p.lerp(starInner, starOuter, fillRatio);

                        // Arm tip
                        const tx = cx + p.cos(armAngle) * tipLen;
                        const ty = cy + p.sin(armAngle) * tipLen;
                        // Side shoulders (perpendicular, narrow)
                        const sideAngle = armAngle + p.HALF_PI;
                        const sw = 3;
                        const sx1 = cx + p.cos(sideAngle) * sw;
                        const sy1 = cy + p.sin(sideAngle) * sw;
                        const sx2 = cx - p.cos(sideAngle) * sw;
                        const sy2 = cy - p.sin(sideAngle) * sw;

                        p.fill(nodeHue, 80, 90, armAlpha);
                        p.beginShape();
                        p.vertex(tx, ty);
                        p.vertex(sx1, sy1);
                        p.vertex(sx2, sy2);
                        p.endShape(p.CLOSE);
                    }

                    // Central dot — glows brighter as all nodes align
                    const centralGlow = p.lerp(0.3, 1.0, alignRatio);
                    const centralHue  = p.lerp(200, 45, alignRatio);
                    p.noStroke();
                    p.fill(centralHue, 60, 90, centralGlow * 0.2);
                    p.ellipse(cx, cy, 28, 28);
                    p.fill(centralHue, 70, 95, centralGlow * 0.7);
                    p.ellipse(cx, cy, 10, 10);

                    // --- "waiting..." text --- fades gently
                    const textAlpha = p.map(p.sin(t * 0.018), -1, 1, 0.25, 0.65);
                    p.noStroke();
                    p.fill(0, 0, 88, textAlpha);
                    p.textAlign(p.CENTER, p.CENTER);
                    p.textSize(13);
                    p.textFont('sans-serif');
                    //p.text('waiting...', cx, cy + nodeRadius + 36);

                    // --- Sensor bars at bottom (commented out for now) ---
                    // if (absoluteLatestData && absoluteLatestData.length > 0) {
                    //     const barCount = absoluteLatestData.length;
                    //     const barW = p.width / barCount;
                    //     p.noStroke();
                    //     for (let j = 0; j < barCount; j++) {
                    //         const val = absoluteLatestData[j] || 0;
                    //         const barH = p.map(val, 0, 360, 0, p.height * 0.12);
                    //         const hue = p.map(val, 0, 360, 200, 0);

                    //         p.rect(j * barW, p.height - barH, barW - 1, barH);

                    // }

                    // --- Dissolve overlay: smooth white fade into collection ---
                    if (sigilDissolving) {

                        p.noStroke();

                // -------------------------------------------------

                if (isCollecting) {

                        let debugText = "DEBUG MODE: Raw Values Received\n-----------------------------\n";
                        if (absoluteLatestData && absoluteLatestData.length > 0) {

                            debugText += `[${absoluteLatestData.join(', ')}]`;
                        } else {
                            debugText += "[Waiting for data...]";
                        }
                        p.text(debugText, 10, 10);
                        return; // Exit draw early, skipping normal live viz
                    }
                    // --- END Debug Mode Check ---


                    // --- Live Visualization Logic (only runs if not in debug mode) ---
                     let latestValidData = null;
                     if (collectedData.length > 0) {
                         latestValidData = collectedData[collectedData.length - 1];
                     }
                     // We also need expectedDataLength to know how many streams to expect
                     const numStreams = (expectedDataLength > 0) ? expectedDataLength : 1; // Default to 1 if not set

                    // --- Select live visualization based on dropdown ---
                    switch (currentLiveVisualization) {
                        case 'centeredStrips':
                            p.background(30, 30, 40); // Dark background each frame
                             // --- Centered Strips Logic ---
                             // Must have valid data to draw strips
                             if (!latestValidData || collectedData.length === 0) return;

                             // **NO p.background() call here**
                             const stripBoxHeight = 2;
                             const stripTopEdgeY = p.height - (collectedData.length * stripBoxHeight);

                             let stripTotalActualWidth = 0;
                             let stripActualBoxWidths = [];
                             const stripMaxBoxWidthPerStream = p.width / numStreams;
                            for (let j = 0; j < numStreams; j++) {
                                 const value = latestValidData[j] || 0;
                                 const boxWidth = p.map(value, 0, 360, 0, stripMaxBoxWidthPerStream);
                                 stripActualBoxWidths.push(boxWidth);
                                 stripTotalActualWidth += boxWidth;
                             }
                             let stripStartX = (p.width - stripTotalActualWidth) / 2;
                             let stripCurrentX = stripStartX;
                            p.noStroke();
                            for (let j = 0; j < numStreams; j++) {
                                 const value = latestValidData[j] || 0;
                                 const boxWidth = stripActualBoxWidths[j];
                                const hue = p.map(value, 0, 360, 240, 0);

                             }
                             break; // End of centeredStrips case

                        case 'wovenTapestry':
                            // --- Woven Tapestry Logic (Full Width, Wrap-Around) ---
                            p.background(30, 30, 40); // Dark background each frame

                            const warpSpacing = 8;

                            p.stroke(warpColor);

                            for (let wx = warpSpacing / 2; wx < p.width; wx += warpSpacing) {

                            // 2. Draw Weft Rows (wrap around, draw only visible)
                            p.noStroke();
                            if (collectedData.length > 0 && weftHeight > 0) {
                                const maxVisibleRows = Math.floor(p.height / weftHeight);
                                // Calculate the starting index in collectedData to draw
                                const startIndex = Math.max(0, collectedData.length - maxVisibleRows);

                                // Loop only through the data points that should be visible
                                for (let k = startIndex; k < collectedData.length; k++) {
                                    const dataPoint = collectedData[k];
                                    if (!dataPoint || dataPoint.length !== numStreams) continue;

                                    // Calculate the index relative to the visible window
                                    const relativeIndex = k - startIndex;
                                    // Calculate Y position based on relative index
                                    const rowY = p.height - (relativeIndex + 1) * weftHeight;

                                    // --- Calculate Proportional Widths ---
                                    let totalValueForRow = 0;
                                    for (let j = 0; j < numStreams; j++) {
                                        totalValueForRow += dataPoint[j] || 0;
                                    }

                                    let rowCurrentX = 0; // Start from left edge

                                    // Draw segments proportionally across the full width
                                    for (let j = 0; j < numStreams; j++) {
                                        const value = dataPoint[j] || 0;
                                        let proportionalWidth = 0;

                                        if (totalValueForRow > 0) {
                                            proportionalWidth = (value / totalValueForRow) * p.width;
                                        } else if (numStreams > 0) {
                                            proportionalWidth = p.width / numStreams;
                                        }

                                        // Map value to color and alpha
                                        const hue = p.map(value, 0, 360, 0, 360);
                                        const saturation = p.map(value, 0, 360, 40, 90);
                                        const brightness = p.map(value, 0, 360, 50, 95);
                                        const alpha = p.map(value, 0, 360, 0.5, 1.0);

                                        if (totalValueForRow === 0) {
                                            p.fill(0, 0, 50, 0.7);
                                        } else {
                                            p.fill(hue, saturation, brightness, alpha);
                                        }

                                        if (proportionalWidth > 0) {
                                            // Ensure drawing doesn't go below 0 due to float errors
                                            if (rowY >= 0) {
                                                 p.rect(rowCurrentX, rowY, proportionalWidth, weftHeight);

                            break; // End of wovenTapestry case

                        case 'particleEmitters':
                              // --- Particle Emitter Logic ---
                              // This logic still runs every frame based on the *absolute latest* data
                              // received (via parseAndStoreData triggering redraw indirectly),
                              // regardless of the threshold, as it doesn't rely on collectedData history.
                              // Fetch the absolute latest data point processed (careful if parsing is slow)
                              // We need a way to get the *very* last parsed line, not just the last *stored* one.
                              // Let's modify parseAndStoreData slightly to store the absolute latest line.

                              // *** Need to adjust parseAndStoreData and add a new global variable ***
                              // *** See adjustment below ***

                              p.background(0, 0, 10, 0.1); // Trail effect

                              if (!absoluteLatestData || (expectedDataLength > 0 && absoluteLatestData.length !== expectedDataLength)) {
                                  break; // Check length against expected if known
                              }

                              const numEmitterStreams = absoluteLatestData.length;

                              for (let j = 0; j < numEmitterStreams; j++) {
                                  const value = absoluteLatestData[j] || 0; // Use absolute latest
                                  // ... (rest of emitter calculations: emitterX, Y, rate, hue, etc.) ...
                                   const emitterX = p.map(j, 0, numEmitterStreams - 1 || 1, p.width * 0.1, p.width * 0.9);
                                   const emitterY = p.height / 2;
                                   const emissionRate = p.map(value, 0, 360, 0, 3);
                                   const hue = p.map(value, 0, 360, 240, 0);
                                   const col = p.color(hue, 90, 90);
                                   const initialSpeed = 2;
                                   const lifespan = 80;

                                for (let i = 0; i < emissionRate; i++) {
                                       // ... (create particles) ...
                                        let angle = p.random(p.TWO_PI);
                                    let vx = p.cos(angle) * initialSpeed;
                                    let vy = p.sin(angle) * initialSpeed;
                                        p.sketchInstanceVariables.particles.push(new Particle(emitterX, emitterY, vx, vy, lifespan, col));
                                   }
                              }

                              // Update and display all particles
                              for (let i = p.sketchInstanceVariables.particles.length - 1; i >= 0; i--) {
                                  // ... (update, display, remove particles) ...
                                   p.sketchInstanceVariables.particles[i].update();
                                   p.sketchInstanceVariables.particles[i].display();
                                   if (p.sketchInstanceVariables.particles[i].isDead()) {
                                       p.sketchInstanceVariables.particles.splice(i, 1);
                                   }
                              }
                              break; // End of particleEmitters case

                        case 'wovenTapestryOverlay':
                            // --- Woven Tapestry (Overlay/Wrap) Logic ---
                            // **NO p.background() call here**
                            if (!latestValidData || collectedData.length === 0) return;
                            if (numStreams <= 0) break;

                            // Use the GLOBAL overlayWeftHeight variable set by parseAndStoreData
                            if (overlayWeftHeight <= 0) break; // Check the global variable
                            
                            // Calculation now uses the global variable
                            const maxVisibleRows = Math.floor(p.height / overlayWeftHeight); 
                            if (maxVisibleRows <= 0) break;

                            // --- Update and Wrap Y Position ---
                            // Uses global overlayDrawSpeed
                            if (overlayCurrentY === -1) overlayCurrentY = p.height;
                            overlayCurrentY -= overlayDrawSpeed;
                            if (overlayCurrentY < 0) overlayCurrentY = p.height;
                            const currentDrawY = Math.round(overlayCurrentY);

                            // --- Calculate Proportional Widths ---
                            let totalValueForRowOverlay = 0;
                            for (let j = 0; j < numStreams; j++) totalValueForRowOverlay += latestValidData[j] || 0;

                                else proportionalWidthOverlay = p.width / numStreams;

                                // Map value to color components (H, S, B)
                                const hueOverlay = p.map(value, 0, 360, 0, 360);
                                // ** Use the reverted overlayDrawSaturation (or a fixed value if you prefer) **
                                // Let's use a fixed saturation for now unless you want to map it too
                                const saturationOverlay = 85; // Fixed saturation
                                const brightnessOverlay = p.map(value, 0, 360, 50, 95);
                                // Use the global overlayDrawAlpha 
                                const alphaOverlay = overlayDrawAlpha;

                                if (totalValueForRowOverlay === 0) {
                                    p.fill(0, 0, 50, alphaOverlay);
                                } else {
                                    p.fill(hueOverlay, saturationOverlay, brightnessOverlay, alphaOverlay);
                                }

                                if (proportionalWidthOverlay > 0 && currentDrawY >= 0) {
                                    // Draw rectangle using the GLOBAL overlayWeftHeight
                                    p.rect(rowCurrentXOverlay, currentDrawY - overlayWeftHeight,
                                           proportionalWidthOverlay, overlayWeftHeight);
                                }
                                rowCurrentXOverlay += proportionalWidthOverlay;
                            }
                            break; // End of wovenTapestryOverlay case

                        case 'none':
                             p.background(240); // Clear background
                             p.noStroke();
                             p.fill(0, 0, 80);
                             // Only show progress bar if NOT indefinite
                             if (!collectIndefinitely) {
                                 const durationMs = parseInt(collectDurationInput.value, 10) * 1000 || 1;
                                 const timeProgress = p.constrain((Date.now() - collectionStartTime) / durationMs, 0, 1);
                                 p.rect(0, p.height - 5, p.width, 5); // Background bar
                                 p.fill(120, 80, 80);
                                 p.rect(0, p.height - 5, p.width * timeProgress, 5); // Progress
                             } else {
                                 // Maybe show a blinking indicator or just nothing for indefinite 'none'
                                 p.fill(150);
                                 p.textAlign(p.CENTER, p.BOTTOM);
                                 p.text("Collecting indefinitely...", p.width / 2, p.height - 10);
                             }
                             break; // End of none case

                        case 'auraReading': {
                            // --- Aura Bloom Live Reading ---
                            // Dark background drawn once per frame with very low alpha = long-exposure accumulation
                            p.background(0, 0, 5, 0.08);

                            const cx = p.width / 2;
                            const cy = p.height / 2;
                            const t = p.frameCount;
                            const NUM_SENSORS = numStreams;

                            // Advance slow-reveal cursor: advance ~1 frame every 3 draw frames
                            // so the aura builds gradually across the full duration
                            if (p.frameCount % 3 === 0 && collectedData.length > readingFrameIndex) {
                                readingFrameIndex++;
                            }

                            // Use the slow-reveal slice rather than the latest frame
                            const revealData = collectedData[readingFrameIndex] || latestValidData;
                            if (!revealData) break;

                            // Overall energy level (0–1) drives background warmth
                            const totalEnergy = revealData.reduce((s, v) => s + (v || 0), 0);
                            const maxPossible = NUM_SENSORS * 360;
                            const energyRatio = p.constrain(totalEnergy / maxPossible, 0, 1);

                            // Draw one lobe per sensor, accumulating each frame
                            p.noStroke();
                            for (let j = 0; j < NUM_SENSORS; j++) {
                                const val = revealData[j] || 0;
                                const lobeAngle = (j / NUM_SENSORS) * p.TWO_PI - p.HALF_PI;

                                // Lobe size — organic wobble via sin offsets
                                const wobble = p.sin(t * 0.04 + j * 1.7) * 0.12 + 1.0;
                                const lobeLen = p.map(val, 0, 360, 0, Math.min(p.width, p.height) * 0.38) * wobble;
                                const lobeWidth = lobeLen * (0.32 + p.sin(t * 0.03 + j * 2.3) * 0.08);

                                // Colour: hue sweeps from cool violet (low) to warm gold (high)
                                const hue = p.map(val, 0, 360, 260, 45);
                                const sat = p.map(val, 0, 360, 40, 95);
                                const bri = p.map(val, 0, 360, 30, 95);
                                // Very low alpha per frame — each pass layers gently
                                const alpha = p.map(val, 0, 360, 0.012, 0.06);

                                p.fill(hue, sat, bri, alpha);

                                // Draw lobe as an ellipse translated and rotated toward its angle
                                p.push();
                                p.translate(cx, cy);
                                p.rotate(lobeAngle);
                                p.ellipse(lobeLen * 0.5, 0, lobeLen, lobeWidth);
                                p.pop();
                            }

                            // Soft central glow — grows with energy
                            const glowR = p.map(energyRatio, 0, 1, 10, 60);
                            p.fill(45, 60, 100, 0.04);
                            p.ellipse(cx, cy, glowR * 2.5, glowR * 2.5);
                            p.fill(45, 30, 100, 0.06);
                            p.ellipse(cx, cy, glowR * 1.2, glowR * 1.2);

                            break;
                        }

                        case 'mycelium': {
                            // --- Mycelium / Organic Cell ---
                            // Dark translucent background — gentle trails
                            p.background(0, 0, 4, 0.18);

                            const mcx = p.width / 2;
                            const mcy = p.height / 2;
                            const mT  = p.frameCount * 0.012; // slow global time
                            const mN  = numStreams || 8;
                            const maxReach = Math.min(p.width, p.height) * 0.42;

                            // Initialise per-tendril noise offsets once
                            if (myceliumNoiseOffsets.length !== mN) {
                                myceliumNoiseOffsets = Array.from({ length: mN }, (_, i) => i * 47.3 + 11.1);
                            }

                            const liveVals = latestValidData || [];

                            // --- Draw tendrils ---
                            for (let j = 0; j < mN; j++) {
                                const val      = liveVals[j] || 0;
                                const norm     = p.constrain(val / 360, 0, 1);
                                const baseAngle = (j / mN) * p.TWO_PI - p.HALF_PI;
                                const nOff     = myceliumNoiseOffsets[j];

                                // Tendril length grows with value; always has a small idle length
                                const idleLen  = maxReach * 0.06;
                                const fullLen  = maxReach * (0.15 + norm * 0.85);

                                // Organic wiggle: lateral displacement per segment
                                const SEGS = 18;
                                const segLen = fullLen / SEGS;

                                // Colour: cool teal at rest → warm gold/amber when full
                                const hue = p.map(norm, 0, 1, 165, 45);
                                const sat = p.map(norm, 0, 1, 55, 90);
                                const bri = p.map(norm, 0, 1, 45, 92);
                                // Alpha scales with value so idle tendrils are ghost-like
                                const strokeAlpha = p.map(norm, 0, 1, 0.18, 0.72);
                                const sw = p.map(norm, 0, 1, 0.6, 2.2);

                                p.stroke(hue, sat, bri, strokeAlpha);
                                p.strokeWeight(sw);
                                p.noFill();
                                p.beginShape();

                                let px = mcx, py = mcy;
                                for (let s = 0; s <= SEGS; s++) {
                                    const frac    = s / SEGS;
                                    // Noise-based lateral wobble — amplitude tapers at base and tip
                                    const wobbleAmp = maxReach * 0.055 * Math.sin(frac * Math.PI);
                                    const noiseVal  = p.noise(nOff + frac * 2.4, mT + j * 0.6);
                                    const lateral   = p.map(noiseVal, 0, 1, -wobbleAmp, wobbleAmp);

                                    // Walk outward along baseAngle, displaced laterally
                                    const perpAngle = baseAngle + p.HALF_PI;
                                    const dist      = frac * fullLen;
                                    px = mcx + Math.cos(baseAngle) * dist + Math.cos(perpAngle) * lateral;
                                    py = mcy + Math.sin(baseAngle) * dist + Math.sin(perpAngle) * lateral;
                                    p.curveVertex(px, py);
                                }
                                p.endShape();

                                // Glowing tip — size and brightness scale with value
                                if (norm > 0.05) {
                                    const tipR = p.map(norm, 0, 1, 1.5, 6);
                                    p.noStroke();
                                    p.fill(hue, sat * 0.8, 100, strokeAlpha * 0.9);
                                    p.ellipse(px, py, tipR * 2, tipR * 2);
                                    // Inner bright core
                                    p.fill(hue, 20, 100, strokeAlpha * 0.5);
                                    p.ellipse(px, py, tipR * 0.8, tipR * 0.8);
                                }
                            }

                            // --- Central cell body ---
                            // Pulses gently; grows slightly with overall energy
                            const mcEnergy = liveVals.reduce((s, v) => s + (v || 0), 0) / (mN * 360);
                            const cellR    = p.map(mcEnergy, 0, 1, 8, 22) + p.sin(mT * 4) * 2;
                            // Outer soft glow
                            p.noStroke();
                            p.fill(165, 60, 70, 0.10);
                            p.ellipse(mcx, mcy, (cellR + 16) * 2, (cellR + 16) * 2);
                            // Mid ring
                            p.fill(165, 50, 85, 0.18);
                            p.ellipse(mcx, mcy, (cellR + 6) * 2, (cellR + 6) * 2);
                            // Core
                            const coreHue = p.map(mcEnergy, 0, 1, 165, 55);
                            p.fill(coreHue, 70, 95, 0.75);
                            p.ellipse(mcx, mcy, cellR * 2, cellR * 2);
                            // Bright nucleus
                            p.fill(coreHue, 20, 100, 0.55);
                            p.ellipse(mcx, mcy, cellR * 0.45, cellR * 0.45);

                            break;
                        }

                        case 'sigilWriting': {
                            // --- Sigil Writing — automatic drawing ---
                            // Very faint background each frame → ghost trails of earlier strokes
                            p.background(0, 0, 4, 0.12);

                            const sw_cx = p.width  / 2;
                            const sw_cy = p.height / 2;
                            const sw_t  = p.frameCount;
                            const sw_N  = numStreams || 8;
                            const sw_maxR = Math.min(p.width, p.height) * 0.44;

                            // Initialise cursor to canvas centre on first frame
                            if (sigilPath.length === 0) {
                                sigilCursorX     = sw_cx;
                                sigilCursorY     = sw_cy;
                                sigilCursorAngle = -p.HALF_PI;
                            }

                            const sw_vals = latestValidData || [];

                            // Derive cursor movement from sensor values
                            // Sensors 0–1 → angular bias (turn left / right)
                            const v0 = (sw_vals[0] || 0) / 360;
                            const v1 = (sw_vals[1] || 0) / 360;
                            const turnBias = p.map(v0 - v1, -1, 1, -0.18, 0.18);

                            // Sensors 2–3 → step length
                            const v2 = (sw_vals[2] || 0) / 360;
                            const v3 = (sw_vals[3] || 0) / 360;
                            const stepLen = p.map((v2 + v3) * 0.5, 0, 1, 1.2, 7.5);

                            // Sensors 4–5 → curvature noise influence
                            const v4 = (sw_vals[4] || 0) / 360;
                            const v5 = (sw_vals[5] || 0) / 360;
                            const curvAmt = p.map((v4 + v5) * 0.5, 0, 1, 0.04, 0.38);
                            const noiseAngle = p.map(p.noise(sw_t * 0.008, 99.1), 0, 1, -curvAmt, curvAmt);

                            // Sensors 6–7 → stroke weight and hue
                            const v6 = (sw_vals[6] || 0) / 360;
                            const v7 = (sw_vals[7 < sw_N ? 7 : 6] || 0) / 360;
                            const sw_weight = p.map((v6 + v7) * 0.5, 0, 1, 0.4, 2.8);
                            // Hue drifts through deep violet → crimson → gold over time
                            const sw_hue = (270 + sw_t * 0.35) % 360;
                            const sw_sat = p.map((v6 + v7) * 0.5, 0, 1, 55, 90);
                            const sw_bri = p.map((v6 + v7) * 0.5, 0, 1, 55, 95);

                            // Update cursor
                            sigilCursorAngle += turnBias + noiseAngle;

                            // Soft boundary pull — nudge angle back toward centre when drifting far
                            const distFromCentre = p.dist(sigilCursorX, sigilCursorY, sw_cx, sw_cy);
                            if (distFromCentre > sw_maxR * 0.82) {
                                const angleToCenter = Math.atan2(sw_cy - sigilCursorY, sw_cx - sigilCursorX);
                                const angleDiff = angleToCenter - sigilCursorAngle;
                                sigilCursorAngle += angleDiff * 0.06;
                            }

                            sigilCursorX += Math.cos(sigilCursorAngle) * stepLen;
                            sigilCursorY += Math.sin(sigilCursorAngle) * stepLen;

                            // Hard-clamp to canvas bounds (with padding)
                            const pad = 30;
                            sigilCursorX = p.constrain(sigilCursorX, pad, p.width  - pad);
                            sigilCursorY = p.constrain(sigilCursorY, pad, p.height - pad);

                            // Store point
                            sigilPath.push({ x: sigilCursorX, y: sigilCursorY, weight: sw_weight, hue: sw_hue, sat: sw_sat, bri: sw_bri });

                            // Draw the last segment (just the new addition)
                            if (sigilPath.length >= 2) {
                                const prev = sigilPath[sigilPath.length - 2];
                                const curr = sigilPath[sigilPath.length - 1];
                                p.stroke(curr.hue, curr.sat, curr.bri, 0.82);
                                p.strokeWeight(curr.weight);
                                p.line(prev.x, prev.y, curr.x, curr.y);
                            }

                            // Glowing cursor dot
                            
                            p.noStroke();
                            p.fill(sw_hue, 40, 100, 0.55);
                            p.ellipse(sigilCursorX, sigilCursorY, 7, 7);
                            p.fill(sw_hue, 20, 100, 0.30);
                            p.ellipse(sigilCursorX, sigilCursorY, 14, 14);
                            

                            break;
                        }

                        default:
                            // ... (default case with background clear) ...
                            p.background(240);
                            p.fill(0);
                            p.textAlign(p.CENTER, p.CENTER);
                            p.text(`Unknown live viz: ${currentLiveVisualization}`, p.width/2, p.height/2);

                     } // End switch

                    // --- Countdown radial timer (bottom-right corner, all live modes) ---
                    if (!capturingScreenshot && !collectIndefinitely && collectionStartTime) {
                        const durationMs = parseInt(collectDurationInput.value, 10) * 1000 || 1;
                        const elapsed = Date.now() - collectionStartTime;
                        const remaining = p.constrain(1 - elapsed / durationMs, 0, 1);

                        const tr = { x: p.width - 36, y: p.height - 36 }; // centre of timer
                        const timerR = 18;

                        // Background circle
                        p.noStroke();
                        p.fill(0, 0, 8, 0.75);
                        p.ellipse(tr.x, tr.y, (timerR + 5) * 2, (timerR + 5) * 2);

                        // Track ring
                        p.noFill();
                        p.stroke(0, 0, 30, 0.6);
                        p.strokeWeight(2.5);
                        p.arc(tr.x, tr.y, timerR * 2, timerR * 2, -p.HALF_PI, -p.HALF_PI + p.TWO_PI * 0.9999);

                        // Remaining arc — colour shifts from cool to warm as time runs out
                        const timerHue = p.map(remaining, 0, 1, 15, 180);
                        p.stroke(timerHue, 80, 90, 0.9);
                        p.strokeWeight(2.5);
                        if (remaining > 0.001) {
                            p.arc(tr.x, tr.y, timerR * 2, timerR * 2,
                                -p.HALF_PI,
                                -p.HALF_PI + p.TWO_PI * remaining);
                        }

                        // Seconds remaining label
                        const secsLeft = Math.ceil((durationMs - elapsed) / 1000);
                        p.noStroke();
                        p.fill(0, 0, 88, 0.85);
                        p.textAlign(p.CENTER, p.CENTER);
                        p.textSize(9);
                        p.textFont('sans-serif');
                        p.text(Math.max(0, secsLeft), tr.x, tr.y);
                    }

                } else if (collectedData.length > 0) {
                     // --- Post-Collection Logic ---
                    p.background(255); // Clear background for final visualization
                    if (visualizations[currentVisualization]) {
                        try {
                            visualizations[currentVisualization](collectedData);
                            // --- Scene-change countdown timer (same style as reading timer) ---
                            if (!capturingScreenshot && isInstallationMode && autoSceneChange && displayHoldStartTime) {
                                const elapsed = Date.now() - displayHoldStartTime;
                                const remaining = p.constrain(1 - elapsed / DISPLAY_HOLD_MS, 0, 1);
                                const tr = { x: p.width - 36, y: p.height - 36 };
                                const timerR = 18;
                                p.noStroke();
                                p.fill(0, 0, 8, 0.75);
                                p.ellipse(tr.x, tr.y, (timerR + 5) * 2, (timerR + 5) * 2);
                                p.noFill();
                                p.stroke(0, 0, 30, 0.6);
                                p.strokeWeight(2.5);
                                p.arc(tr.x, tr.y, timerR * 2, timerR * 2, -p.HALF_PI, -p.HALF_PI + p.TWO_PI * 0.9999);
                                const timerHue = p.map(remaining, 0, 1, 15, 180);
                                p.stroke(timerHue, 80, 90, 0.9);
                                p.strokeWeight(2.5);
                                if (remaining > 0.001) {
                                    p.arc(tr.x, tr.y, timerR * 2, timerR * 2, -p.HALF_PI, -p.HALF_PI + p.TWO_PI * remaining);
                                }
                                const secsLeft = Math.ceil((DISPLAY_HOLD_MS - elapsed) / 1000);
                                p.noStroke();
                                p.fill(0, 0, 88, 0.85);
                                p.textAlign(p.CENTER, p.CENTER);
                                p.textSize(9);
                                p.textFont('sans-serif');
                                p.text(Math.max(0, secsLeft), tr.x, tr.y);
                            }
                            // -------------------------------------------------------------------
                        } catch(visError) {
                             console.error(`Error in visualization '${currentVisualization}':`, visError);
                             p.fill(255,0,0); // Red for error
                             p.noStroke();
                             p.textAlign(p.CENTER, p.CENTER);
                             p.text(`Error rendering visualization: ${visError.message}`, p.width/2, p.height/2);
                        }
                    } else {
                        p.fill(200, 0, 0); // Indicate error - unknown viz
                        p.noStroke();
                        p.textAlign(p.CENTER, p.CENTER);
                        p.text(`Unknown visualization: ${currentVisualization}`, p.width / 2, p.height / 2);
                    }
                } else {
                    // --- Initial State Logic ---
                    p.background(0, 0, 10); // Dark background before connection/collection
                    p.fill(0, 0, 80);
                    p.textAlign(p.CENTER, p.CENTER);
                    p.text('Connect device and collect data to visualize.', p.width / 2, p.height / 2);
                }
            }; // End p.draw

             // Custom function to clear canvas, called before starting collection
            p.clearCanvas = () => {
                p.background(255); // Clear with white
                p.fill(180);
                p.noStroke();
                p.textAlign(p.CENTER, p.CENTER);
                p.text('Ready to collect data...', p.width / 2, p.height / 2);
                // p.redraw(); // Redraw immediately to show the cleared state
            };

            // Optional: Handle window resize
            p.windowResized = () => {
                 // Check if we are in fullscreen targeting the canvas element
                 if (document.fullscreenElement === p.canvas) {
                     p.resizeCanvas(p.windowWidth, p.windowHeight);
                 } else {
                     const area = document.getElementById('canvasArea');
                     canvasWidth  = area.offsetWidth  || window.innerWidth;
                     canvasHeight = area.offsetHeight || window.innerHeight;
                     originalCanvasHeight = canvasHeight;
                     p.resizeCanvas(canvasWidth, canvasHeight);
                 }
                 // Don't redraw if collecting, let the loop handle it, otherwise redraw
                 // (Redrawing is now also triggered by handleFullscreenChange)
                 if (!isCollecting) {
                    // p.redraw(); // Might be redundant now, handleFullscreenChange calls it
                 } else {
                    // Ensure loop is running if collecting, as resize might pause it
                    p.loop();
                 }
            };
        };

        // ------------------------------------

        // --- Fullscreen Change Listener ---
        function handleFullscreenChange() {
            if (document.fullscreenElement === p5Instance?.canvas) {
                // Entering fullscreen — hide sidebar
                sidebar.classList.add('collapsed');
                sidebarToggle.classList.add('collapsed');
                sidebarToggle.style.display = 'none';

                if (p5Instance) {
                    p5Instance.windowResized();
                    p5Instance.background(0, 0, 10);
                    if (isCollecting) { p5Instance.loop(); } else { p5Instance.redraw(); }
                }
            } else {
                // Exiting fullscreen — restore sidebar
                sidebar.classList.remove('collapsed');
                sidebarToggle.classList.remove('collapsed');
                sidebarToggle.style.display = '';
                sidebarToggle.innerHTML = '&#x25C4;';

                if (p5Instance) {
                    setTimeout(() => {
                        p5Instance.windowResized();
                        if (isCollecting) { p5Instance.loop(); } else { p5Instance.redraw(); }
                    }, 50);
                }
            }
        }

        // --- Attempt Auto-Connect on Page Load ---
        document.addEventListener('DOMContentLoaded', async () => {
             loadSettings();
             await tryAutoConnectOnLoad();

             // Add the fullscreen change listener
             document.addEventListener('fullscreenchange', handleFullscreenChange);

             if (!p5Instance) {
                 console.log("Initializing p5 in default state (no connection).");
                 p5Instance = new p5(sketch);
             }
             updateButtonStates();
             updateGallerySaveCount();

             // ── Dashboard layout sidebar ──────────────────────────────────────
             function renderDashTileList() {
                 const list = document.getElementById('dashTileList');
                 const colsIn = document.getElementById('dashCols');
                 const rowsIn = document.getElementById('dashRows');
                 if (!list) return;
                 if (colsIn) colsIn.value = dashboardLayout.cols;
                 if (rowsIn) rowsIn.value = dashboardLayout.rows;

                 const typeOpts = Object.entries(DASHBOARD_PANEL_TYPES)
                     .map(([k,v]) => `<option value="${k}">${v}</option>`).join('');

                 list.innerHTML = dashboardLayout.tiles.map((tile, i) => `
                     <div style="display:flex;gap:3px;align-items:center;margin-bottom:3px;">
                         <input type="number" value="${tile.col}"     min="0" max="7" style="width:26px;text-align:center;padding:1px;" data-idx="${i}" data-field="col"     class="dt-inp" title="Start column">
                         <input type="number" value="${tile.row}"     min="0" max="7" style="width:26px;text-align:center;padding:1px;" data-idx="${i}" data-field="row"     class="dt-inp" title="Start row">
                         <input type="number" value="${tile.colSpan}" min="1" max="8" style="width:26px;text-align:center;padding:1px;" data-idx="${i}" data-field="colSpan" class="dt-inp" title="Column span">
                         <input type="number" value="${tile.rowSpan}" min="1" max="8" style="width:26px;text-align:center;padding:1px;" data-idx="${i}" data-field="rowSpan" class="dt-inp" title="Row span">
                         <select data-idx="${i}" class="dt-type" style="flex:1;font-size:10px;padding:1px 2px;">
                             ${Object.entries(DASHBOARD_PANEL_TYPES).map(([k,v]) =>
                                 `<option value="${k}"${tile.type===k?' selected':''}>${v}</option>`).join('')}
                         </select>
                         <button data-idx="${i}" class="dt-del" style="padding:1px 5px;background:#3b0f0f;color:#f87171;border-color:#4d1515;min-width:20px;">×</button>
                     </div>`).join('');

                 list.querySelectorAll('.dt-inp').forEach(el => el.addEventListener('change', e => {
                     dashboardLayout.tiles[+e.target.dataset.idx][e.target.dataset.field] = parseInt(e.target.value);
                     saveSettings(); if (p5Instance) p5Instance.redraw();
                 }));
                 list.querySelectorAll('.dt-type').forEach(el => el.addEventListener('change', e => {
                     dashboardLayout.tiles[+e.target.dataset.idx].type = e.target.value;
                     saveSettings(); if (p5Instance) p5Instance.redraw();
                 }));
                 list.querySelectorAll('.dt-del').forEach(el => el.addEventListener('click', e => {
                     dashboardLayout.tiles.splice(+e.target.dataset.idx, 1);
                     renderDashTileList(); saveSettings(); if (p5Instance) p5Instance.redraw();
                 }));
             }

             document.getElementById('dashCols')?.addEventListener('change', e => {
                 dashboardLayout.cols = parseInt(e.target.value) || 4;
                 saveSettings(); if (p5Instance) p5Instance.redraw();
             });
             document.getElementById('dashRows')?.addEventListener('change', e => {
                 dashboardLayout.rows = parseInt(e.target.value) || 3;
                 saveSettings(); if (p5Instance) p5Instance.redraw();
             });
             document.getElementById('dashAddTileBtn')?.addEventListener('click', () => {
                 dashboardLayout.tiles.push({ id: Date.now().toString(), col:0, row:0, colSpan:1, rowSpan:1, type:'empty' });
                 renderDashTileList(); saveSettings(); if (p5Instance) p5Instance.redraw();
             });
             document.getElementById('dashResetBtn')?.addEventListener('click', () => {
                 dashboardLayout = JSON.parse(JSON.stringify(DASHBOARD_DEFAULT_LAYOUT));
                 renderDashTileList(); saveSettings(); if (p5Instance) p5Instance.redraw();
             });

             renderDashTileList();
             // ─────────────────────────────────────────────────────────────────

             // Live data monitor — refresh sidebar every 100ms
             setInterval(() => {
                 const el = document.getElementById('liveDataMonitor');
                 if (!el) return;
                 if (!latestRawValues.length) {
                     el.innerHTML = '<span style="color:#444;">— no data —</span>';
                     return;
                 }
                 const labels = ['T0','T1','T2','T3','T4','T5','T6','T7','B1','B2','R1','R2','R3'];
                 el.innerHTML = latestRawValues.map((v, i) => {
                     const label = labels[i] ?? `ch${i}`;
                     const pct   = Math.min(100, Math.max(0, (v / 360) * 100));
                     const hue   = Math.round((1 - pct / 100) * 200); // blue→red as value rises
                     return `<div style="display:flex; align-items:center; gap:5px; margin-bottom:2px;">
                         <span style="color:#555; width:22px; flex-shrink:0;">${label}</span>
                         <div style="flex:1; height:6px; background:#1a1a1a; border-radius:3px; overflow:hidden;">
                             <div style="width:${pct}%; height:100%; background:hsl(${hue},70%,55%); border-radius:3px;"></div>
                         </div>
                         <span style="color:#777; width:28px; text-align:right; flex-shrink:0;">${Math.round(v)}</span>
                     </div>`;
                 }).join('');
             }, 100);

        });

    </script>

</body>
</html>
